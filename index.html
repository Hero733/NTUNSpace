<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NTUNSpace</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        body, html { 
            font-family: 'Kanit', sans-serif; 
            margin: 0; padding: 0; min-height: 100vh; color: white; 
            overflow-x: hidden;
            background: linear-gradient(180deg, #5AB2FF 0%, #8390FA 50%, #F5A9CE 100%) !important;
            background-attachment: fixed !important;
        }

        .stars-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(1.5px 1.5px at 20px 30px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 80px 70px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 150px 160px, #ffffff, rgba(0,0,0,0));
            background-repeat: repeat; background-size: 500px 500px;
            opacity: 0.8; z-index: 0; pointer-events: none;
            animation: drift 150s linear infinite;
        }
        @keyframes drift { from { background-position: 0 0; } to { background-position: 500px 500px; } }

        .glass-panel { 
            background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border); box-shadow: 0 10px 40px 0 rgba(0, 0, 0, 0.15);
        }

        .animate-in { animation: fadeIn 0.5s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        #g_id_onload, .g_id_signin { background-color: white; border-radius: 999px; }

        .countdown-box { display: flex; gap: 12px; align-items: center; justify-content: center; }
        .time-block { 
            background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 16px; border-radius: 16px; min-width: 65px; text-align: center;
        }
        .time-val { font-size: 24px; font-weight: 800; color: #fff; }
        .time-lbl { font-size: 10px; color: rgba(255,255,255,0.7); }
    </style>
</head>
<body>

    <div class="stars-bg"></div>

    <div id="loginPage" class="relative z-10 flex min-h-screen items-center justify-center p-4">
        <div class="glass-panel p-6 md:p-10 w-full max-w-sm md:max-w-md text-center rounded-[2.5rem] animate-in mx-auto">
            <div class="w-32 h-32 md:w-40 md:h-40 mx-auto mb-6 relative hover:scale-105 transition-transform">
                <img src="https://cdn-icons-png.flaticon.com/512/3256/3256114.png" alt="Logo" class="relative z-10 w-full h-full object-contain drop-shadow-xl">
            </div>
            <h1 class="text-3xl md:text-4xl font-black mb-1 tracking-tight text-white uppercase drop-shadow-md">NTUN SPACE</h1>
            <p class="text-white/90 mb-8 font-light text-sm">ระบบจองที่นั่ง : Online</p>
            
            <div class="bg-white rounded-full p-1.5 w-max max-w-[95%] overflow-hidden mx-auto mb-4 shadow-xl flex justify-center items-center">
                <div id="g_id_onload" data-client_id="802485672001-7tuhmifm1ph2mb09hle6r6hf0tahu9gv.apps.googleusercontent.com" data-callback="handleGoogleLogin"></div>
                <div class="g_id_signin flex justify-center w-full" data-type="standard" data-shape="pill" data-theme="outline" data-size="large"></div>
            </div>
            <p class="mt-6 text-[10px] md:text-[11px] opacity-80 font-medium tracking-wide text-white uppercase">รองรับบัญชี Google ทุกบัญชี</p>
        </div>
    </div>

    <div id="mainApp" class="hidden min-h-screen flex flex-col relative z-10">
        <header class="p-4 md:p-6 flex justify-between items-center max-w-7xl mx-auto w-full animate-in">
            <div class="glass-panel px-5 py-2 flex items-center gap-4 rounded-full">
                <div class="text-left"><h1 class="text-white font-bold text-base uppercase tracking-widest">NTUN SPACE</h1></div>
            </div>
            <div class="glass-panel p-1.5 flex items-center gap-2 rounded-full">
                <button onclick="changePage('home')" class="bg-white/20 hover:bg-white/30 text-white px-4 py-2 rounded-full text-sm font-medium"><i class='bx bx-home-alt text-lg'></i></button>
                <button id="btnSettings" onclick="changePage('settings')" class="hidden bg-white/20 text-white px-4 py-2 rounded-full text-sm font-medium"><i class='bx bx-cog text-lg'></i></button>
                <div class="flex items-center gap-2 px-3 border-l border-white/30"><img id="userImg" src="" class="w-8 h-8 rounded-full border-2 border-white/80"><span id="userName" class="text-white text-sm font-medium hidden md:block"></span></div>
                <button onclick="logout()" class="bg-red-500/80 hover:bg-red-500 text-white px-4 py-2 rounded-full text-sm font-medium"><i class='bx bx-log-out text-lg'></i></button>
            </div>
        </header>

        <main class="flex-grow max-w-7xl mx-auto w-full px-4 md:px-6 pb-20">
            <div id="viewHome">
                <section class="mt-4 mb-8 animate-in">
                    <p class="text-white/90 mb-1 font-light tracking-wide">ยินดีต้อนรับกลับมา</p>
                    <h2 class="text-3xl md:text-5xl font-bold mb-6 text-white">สวัสดี, <span id="welcomeName">นักเรียน</span> <span id="roleBadge" class="hidden text-sm align-middle bg-[#5AB2FF] px-3 py-1 rounded-full ml-2 border border-white/50"></span></h2>
                </section>
                <div id="contentArea" class="glass-panel p-6 rounded-3xl"></div>
            </div>

            <div id="viewSettings" class="hidden animate-in glass-panel p-8 rounded-[2.5rem]">
                <h2 class="text-3xl font-bold text-white mb-6">ตั้งค่าระบบ (Admin)</h2>
                <div class="bg-black/20 p-6 rounded-3xl mb-6">
                    <h3 class="text-xl font-bold mb-4">จัดการสิทธิ์ "ครู"</h3>
                    <div class="flex gap-2 mb-4">
                        <input type="email" id="newTeacherEmail" placeholder="ใส่อีเมล Google..." class="flex-1 bg-white/10 rounded-xl px-4 py-3 outline-none text-white">
                        <button onclick="addTeacher()" class="bg-white text-[#5AB2FF] px-6 rounded-xl font-bold">เพิ่ม</button>
                    </div>
                    <div class="bg-black/30 rounded-2xl p-4 h-48 overflow-y-auto" id="teacherListContainer"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAlaTyhtXf-d6qDSD5AeWR33Hg3VCn55o8",
            authDomain: "ntunspace.firebaseapp.com",
            projectId: "ntunspace",
            storageBucket: "ntunspace.firebasestorage.app",
            messagingSenderId: "952526844615",
            appId: "1:952526844615:web:d1f78ba8e3b44c24ee84e2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const SUPER_ADMIN = "ntun21933@ntun.ac.th";
        let currentUser = null;
        let systemRoles = { teachers: [] };

        // -------------------------------------------------------------
        // ระบบถอดรหัส Google แบบใหม่ ป้องกันบัคหน้าขาวใน iPad / iPhone (Safari)
        // -------------------------------------------------------------
        function decodeJwt(token) {
            try {
                let base64Url = token.split('.')[1];
                let base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                while (base64.length % 4) { base64 += '='; } // เติม Padding ให้ครบ
                let jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                return JSON.parse(jsonPayload);
            } catch (e) {
                console.error("Decode Error:", e);
                return null;
            }
        }

        window.handleGoogleLogin = async function(response) {
            try {
                const payload = decodeJwt(response.credential);
                
                if (!payload) {
                    return Swal.fire({ icon: 'error', title: 'ผิดพลาด', text: 'ถอดรหัสบัญชีไม่ได้ ลองใหม่อีกครั้งบนบราวเซอร์ Chrome', background: 'rgba(255,255,255,0.9)' });
                }

                const email = payload.email.toLowerCase();
                currentUser = { email, name: payload.name, role: 'student', picture: payload.picture }; 
                localStorage.setItem('ntun_session_v15', JSON.stringify(currentUser));
                
                initApp();
            } catch (error) {
                Swal.fire({ icon: 'error', title: 'ระบบขัดข้อง', text: error.message });
            }
        }
        // -------------------------------------------------------------

        function initApp() {
            const saved = localStorage.getItem('ntun_session_v15');
            if (!saved) return;
            
            currentUser = JSON.parse(saved);
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainApp').classList.remove('hidden');
            
            const shortName = currentUser.name.split(' ').slice(0,2).join(' ');
            document.getElementById('userName').innerText = shortName;
            document.getElementById('userImg').src = currentUser.picture;
            document.getElementById('welcomeName').innerText = shortName;

            db.collection("settings").doc("roles").onSnapshot(doc => {
                if(doc.exists) systemRoles = doc.data();
                else { systemRoles = { teachers: [] }; db.collection("settings").doc("roles").set(systemRoles); }
                
                if (currentUser.email === SUPER_ADMIN) currentUser.role = 'super_admin';
                else if (systemRoles.teachers && systemRoles.teachers.includes(currentUser.email)) currentUser.role = 'teacher';
                else currentUser.role = 'student';

                if(['super_admin', 'teacher'].includes(currentUser.role)) {
                    document.getElementById('btnSettings').classList.remove('hidden');
                    const badge = document.getElementById('roleBadge');
                    badge.innerText = currentUser.role === 'super_admin' ? 'SUPER ADMIN' : 'TEACHER';
                    badge.classList.remove('hidden');
                }
                renderDashboard();
                renderTeacherList();
            });
        }

        function renderDashboard() {
            document.getElementById('contentArea').innerHTML = `
                <div class="text-center py-10">
                    <i class='bx bx-check-circle text-6xl text-green-400 mb-4'></i>
                    <h3 class="text-2xl font-bold text-white">เข้าสู่ระบบสำเร็จ!</h3>
                    <p class="text-white/80 mt-2">คุณกำลังล็อกอินด้วยอีเมล: <span class="font-bold text-[#5AB2FF]">${currentUser.email}</span></p>
                </div>
            `;
        }

        async function addTeacher() {
            const email = document.getElementById('newTeacherEmail').value.trim().toLowerCase();
            if(!email) return Swal.fire({ icon: 'error', title: 'กรุณากรอกอีเมล' });
            let teachers = systemRoles.teachers || [];
            if(teachers.includes(email)) return Swal.fire({ icon: 'info', title: 'มีรายชื่ออยู่แล้ว' });
            teachers.push(email);
            await db.collection("settings").doc("roles").update({ teachers });
            document.getElementById('newTeacherEmail').value = '';
            Swal.fire({ title: 'เพิ่มสำเร็จ', icon: 'success', timer: 1500, showConfirmButton: false });
        }

        async function removeTeacher(email) {
            let teachers = systemRoles.teachers || [];
            teachers = teachers.filter(e => e !== email);
            await db.collection("settings").doc("roles").update({ teachers });
        }

        function renderTeacherList() {
            const container = document.getElementById('teacherListContainer');
            const teachers = systemRoles.teachers || [];
            if(teachers.length === 0) {
                container.innerHTML = `<div class="text-center text-white/50 mt-10">ยังไม่มีรายชื่อครู</div>`; return;
            }
            container.innerHTML = teachers.map(email => `
                <div class="flex justify-between items-center bg-white/10 p-3 rounded-xl mb-2 border border-white/10">
                    <span class="font-medium text-white">${email}</span>
                    <button onclick="removeTeacher('${email}')" class="text-red-400 hover:text-red-300 bg-red-500/20 px-3 py-1 rounded-lg text-xs font-bold"><i class='bx bx-trash'></i> ลบ</button>
                </div>
            `).join('');
        }

        function changePage(page) {
            document.getElementById('viewHome').classList.add('hidden');
            document.getElementById('viewSettings').classList.add('hidden');
            if (page === 'home') document.getElementById('viewHome').classList.remove('hidden');
            else if (page === 'settings' && ['super_admin', 'teacher'].includes(currentUser.role)) document.getElementById('viewSettings').classList.remove('hidden');
        }

        function logout() { localStorage.removeItem('ntun_session_v15'); location.reload(); }

        // เช็คการคงสถานะ Login
        window.onload = () => { if(localStorage.getItem('ntun_session_v15')) initApp(); };
    </script>
</body>
</html>
