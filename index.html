<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTUN Space - System Fix</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Kanit', sans-serif; background: #020617; color: white; min-height: 100vh; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; }
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://s3-us-west-2.amazonaws.com/s.cdpn.io/123163/stars.png') repeat; z-index: -1; opacity: 0.3; }
        
        /* Desk Style */
        .desk { width: 65px; height: 80px; position: absolute; transition: transform 0.2s; cursor: pointer; }
        .desk-top { fill: rgba(255,255,255,0.1); stroke: rgba(255,255,255,0.3); stroke-width: 2; }
        .booked .desk-top { fill: #3b82f6; stroke: #2563eb; }
        .my-seat .desk-top { fill: #22c55e; stroke: #16a34a; }
        .desk-label { position: absolute; top: 25px; width: 100%; text-align: center; font-size: 10px; font-weight: bold; pointer-events: none; }
        
        .map-area { width: 1000px; height: 800px; position: relative; background: rgba(0,0,0,0.2); border-radius: 30px; }
    </style>
</head>
<body>
    <div class="stars"></div>

    <div id="loginPage" class="fixed inset-0 z-[100] flex items-center justify-center bg-[#020617]">
        <div class="glass p-10 w-full max-w-md text-center">
            <h1 class="text-3xl font-bold mb-6">NTUN SPACE</h1>
            <div id="g_id_onload" data-client_id="738644222886-o9uq6eonuu9hp8srsad1465lh9id41kj.apps.googleusercontent.com" data-callback="handleGoogleLogin"></div>
            <div class="g_id_signin flex justify-center" data-type="standard"></div>
        </div>
    </div>

    <div id="mainApp" class="hidden p-4 max-w-6xl mx-auto">
        <header class="glass p-4 flex justify-between items-center mb-6">
            <div class="flex items-center gap-3">
                <img id="userImg" src="" class="w-10 h-10 rounded-full border-2 border-blue-500">
                <div>
                    <p id="userName" class="text-sm font-bold leading-none"></p>
                    <p id="userRoleTxt" class="text-[10px] text-blue-400 uppercase font-bold mt-1"></p>
                </div>
            </div>
            <div class="flex gap-2">
                <button id="manageBtn" onclick="showUserManagement()" class="hidden w-10 h-10 glass flex items-center justify-center"><i class='bx bx-user-plus'></i></button>
                <button onclick="logout()" class="w-10 h-10 glass flex items-center justify-center text-red-400"><i class='bx bx-log-out'></i></button>
            </div>
        </header>
        <div id="contentArea"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAlaTyhtXf-d6qDSD5AeWR33Hg3VCn55o8",
            authDomain: "ntunspace.firebaseapp.com",
            projectId: "ntunspace",
            storageBucket: "ntunspace.firebasestorage.app",
            messagingSenderId: "952526844615",
            appId: "1:952526844615:web:d1f78ba8e3b44c24ee84e2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const SUPER_ADMIN = "ntun21933@ntun.ac.th";
        let currentUser = null;
        let activeRoomId = null;
        let classrooms = {};

        // --- แก้ปัญหาชื่อเพี้ยนด้วยการถอดรหัสแบบ UTF-8 ---
        function decodeJwt(token) {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const jsonPayload = decodeURIComponent(atob(base64).split('').map(c => {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        }

        async function handleGoogleLogin(response) {
            const payload = decodeJwt(response.credential);
            const email = payload.email.toLowerCase();

            if (!email.endsWith('@ntun.ac.th')) {
                return Swal.fire('ผิดพลาด', 'ใช้ได้เฉพาะ @ntun.ac.th', 'error');
            }

            let role = 'student';
            if (email === SUPER_ADMIN) role = 'super_admin';
            else {
                const userDoc = await db.collection("users").doc(email).get();
                if (userDoc.exists) role = userDoc.data().role;
            }

            currentUser = { email, name: payload.name, role, picture: payload.picture };
            localStorage.setItem('ntun_v8', JSON.stringify(currentUser));
            initApp();
        }

        function initApp() {
            const saved = localStorage.getItem('ntun_v8');
            if (saved) currentUser = JSON.parse(saved);
            if (!currentUser) return;

            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('userName').innerText = currentUser.name;
            document.getElementById('userImg').src = currentUser.picture;
            document.getElementById('userRoleTxt').innerText = currentUser.role;

            if (['super_admin', 'admin'].includes(currentUser.role)) {
                document.getElementById('manageBtn').classList.remove('hidden');
            }

            db.collection("classrooms").onSnapshot(snap => {
                classrooms = {};
                snap.forEach(doc => { classrooms[doc.id] = doc.data(); });
                renderUI();
            });
        }

        function logout() { localStorage.removeItem('ntun_v8'); location.reload(); }

        // --- ระบบห้องเรียน ---
        function renderUI() {
            if (activeRoomId) renderRoomView();
            else renderDashboard();
        }

        function renderDashboard() {
            const area = document.getElementById('contentArea');
            const isStaff = ['super_admin', 'admin', 'teacher'].includes(currentUser.role);
            let html = `<h1 class="text-2xl font-bold mb-6">Classrooms</h1>`;

            if (isStaff) {
                html += `
                <div class="glass p-6 mb-8 flex flex-col md:flex-row gap-4 items-end">
                    <div class="flex-1 w-full"><label class="text-xs opacity-50">ชื่อห้อง</label><input id="rName" class="w-full bg-white/10 p-3 rounded-xl mt-1 border border-white/10 outline-none" placeholder="ม.6/1"></div>
                    <div class="w-full md:w-32"><label class="text-xs opacity-50">จำนวนโต๊ะ</label><input id="rCount" type="number" value="40" class="w-full bg-white/10 p-3 rounded-xl mt-1 text-center"></div>
                    <button onclick="createRoom()" class="bg-blue-600 px-8 py-3 rounded-xl font-bold hover:bg-blue-500 transition">สร้างห้อง</button>
                </div>`;
            }

            html += `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">`;
            for (const id in classrooms) {
                const room = classrooms[id];
                const booked = room.seats.filter(s => s.bookedBy).length;
                html += `
                <div onclick="enterRoom('${id}')" class="glass p-5 cursor-pointer hover:bg-white/10 transition group relative">
                    <div class="flex justify-between items-start mb-4">
                        <div class="w-10 h-10 bg-blue-500/20 rounded-xl flex items-center justify-center text-blue-400"><i class='bx bx-door-open text-2xl'></i></div>
                        ${isStaff ? `<button onclick="event.stopPropagation(); deleteRoom('${id}')" class="text-white/20 hover:text-red-500 p-2"><i class='bx bx-trash text-xl'></i></button>` : ''}
                    </div>
                    <h3 class="text-xl font-bold">${room.name}</h3>
                    <p class="text-xs opacity-40">ID: ${id}</p>
                    <p class="text-[10px] mt-4 opacity-60">จองแล้ว: ${booked}/${room.seats.length}</p>
                </div>`;
            }
            html += `</div>`;
            area.innerHTML = html;
        }

        async function createRoom() {
            const name = document.getElementById('rName').value;
            const count = parseInt(document.getElementById('rCount').value);
            if (!name || isNaN(count)) return;
            const id = Math.random().toString(36).substring(2, 8).toUpperCase();
            await db.collection("classrooms").doc(id).set({ name, seats: calc332(count) });
        }

        // --- แก้ระบบลบห้องให้ใช้งานได้จริง ---
        async function deleteRoom(id) {
            const confirm = await Swal.fire({
                title: 'ยืนยันการลบ?',
                text: "ห้อง " + classrooms[id].name + " จะถูกลบถาวร",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                background: '#111827',
                color: '#fff'
            });
            if (confirm.isConfirmed) {
                try {
                    await db.collection("classrooms").doc(id).delete();
                    Swal.fire({ icon: 'success', title: 'ลบแล้ว', toast: true, position: 'top-end', showConfirmButton: false, timer: 2000 });
                } catch (e) {
                    Swal.fire('Error', 'ลบไม่สำเร็จ: ' + e.message, 'error');
                }
            }
        }

        function enterRoom(id) { activeRoomId = id; renderUI(); }

        function renderRoomView() {
            const room = classrooms[activeRoomId];
            const isStaff = ['super_admin', 'admin', 'teacher'].includes(currentUser.role);
            document.getElementById('contentArea').innerHTML = `
                <div class="flex justify-between items-center mb-6">
                    <button onclick="activeRoomId=null; renderUI()" class="glass px-4 py-2 text-sm"><i class='bx bx-chevron-left'></i> กลับ</button>
                    <div class="flex gap-2">
                        ${isStaff ? `<button onclick="resetLayout()" class="bg-blue-600/30 border border-blue-500/50 px-4 py-2 text-xs rounded-xl">รีเซ็ต 3:3:2</button>` : ''}
                        <div class="glass px-4 py-2 text-sm font-bold text-blue-400">ID: ${activeRoomId}</div>
                    </div>
                </div>
                <div class="glass p-4 overflow-auto" style="min-height: 70vh;">
                    <div class="map-area mx-auto">
                        <div class="absolute top-10 left-1/2 -translate-x-1/2 w-64 h-8 bg-white/5 border border-white/10 rounded-xl flex items-center justify-center opacity-30 text-[8px] tracking-[10px]">WHITEBOARD</div>
                        ${room.seats.map(s => {
                            let state = s.bookedBy === currentUser.email ? 'my-seat' : (s.bookedBy ? 'booked' : '');
                            let label = s.id;
                            if (s.bookedBy) label = isStaff ? s.name.split(' ')[0] : (s.bookedBy === currentUser.email ? 'ME' : 'จองแล้ว');
                            return `
                            <div id="desk-${s.id}" class="desk ${state}" style="left:${s.x}px; top:${s.y}px;" onmousedown="startDrag(event, ${s.id})" ontouchstart="startDrag(event, ${s.id})">
                                <svg viewBox="0 0 100 110">
                                    <rect x="5" y="10" width="90" height="65" rx="10" class="desk-top" />
                                    <path d="M20 85 Q50 100 80 85" fill="none" stroke="rgba(255,255,255,0.2)" />
                                </svg>
                                <div class="desk-label">${label}</div>
                            </div>`;
                        }).join('')}
                    </div>
                </div>`;
        }

        function calc332(count) {
            const seats = [];
            const blockGap = 80, colW = 80, rowH = 110;
            for (let i = 0; i < count; i++) {
                let x; const row = Math.floor(i / 8), pos = i % 8;
                if (pos < 3) x = pos * colW;
                else if (pos < 6) x = pos * colW + blockGap;
                else x = pos * colW + (blockGap * 2);
                seats.push({ id: i + 1, x: x + 100, y: row * rowH + 150, bookedBy: null, name: null });
            }
            return seats;
        }

        async function resetLayout() {
            const room = classrooms[activeRoomId];
            const newSeats = calc332(room.seats.length);
            newSeats.forEach((s, i) => { if(room.seats[i]) { s.bookedBy = room.seats[i].bookedBy; s.name = room.seats[i].name; } });
            await db.collection("classrooms").doc(activeRoomId).update({ seats: newSeats });
        }

        // --- Drag & Booking ---
        let dragId = null, isMoving = false, startX, startY, initX, initY;
        function startDrag(e, id) {
            const isStaff = ['super_admin', 'admin', 'teacher'].includes(currentUser.role);
            dragId = id; isMoving = false;
            const ev = e.touches ? e.touches[0] : e;
            startX = ev.clientX; startY = ev.clientY;
            const el = document.getElementById('desk-'+id);
            initX = parseInt(el.style.left); initY = parseInt(el.style.top);
        }

        document.addEventListener('mousemove', handleMove);
        document.addEventListener('touchmove', handleMove, {passive:false});
        function handleMove(e) {
            if(!dragId || !['super_admin', 'admin', 'teacher'].includes(currentUser.role)) return;
            const ev = e.touches ? e.touches[0] : e;
            const dx = ev.clientX - startX; const dy = ev.clientY - startY;
            if(Math.abs(dx) > 5 || Math.abs(dy) > 5) isMoving = true;
            if(isMoving) {
                const el = document.getElementById('desk-'+dragId);
                el.style.left = (initX + dx)+'px'; el.style.top = (initY + dy)+'px';
            }
        }

        document.addEventListener('mouseup', endDrag);
        document.addEventListener('touchend', endDrag);
        async function endDrag() {
            if(!dragId) return;
            const isStaff = ['super_admin', 'admin', 'teacher'].includes(currentUser.role);
            if(isMoving && isStaff) {
                const el = document.getElementById('desk-'+dragId);
                const room = classrooms[activeRoomId];
                const seat = room.seats.find(s => s.id === dragId);
                seat.x = parseInt(el.style.left); seat.y = parseInt(el.style.top);
                await db.collection("classrooms").doc(activeRoomId).update({ seats: room.seats });
            } else if(!isMoving) {
                handleBooking(dragId);
            }
            dragId = null;
        }

        async function handleBooking(sid) {
            const room = classrooms[activeRoomId];
            const seat = room.seats.find(s => s.id === sid);
            const isStaff = ['super_admin', 'admin', 'teacher'].includes(currentUser.role);

            if (seat.bookedBy) {
                if (seat.bookedBy === currentUser.email || isStaff) {
                    const res = await Swal.fire({ title: 'ยกเลิกการจอง?', showCancelButton: true, background: '#111827', color: '#fff' });
                    if(res.isConfirmed) { seat.bookedBy = null; seat.name = null; updateRoom(); }
                }
            } else {
                if (!isStaff && room.seats.some(s => s.bookedBy === currentUser.email)) return Swal.fire({text:'คุณมีที่นั่งแล้ว'});
                seat.bookedBy = currentUser.email; seat.name = currentUser.name;
                updateRoom();
            }
        }
        function updateRoom() { db.collection("classrooms").doc(activeRoomId).update({ seats: classrooms[activeRoomId].seats }); }

        // --- Management ---
        async function showUserManagement() {
            const snap = await db.collection("users").get();
            let rows = '';
            snap.forEach(doc => {
                const u = doc.data();
                if(doc.id !== SUPER_ADMIN) {
                    rows += `<div class="flex justify-between items-center p-3 glass mb-2">
                        <div class="text-left text-xs"><p class="font-bold">${doc.id}</p><p class="opacity-50 text-[10px] uppercase">${u.role}</p></div>
                        <button onclick="removeRole('${doc.id}')" class="text-red-400"><i class='bx bx-trash'></i></button>
                    </div>`;
                }
            });

            Swal.fire({
                title: 'จัดการสิทธิ์',
                background: '#020617', color: '#fff',
                html: `
                    <input id="addEmail" class="w-full bg-white/10 p-3 rounded-xl mb-2 text-sm outline-none border border-white/10" placeholder="Email @ntun.ac.th">
                    <select id="addRole" class="w-full bg-white/10 p-3 rounded-xl mb-4 text-sm outline-none border border-white/10">
                        ${currentUser.role === 'super_admin' ? '<option value="admin">ADMIN</option>' : ''}
                        <option value="teacher">TEACHER</option>
                    </select>
                    <button onclick="addRole()" class="bg-blue-600 w-full py-3 rounded-xl font-bold mb-6">บันทึก</button>
                    <div class="max-h-48 overflow-y-auto">${rows || 'ไม่มีข้อมูล'}</div>
                `,
                showConfirmButton: false
            });
        }

        window.addRole = async () => {
            const email = document.getElementById('addEmail').value.trim().toLowerCase();
            const role = document.getElementById('addRole').value;
            if(!email.endsWith('@ntun.ac.th')) return Swal.fire('Error', 'ต้องเป็นเมลโรงเรียน', 'error');
            await db.collection("users").doc(email).set({ role });
            Swal.close(); showUserManagement();
        };

        window.removeRole = async (email) => {
            await db.collection("users").doc(email).delete();
            Swal.close(); showUserManagement();
        };

        window.onload = initApp;
    </script>
</body>
</html>
