<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NTUN Space - Artistic Starry Classroom</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --accent: #30d158;
            --glass: rgba(255, 255, 255, 0.12);
            --glass-strong: rgba(255, 255, 255, 0.2);
        }

        body { 
            font-family: 'Kanit', sans-serif; 
            /* พื้นหลังไล่สีแบบ Artistic ตามรูปต้นฉบับ */
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 40%, #8b5cf6 70%, #d8b4fe 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
            position: relative;
        }

        /* เอฟเฟกต์ละอองดาวแบบ Art */
        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.4; pointer-events: none; z-index: -1;
        }

        .glass-ui {
            background: var(--glass);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 28px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
        }

        /* หน้ากระดานแบบยาวสมดุล */
        .whiteboard-box {
            width: 70%;
            height: 14px;
            background: linear-gradient(90deg, rgba(255,255,255,0.8), #fff, rgba(255,255,255,0.8));
            border-radius: 40px;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.4);
            margin: 0 auto 50px;
            display: flex; align-items: center; justify-content: center;
        }

        /* พื้นที่จำลองห้องเรียน */
        .classroom-container {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            aspect-ratio: 16/10;
            position: relative;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 40px;
            padding: 40px;
            display: flex; flex-direction: column;
        }

        /* โมเดลโต๊ะเรียนแบบสมจริง */
        .desk-block {
            position: absolute;
            width: 90px; height: 100px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .desk-shape {
            fill: #ffffff;
            stroke: rgba(0,0,0,0.1); stroke-width: 1;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        .chair-shape { fill: rgba(255,255,255,0.3); }

        .booked .desk-shape { fill: #ff4d4d; }
        .my-seat .desk-shape { fill: var(--accent); }

        .desk-label {
            position: absolute; top: 18%; width: 100%; text-align: center;
            font-size: 13px; font-weight: 800; color: #1c1c1e;
            pointer-events: none;
        }

        /* ซ่อน Scrollbar */
        ::-webkit-scrollbar { width: 0px; background: transparent; }

        @media (max-width: 768px) {
            .classroom-container { transform: scale(0.7); margin-top: -50px; }
            .desk-block { width: 70px; height: 80px; }
        }
    </style>
</head>
<body>

    <div id="loginPage" class="fixed inset-0 z-[200] flex items-center justify-center p-6">
        <div class="glass-ui p-12 w-full max-w-md text-center">
            <div class="w-24 h-24 bg-white/20 rounded-[2.5rem] mx-auto mb-8 flex items-center justify-center text-white text-5xl shadow-xl">
                <i class='bx bxs-graduation'></i>
            </div>
            <h1 class="text-4xl font-bold mb-2">NTUN Space</h1>
            <p class="opacity-60 mb-10 font-light">จองโต๊ะเรียนออนไลน์แบบสมจริง</p>
            <div id="g_id_onload" data-client_id="738644222886-o9uq6eonuu9hp8srsad1465lh9id41kj.apps.googleusercontent.com" data-callback="handleGoogleLogin"></div>
            <div class="g_id_signin flex justify-center" data-type="standard" data-shape="pill" data-size="large" data-theme="filled_blue"></div>
        </div>
    </div>

    <div id="mainApp" class="hidden min-h-screen flex flex-col p-4 md:p-8 max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-12">
            <div class="glass-ui px-6 py-3 flex items-center gap-3">
                <i class='bx bxs-dashboard text-2xl'></i>
                <span id="userName" class="font-bold">Loading...</span>
            </div>
            <button onclick="logout()" class="glass-ui w-12 h-12 flex items-center justify-center text-red-400 hover:bg-white/20 transition-all">
                <i class='bx bx-power-off text-2xl'></i>
            </button>
        </header>

        <div id="contentArea"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAlaTyhtXf-d6qDSD5AeWR33Hg3VCn55o8",
            authDomain: "ntunspace.firebaseapp.com",
            projectId: "ntunspace",
            storageBucket: "ntunspace.firebasestorage.app",
            messagingSenderId: "952526844615",
            appId: "1:952526844615:web:d1f78ba8e3b44c24ee84e2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const SUPER_ADMIN = "ntun21933@ntun.ac.th";

        let currentUser = null;
        let activeRoomId = null;
        let classrooms = {};

        function parseJwt(token) {
            var base64Url = token.split('.')[1];
            var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            return JSON.parse(decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')));
        }

        async function handleGoogleLogin(response) {
            const payload = parseJwt(response.credential);
            const email = payload.email.toLowerCase();
            if (!email.endsWith('@ntun.ac.th')) return;

            let role = 'student';
            const userDoc = await db.collection("users").doc(email).get();
            if (email === SUPER_ADMIN) role = 'super_admin';
            else if (userDoc.exists) role = userDoc.data().role;

            currentUser = { email, name: payload.name, role, picture: payload.picture };
            localStorage.setItem('ntun_art_session', JSON.stringify(currentUser));
            initApp();
        }

        const saved = localStorage.getItem('ntun_art_session');
        if (saved) { currentUser = JSON.parse(saved); initApp(); }

        function initApp() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('userName').innerText = currentUser.name.split(' ')[0];

            db.collection("classrooms").onSnapshot(snap => {
                classrooms = {};
                snap.forEach(doc => { classrooms[doc.id] = doc.data(); });
                renderUI();
            });
        }

        function renderUI() {
            if (activeRoomId && classrooms[activeRoomId]) renderRoomView();
            else renderDashboard();
        }

        function renderDashboard() {
            const area = document.getElementById('contentArea');
            const isAdmin = ['super_admin', 'admin', 'teacher'].includes(currentUser.role);
            let html = `<div class="mb-8"><h1 class="text-5xl font-bold">สวัสดี, ${currentUser.name.split(' ')[0]}</h1><p class="opacity-50 mt-2">พื้นที่สำหรับจัดการการจองโต๊ะเรียนของคุณ</p></div>`;

            if (isAdmin) {
                html += `
                <div class="glass-ui p-8 mb-10 flex flex-wrap gap-4 items-end">
                    <div class="flex-1 min-w-[200px]"><label class="text-xs font-bold opacity-40 ml-2 mb-2 block">ชื่อห้องเรียน</label><input id="roomName" type="text" placeholder="ม.x/x" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-white"></div>
                    <button onclick="createRoom()" class="glass-ui bg-blue-600 px-10 py-4 font-bold border-none">สร้างห้องเรียน</button>
                    <button onclick="showUserManagement()" class="glass-ui px-6 py-4 font-bold"><i class='bx bxs-user-detail'></i> สิทธิ์</button>
                </div>`;
            }

            html += `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">`;
            for (const id in classrooms) {
                html += `
                <div onclick="openRoom('${id}')" class="glass-ui p-8 cursor-pointer hover:bg-white/20 transition-all group">
                    <div class="flex justify-between items-start mb-6">
                        <i class='bx bxs-door-open text-4xl opacity-40'></i>
                        <button onclick="event.stopPropagation(); deleteRoom('${id}')" class="text-white/20 hover:text-red-400"><i class='bx bx-trash'></i></button>
                    </div>
                    <h3 class="text-2xl font-bold">${classrooms[id].name}</h3>
                    <p class="text-xs opacity-40 uppercase tracking-widest mt-1">Room ID: ${id}</p>
                </div>`;
            }
            html += `</div>`;
            area.innerHTML = html;
        }

        function renderRoomView() {
            const room = classrooms[activeRoomId];
            const area = document.getElementById('contentArea');
            const isAdmin = ['super_admin', 'admin', 'teacher'].includes(currentUser.role);
            
            area.innerHTML = `
                <div class="flex justify-between items-center mb-8">
                    <button onclick="activeRoomId=null; renderUI()" class="glass-ui px-6 py-3 flex items-center gap-2 font-bold"><i class='bx bx-left-arrow-alt'></i> กลับ</button>
                    <div class="flex gap-2">
                        ${isAdmin ? `<button onclick="resetTo332()" class="glass-ui bg-orange-500/20 text-orange-300 px-4 py-3 text-sm font-bold"><i class='bx bx-refresh'></i> จัดโต๊ะ 3:3:2</button>` : ''}
                        <div class="glass-ui px-6 py-3 text-sm font-bold opacity-60 uppercase">${room.name}</div>
                    </div>
                </div>
                
                <div class="classroom-container">
                    <div class="whiteboard-box"><p class="text-[8px] font-black tracking-[12px] opacity-20 text-black uppercase">Whiteboard</p></div>
                    <div id="roomMap">
                        ${room.seats.map(s => {
                            let state = '', display = s.id;
                            if (s.bookedBy) {
                                if (s.bookedBy === currentUser.email) { state = 'my-seat'; display = "YOU"; }
                                else { state = 'booked'; display = isAdmin ? s.name.split(' ')[0] : 'FULL'; }
                            }
                            return `
                            <div id="desk-${s.id}" class="desk-block ${state}" style="left:${s.x}px; top:${s.y}px;" onmousedown="startDrag(event, ${s.id})" ontouchstart="startDrag(event, ${s.id})">
                                <svg class="w-full h-full" viewBox="0 0 100 110">
                                    <rect x="25" y="80" width="50" height="20" rx="6" class="chair-shape" />
                                    <rect x="5" y="10" width="90" height="65" rx="10" class="desk-shape" />
                                    <rect x="15" y="20" width="70" height="3" rx="1" fill="rgba(0,0,0,0.05)" />
                                </svg>
                                <div class="desk-label">${display}</div>
                            </div>`;
                        }).join('')}
                    </div>
                </div>`;
        }

        // --- Logic Functions ---
        async function createRoom() {
            const name = document.getElementById('roomName').value;
            if (!name) return;
            const id = Math.random().toString(36).substring(2, 8).toUpperCase();
            const seats = [];
            for (let i = 0; i < 40; i++) {
                const row = Math.floor(i / 8);
                const col = i % 8;
                let x = 0;
                if (col < 3) x = 50 + (col * 110);
                else if (col < 6) x = 110 + (col * 110);
                else x = 170 + (col * 110);
                seats.push({ id: i+1, x, y: 10 + (row * 130), bookedBy: null, name: null });
            }
            await db.collection("classrooms").doc(id).set({ name, seats });
        }

        function resetTo332() {
            const room = classrooms[activeRoomId];
            room.seats.forEach((s, i) => {
                const row = Math.floor(i / 8);
                const col = i % 8;
                let x = 0;
                if (col < 3) x = 50 + (col * 110);
                else if (col < 6) x = 110 + (col * 110);
                else x = 170 + (col * 110);
                s.x = x; s.y = 10 + (row * 130);
            });
            db.collection("classrooms").doc(activeRoomId).update({ seats: room.seats });
        }

        // --- Drag & Booking ---
        let dragId = null, isMoving = false, startX, startY, initX, initY;
        function startDrag(e, id) {
            const isAdmin = ['super_admin','admin','teacher'].includes(currentUser.role);
            dragId = id; isMoving = false;
            const ev = e.touches ? e.touches[0] : e;
            startX = ev.clientX; startY = ev.clientY;
            const el = document.getElementById('desk-'+id);
            initX = parseInt(el.style.left); initY = parseInt(el.style.top);
        }

        document.addEventListener('mousemove', e => handleMove(e));
        document.addEventListener('touchmove', e => handleMove(e), {passive: false});
        function handleMove(e) {
            if(!dragId || !['super_admin','admin','teacher'].includes(currentUser.role)) return;
            const ev = e.touches ? e.touches[0] : e;
            const dx = ev.clientX - startX, dy = ev.clientY - startY;
            if(Math.abs(dx) > 5 || Math.abs(dy) > 5) isMoving = true;
            if(isMoving) {
                const el = document.getElementById('desk-'+dragId);
                el.style.left = (initX + dx)+'px'; el.style.top = (initY + dy)+'px';
            }
        }

        document.addEventListener('mouseup', () => {
            if(!dragId) return;
            if(isMoving) {
                const seat = classrooms[activeRoomId].seats.find(s => s.id === dragId);
                const el = document.getElementById('desk-'+dragId);
                seat.x = parseInt(el.style.left); seat.y = parseInt(el.style.top);
                db.collection("classrooms").doc(activeRoomId).update({ seats: classrooms[activeRoomId].seats });
            } else handleBooking(dragId);
            dragId = null;
        });

        async function handleBooking(sid) {
            const room = classrooms[activeRoomId];
            const seat = room.seats.find(s => s.id === sid);
            const isAdmin = ['super_admin','admin','teacher'].includes(currentUser.role);
            if (seat.bookedBy) {
                if (seat.bookedBy === currentUser.email || isAdmin) {
                    Swal.fire({ title: 'ยกเลิกจอง?', icon: 'warning', showCancelButton: true, customClass:{popup:'glass-ui'} }).then(res => {
                        if(res.isConfirmed) { seat.bookedBy = null; seat.name = null; db.collection("classrooms").doc(activeRoomId).update({ seats: room.seats }); }
                    });
                }
            } else {
                if (!isAdmin && room.seats.some(s => s.bookedBy === currentUser.email)) return;
                seat.bookedBy = currentUser.email; seat.name = currentUser.name;
                db.collection("classrooms").doc(activeRoomId).update({ seats: room.seats });
            }
        }

        function logout() { localStorage.clear(); location.reload(); }
        function openRoom(id) { activeRoomId = id; renderUI(); }
        async function deleteRoom(id) {
            Swal.fire({title:'ลบห้องนี้?', icon:'warning', showCancelButton:true, customClass:{popup:'glass-ui'}}).then(r => {
                if(r.isConfirmed) db.collection("classrooms").doc(id).delete();
            });
        }
    </script>
</body>
</html>
