<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NTUN Space - HeroUI Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        body { 
            font-family: 'Kanit', sans-serif; 
            background: linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%);
            min-height: 100vh; color: white; touch-action: manipulation;
        }
        
        .glass-card { 
            background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15); 
            border-radius: 2rem;
        }

        .hero-input {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 1.2rem; color: white; transition: 0.3s;
        }
        .hero-input:focus { border-color: #3b82f6; background: rgba(255, 255, 255, 0.1); outline: none; }

        .btn-pill {
            border-radius: 9999px; transition: all 0.2s; font-weight: 600;
            display: flex; items-center; justify-content: center; gap: 8px;
        }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-primary:active { transform: scale(0.95); }

        /* Desk Logic */
        .desk-container {
            width: 70px; height: 80px; position: absolute; cursor: pointer;
            transition: transform 0.2s;
        }
        .desk-container.dragging { z-index: 100; transform: scale(1.1); filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5)); }
        
        .desk-top { fill: rgba(255, 255, 255, 0.9); stroke: #94a3b8; stroke-width: 2; }
        .booked .desk-top { fill: #3b82f6; stroke: #2563eb; }
        .my-seat .desk-top { fill: #22c55e; stroke: #16a34a; }
        .desk-label { position: absolute; top: 25px; width: 100%; text-align: center; color: #1e293b; font-size: 10px; font-weight: 800; pointer-events: none; }
        .booked .desk-label, .my-seat .desk-label { color: white; }

        .map-wrapper { 
            width: 100%; overflow: auto; background: rgba(0,0,0,0.2); border-radius: 2rem;
            min-height: 60vh; position: relative; border: 1px solid rgba(255,255,255,0.1);
        }
        #roomMap { width: 1000px; height: 850px; position: relative; }

        /* Badge Colors */
        .badge-super_admin { background: #ef4444; }
        .badge-admin { background: #f97316; }
        .badge-teacher { background: #8b5cf6; }
        .badge-student { background: #3b82f6; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="loginPage" class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-[#0f172a]">
        <div class="glass-card p-10 w-full max-w-md text-center">
            <div class="w-20 h-20 bg-blue-600 rounded-[2rem] mx-auto mb-6 flex items-center justify-center text-white text-4xl shadow-2xl shadow-blue-500/40">
                <i class='bx bxs-school'></i>
            </div>
            <h1 class="text-3xl font-bold mb-2">NTUN Space</h1>
            <p class="text-white/50 mb-10 text-sm font-light">เข้าสู่ระบบด้วยอีเมล @ntun.ac.th</p>
            <div id="g_id_onload" data-client_id="738644222886-o9uq6eonuu9hp8srsad1465lh9id41kj.apps.googleusercontent.com" data-callback="handleGoogleLogin"></div>
            <div class="g_id_signin flex justify-center" data-type="standard" data-shape="pill" data-size="large"></div>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <header class="glass-card px-6 py-4 flex justify-between items-center mb-8">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 rounded-full overflow-hidden border-2 border-white/20">
                    <img id="userImg" src="" class="w-full h-full object-cover">
                </div>
                <div>
                    <h2 id="userName" class="font-bold text-sm leading-none mb-1">User Name</h2>
                    <span id="userRole" class="text-[9px] px-2 py-0.5 rounded-full font-black uppercase tracking-tighter">Role</span>
                </div>
            </div>
            <div class="flex gap-2">
                <button id="manageBtn" onclick="showUserManagement()" class="hidden w-10 h-10 glass-card flex items-center justify-center hover:bg-white/10 transition"><i class='bx bxs-user-plus'></i></button>
                <button onclick="logout()" class="w-10 h-10 glass-card flex items-center justify-center text-red-400 hover:bg-red-500/10 transition"><i class='bx bx-log-out'></i></button>
            </div>
        </header>

        <div id="contentArea"></div>
    </div>

    <script>
        // --- 1. Firebase & Config ---
        const firebaseConfig = {
            apiKey: "AIzaSyAlaTyhtXf-d6qDSD5AeWR33Hg3VCn55o8",
            authDomain: "ntunspace.firebaseapp.com",
            projectId: "ntunspace",
            storageBucket: "ntunspace.firebasestorage.app",
            messagingSenderId: "952526844615",
            appId: "1:952526844615:web:d1f78ba8e3b44c24ee84e2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const SUPER_ADMIN_EMAIL = "ntun21933@ntun.ac.th";
        let currentUser = null;
        let activeRoomId = null;
        let classrooms = {};

        // --- 2. Authentication ---
        async function handleGoogleLogin(response) {
            const payload = JSON.parse(atob(response.credential.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
            const email = payload.email.toLowerCase();

            if (!email.endsWith('@ntun.ac.th')) {
                return Swal.fire({icon: 'error', title: 'ผิดพลาด', text: 'เฉพาะอีเมล @ntun.ac.th เท่านั้น'});
            }

            let role = 'student';
            if (email === SUPER_ADMIN_EMAIL) {
                role = 'super_admin';
            } else {
                const userDoc = await db.collection("users").doc(email).get();
                if (userDoc.exists) role = userDoc.data().role;
            }

            currentUser = { email, name: payload.name, role, picture: payload.picture };
            localStorage.setItem('ntun_session_v7', JSON.stringify(currentUser));
            initApp();
        }

        function initApp() {
            const saved = localStorage.getItem('ntun_session_v7');
            if (saved) currentUser = JSON.parse(saved);
            if (!currentUser) return;

            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('userName').innerText = currentUser.name;
            document.getElementById('userImg').src = currentUser.picture;
            const roleBadge = document.getElementById('userRole');
            roleBadge.innerText = currentUser.role;
            roleBadge.className = `text-[9px] px-2 py-0.5 rounded-full font-black uppercase tracking-tighter badge-${currentUser.role}`;

            if (['super_admin', 'admin'].includes(currentUser.role)) {
                document.getElementById('manageBtn').classList.remove('hidden');
            }

            db.collection("classrooms").onSnapshot(snap => {
                snap.forEach(doc => { classrooms[doc.id] = doc.data(); });
                renderUI();
            });
        }

        function logout() { localStorage.removeItem('ntun_session_v7'); location.reload(); }

        // --- 3. UI Logic ---
        function renderUI() {
            if (activeRoomId) renderRoomView();
            else renderDashboard();
        }

        function renderDashboard() {
            const area = document.getElementById('contentArea');
            const isStaff = ['super_admin', 'admin', 'teacher'].includes(currentUser.role);
            let html = `<h1 class="text-3xl font-bold mb-6">สวัสดี, <span class="text-blue-400">${currentUser.name.split(' ')[0]}</span></h1>`;

            if (isStaff) {
                html += `
                <div class="glass-card p-6 mb-8 flex flex-col md:flex-row gap-4 items-end">
                    <div class="flex-1 w-full"><label class="text-[10px] ml-2 opacity-50 uppercase font-bold">ชื่อห้องเรียน (ม.3/1)</label><input id="roomName" class="hero-input w-full p-3 mt-1" placeholder="ระบุชื่อห้อง"></div>
                    <div class="w-full md:w-32"><label class="text-[10px] ml-2 opacity-50 uppercase font-bold">จำนวนโต๊ะ</label><input id="roomCount" type="number" value="40" class="hero-input w-full p-3 mt-1 text-center"></div>
                    <button onclick="createRoom()" class="btn-pill btn-primary px-8 py-3 w-full md:w-auto"><i class='bx bx-plus'></i> สร้างห้อง</button>
                </div>`;
            } else {
                html += `
                <div class="glass-card p-8 text-center mb-8 max-w-md mx-auto">
                    <h3 class="text-xl font-bold mb-4">เข้าสู่ห้องเรียน</h3>
                    <input id="joinCode" class="hero-input w-full p-4 text-center text-2xl font-black tracking-[10px] mb-4" placeholder="CODE">
                    <button onclick="joinRoom()" class="btn-pill btn-primary w-full py-4">ตกลง</button>
                </div>`;
            }

            html += `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">`;
            for (const id in classrooms) {
                if (!isStaff && activeRoomId !== id) continue; // นักเรียนจะเห็นเฉพาะห้องที่จองหรือมีรหัส
                html += `
                <div onclick="activeRoomId='${id}'; renderUI()" class="glass-card p-5 cursor-pointer hover:bg-white/10 transition group">
                    <div class="flex justify-between items-start mb-4">
                        <div class="w-10 h-10 bg-white/10 rounded-xl flex items-center justify-center text-xl"><i class='bx bx-door-open'></i></div>
                        ${isStaff ? `<button onclick="event.stopPropagation(); deleteRoom('${id}')" class="text-white/20 hover:text-red-500"><i class='bx bx-trash'></i></button>` : ''}
                    </div>
                    <h3 class="text-lg font-bold">${classrooms[id].name}</h3>
                    <p class="text-[10px] opacity-40 font-bold uppercase tracking-widest">รหัสห้อง: ${id}</p>
                </div>`;
            }
            html += `</div>`;
            area.innerHTML = html;
        }

        function renderRoomView() {
            const room = classrooms[activeRoomId];
            const isStaff = ['super_admin', 'admin', 'teacher'].includes(currentUser.role);
            document.getElementById('contentArea').innerHTML = `
                <div class="flex justify-between items-center mb-6">
                    <button onclick="activeRoomId=null; renderUI()" class="btn-pill glass-card px-5 py-2 text-sm"><i class='bx bx-chevron-left'></i> ออก</button>
                    <div class="flex gap-2">
                        ${isStaff ? `<button onclick="resetLayout()" class="btn-pill bg-white/10 px-4 py-2 text-xs">รีเซ็ต 3:3:2</button>` : ''}
                        <div class="glass-card px-4 py-2 text-xs font-bold text-blue-400">ID: ${activeRoomId}</div>
                    </div>
                </div>
                <div class="map-wrapper custom-scroll">
                    <div id="roomMap">
                        <div class="absolute top-10 left-1/2 -translate-x-1/2 w-64 h-8 bg-white/10 border border-white/20 rounded-xl flex items-center justify-center text-[8px] tracking-[10px] uppercase opacity-30">Whiteboard</div>
                        ${room.seats.map(s => {
                            let state = '';
                            if (s.bookedBy === currentUser.email) state = 'my-seat';
                            else if (s.bookedBy) state = 'booked';
                            
                            let label = s.id;
                            if (s.bookedBy) label = isStaff ? s.name.split(' ')[0] : (s.bookedBy === currentUser.email ? 'YOU' : 'จองแล้ว');

                            return `
                            <div id="desk-${s.id}" class="desk-container ${state}" style="left:${s.x}px; top:${s.y}px;" 
                                 onmousedown="startDrag(event, ${s.id})" ontouchstart="startDrag(event, ${s.id})">
                                <svg viewBox="0 0 100 110">
                                    <rect x="5" y="10" width="90" height="60" rx="12" class="desk-top" />
                                    <rect x="25" y="80" width="50" height="20" rx="5" fill="rgba(255,255,255,0.2)" />
                                </svg>
                                <div class="desk-label">${label}</div>
                            </div>`;
                        }).join('')}
                    </div>
                </div>`;
        }

        // --- 4. Logic Functions ---
        function calculate332Positions(count) {
            const seats = [];
            const blockGap = 100, colW = 85, rowH = 110;
            for (let i = 0; i < count; i++) {
                let x; const row = Math.floor(i / 8), pos = i % 8;
                if (pos < 3) x = pos * colW;
                else if (pos < 6) x = pos * colW + blockGap;
                else x = pos * colW + (blockGap * 2);
                seats.push({ id: i + 1, x: x + 80, y: row * rowH + 150, bookedBy: null, name: null });
            }
            return seats;
        }

        async function createRoom() {
            const name = document.getElementById('roomName').value;
            const count = parseInt(document.getElementById('roomCount').value);
            if (!name || isNaN(count)) return;
            const id = Math.random().toString(36).substring(2, 8).toUpperCase();
            await db.collection("classrooms").doc(id).set({ name, seats: calculate332Positions(count) });
            Swal.fire({icon:'success', title:'สร้างสำเร็จ', text:'รหัสห้อง: '+id});
        }

        function joinRoom() {
            const code = document.getElementById('joinCode').value.toUpperCase();
            if (classrooms[code]) { activeRoomId = code; renderUI(); }
            else Swal.fire({icon:'error', title:'ไม่พบห้อง'});
        }

        async function resetLayout() {
            const room = classrooms[activeRoomId];
            const newSeats = calculate332Positions(room.seats.length);
            newSeats.forEach((s, i) => { if(room.seats[i]) { s.bookedBy = room.seats[i].bookedBy; s.name = room.seats[i].name; } });
            await db.collection("classrooms").doc(activeRoomId).update({ seats: newSeats });
        }

        async function deleteRoom(id) {
            const res = await Swal.fire({title:'ลบห้อง?', showCancelButton:true, confirmButtonColor:'#ef4444'});
            if(res.isConfirmed) await db.collection("classrooms").doc(id).delete();
        }

        // --- 5. Drag & Booking ---
        let dragId = null, isMoving = false, startX, startY, initX, initY;
        function startDrag(e, id) {
            const isStaff = ['super_admin', 'admin', 'teacher'].includes(currentUser.role);
            dragId = id; isMoving = false;
            const ev = e.touches ? e.touches[0] : e;
            startX = ev.clientX; startY = ev.clientY;
            const el = document.getElementById('desk-'+id);
            initX = parseInt(el.style.left); initY = parseInt(el.style.top);
            if(isStaff) el.classList.add('dragging');
        }

        document.addEventListener('mousemove', handleMove);
        document.addEventListener('touchmove', handleMove, {passive:false});
        function handleMove(e) {
            if(!dragId || !['super_admin', 'admin', 'teacher'].includes(currentUser.role)) return;
            const ev = e.touches ? e.touches[0] : e;
            const dx = ev.clientX - startX; const dy = ev.clientY - startY;
            if(Math.abs(dx) > 5 || Math.abs(dy) > 5) isMoving = true;
            if(isMoving) {
                const el = document.getElementById('desk-'+dragId);
                el.style.left = (initX + dx)+'px'; el.style.top = (initY + dy)+'px';
            }
        }

        document.addEventListener('mouseup', endDrag);
        document.addEventListener('touchend', endDrag);
        async function endDrag() {
            if(!dragId) return;
            const isStaff = ['super_admin', 'admin', 'teacher'].includes(currentUser.role);
            if(isMoving && isStaff) {
                const el = document.getElementById('desk-'+dragId);
                const room = classrooms[activeRoomId];
                const seat = room.seats.find(s => s.id === dragId);
                seat.x = parseInt(el.style.left); seat.y = parseInt(el.style.top);
                await db.collection("classrooms").doc(activeRoomId).update({ seats: room.seats });
            } else if(!isMoving) {
                handleBooking(dragId);
            }
            if(isStaff) document.getElementById('desk-'+dragId).classList.remove('dragging');
            dragId = null;
        }

        async function handleBooking(sid) {
            const room = classrooms[activeRoomId];
            const seat = room.seats.find(s => s.id === sid);
            const isStaff = ['super_admin', 'admin', 'teacher'].includes(currentUser.role);

            if (seat.bookedBy) {
                if (seat.bookedBy === currentUser.email || isStaff) {
                    const res = await Swal.fire({title:'ยกเลิกที่นั่ง?', showCancelButton:true});
                    if(res.isConfirmed) { seat.bookedBy = null; seat.name = null; updateRoom(); }
                }
            } else {
                if (!isStaff && room.seats.some(s => s.bookedBy === currentUser.email)) return Swal.fire({text:'คุณมีที่นั่งแล้ว'});
                seat.bookedBy = currentUser.email; seat.name = currentUser.name;
                updateRoom();
            }
        }
        function updateRoom() { db.collection("classrooms").doc(activeRoomId).update({ seats: classrooms[activeRoomId].seats }); }

        // --- 6. User Management (The Missing Logic) ---
        async function showUserManagement() {
            const snap = await db.collection("users").get();
            let rows = '';
            snap.forEach(doc => {
                const u = doc.data();
                if(doc.id !== SUPER_ADMIN_EMAIL) {
                    rows += `<div class="flex justify-between items-center p-3 glass-card mb-2">
                        <div class="text-left"><p class="text-xs font-bold">${doc.id}</p><p class="text-[9px] opacity-50">${u.role}</p></div>
                        <button onclick="removeRole('${doc.id}')" class="text-red-400"><i class='bx bx-trash'></i></button>
                    </div>`;
                }
            });

            Swal.fire({
                title: 'จัดการสิทธิ์',
                background: '#0f172a', color: '#fff',
                html: `
                    <input id="addEmail" class="hero-input w-full p-3 mb-2 text-sm" placeholder="อีเมล @ntun.ac.th">
                    <select id="addRole" class="hero-input w-full p-3 mb-4 text-sm">
                        ${currentUser.role === 'super_admin' ? '<option value="admin">Admin</option>' : ''}
                        <option value="teacher">Teacher</option>
                    </select>
                    <button onclick="addRole()" class="btn-pill btn-primary w-full py-3 mb-6">เพิ่มสิทธิ์</button>
                    <div class="max-h-60 overflow-auto">${rows || 'ไม่มีรายชื่อ'}</div>
                `,
                showConfirmButton: false
            });
        }

        window.addRole = async () => {
            const email = document.getElementById('addEmail').value.trim().toLowerCase();
            const role = document.getElementById('addRole').value;
            if(!email.endsWith('@ntun.ac.th')) return Swal.fire({text:'ต้องเป็นเมลโรงเรียน'});
            await db.collection("users").doc(email).set({ role });
            Swal.close(); showUserManagement();
        };

        window.removeRole = async (email) => {
            await db.collection("users").doc(email).delete();
            Swal.close(); showUserManagement();
        };

        window.onload = initApp;
    </script>
</body>
</html>
