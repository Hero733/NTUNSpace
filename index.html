<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTUN SPACE - Ultra Premium</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root { --ntun-blue: #6366f1; --ntun-cyan: #7dd3fc; --ntun-purple: #a855f7; }
        
        body { 
            font-family: 'Kanit', sans-serif; 
            background: linear-gradient(180deg, var(--ntun-cyan) 0%, var(--ntun-blue) 50%, var(--ntun-purple) 100%);
            min-height: 100vh; color: white; overflow-x: hidden; position: relative;
        }

        /* --- Background Artwork --- */
        .stars { position: fixed; inset: 0; background: url('https://s3-us-west-2.amazonaws.com/s.cdpn.io/123163/stars.png'); opacity: 0.3; z-index: -1; }
        .clouds { position: fixed; bottom: -80px; left: 0; width: 100%; height: 350px; background: url('https://raw.githubusercontent.com/Tarikul-Islam-Anik/Animated-Fluent-Emojis/master/Emojis/Travel%20and%20Places/Cloud.png') repeat-x; background-size: contain; opacity: 0.25; z-index: -1; filter: brightness(1.5); }
        .floating-icon { position: fixed; opacity: 0.08; font-size: 180px; z-index: -2; pointer-events: none; filter: blur(1px); }

        /* --- Glassmorphism --- */
        .glass-panel { background: rgba(255, 255, 255, 0.18); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.25); border-radius: 3rem; }
        .glass-pill { border-radius: 999px; background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.2); }
        
        /* --- Login Card --- */
        .login-card { width: 480px; padding: 70px 50px; text-align: center; box-shadow: 0 40px 100px -20px rgba(0,0,0,0.3); }
        .logo-box { width: 130px; height: 130px; background: rgba(255,255,255,0.25); border-radius: 35px; margin: 0 auto 35px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }

        /* --- Desk System --- */
        .desk { width: 68px; height: 85px; position: absolute; cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .desk-svg-top { fill: rgba(255, 255, 255, 0.25); stroke: rgba(255, 255, 255, 0.5); stroke-width: 2.5; rx: 14; }
        .booked .desk-svg-top { fill: rgba(59, 130, 246, 0.7); stroke: #93c5fd; filter: drop-shadow(0 0 12px rgba(59,130,246,0.6)); }
        .my-seat .desk-svg-top { fill: rgba(34, 197, 94, 0.7); stroke: #86efac; filter: drop-shadow(0 0 18px rgba(34,197,94,0.7)); }
        .desk-txt { position: absolute; top: 28px; width: 100%; text-align: center; font-size: 11px; font-weight: 700; pointer-events: none; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <div class="stars"></div>
    <div class="clouds"></div>
    <i class='bx bx-book-open floating-icon' style="top: 15%; left: 8%;"></i>
    <i class='bx bx-joystick floating-icon' style="bottom: 20%; right: 10%;"></i>

    <div id="loginPage" class="fixed inset-0 z-[100] flex items-center justify-center p-6">
        <div class="glass-panel login-card">
            <div class="logo-box">
                <img src="https://raw.githubusercontent.com/ntun-space/assets/main/image_d2739b.png" onerror="this.src='https://www.ntun.ac.th/wp-content/uploads/2021/04/logo-ntun.png'" class="w-24 drop-shadow-2xl">
            </div>
            <h1 class="text-4xl font-black mb-1 tracking-tighter">NTUN SPACE</h1>
            <p class="text-white/60 mb-12 font-light italic text-sm">ระบบจองที่นั่งอัจฉริยะ น.ต.น.</p>
            
            <div id="g_id_onload" data-client_id="738644222886-o9uq6eonuu9hp8srsad1465lh9id41kj.apps.googleusercontent.com" data-callback="handleGoogleLogin"></div>
            <div class="g_id_signin flex justify-center" data-type="standard" data-shape="pill" data-size="large" data-theme="filled_blue"></div>
            <p class="mt-12 text-[10px] opacity-40 font-bold uppercase tracking-widest">เฉพาะบัญชี @ntun.ac.th</p>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <header class="p-6 flex flex-col lg:flex-row justify-between items-center gap-5">
            <div class="glass-pill px-8 py-3.5 flex items-center gap-4">
                <img src="https://raw.githubusercontent.com/ntun-space/assets/main/image_d2739b.png" onerror="this.src='https://www.ntun.ac.th/wp-content/uploads/2021/04/logo-ntun.png'" class="w-9">
                <div class="text-[10px] font-black leading-tight uppercase opacity-80 border-l border-white/20 pl-4">
                    ระบบจองที่นั่งเรียน<br>โรงเรียนนวมินทราชินูทิศ เตรียมอุดมศึกษาน้อมเกล้า
                </div>
            </div>

            <div class="flex items-center gap-3">
                <div class="glass-pill flex items-center gap-3 pr-5 pl-1.5 py-1.5">
                    <img id="userImg" src="" class="w-10 h-10 rounded-full border-2 border-white/30">
                    <span id="userName" class="text-sm font-bold tracking-tight"></span>
                </div>
                <button onclick="logout()" class="glass-pill bg-red-500/30 px-6 py-3 text-sm font-bold hover:bg-red-500/50 transition-all">
                    <i class='bx bx-power-off mr-2'></i>ออก
                </button>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-6 py-10">
            <div id="contentArea"></div>
        </main>
    </div>

    <script>
        // --- Firebase Config ---
        const firebaseConfig = {
            apiKey: "AIzaSyAlaTyhtXf-d6qDSD5AeWR33Hg3VCn55o8",
            authDomain: "ntunspace.firebaseapp.com",
            projectId: "ntunspace",
            storageBucket: "ntunspace.firebasestorage.app",
            messagingSenderId: "952526844615",
            appId: "1:952526844615:web:d1f78ba8e3b44c24ee84e2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const SUPER_ADMIN = "ntun21933@ntun.ac.th";
        let currentUser = null;
        let activeRoomId = null;
        let classrooms = {};

        // --- Auth Fix (Thai Name) ---
        function decodeJwt(token) {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const jsonPayload = decodeURIComponent(atob(base64).split('').map(c => {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        }

        async function handleGoogleLogin(response) {
            const payload = decodeJwt(response.credential);
            const email = payload.email.toLowerCase();
            if (!email.endsWith('@ntun.ac.th')) return Swal.fire('Error', 'ต้องใช้เมล @ntun.ac.th', 'error');

            let role = 'student';
            if (email === SUPER_ADMIN) role = 'super_admin';
            else {
                const userDoc = await db.collection("users").doc(email).get();
                if (userDoc.exists) role = userDoc.data().role;
            }

            currentUser = { email, name: payload.name, role, picture: payload.picture };
            localStorage.setItem('ntun_final_v1', JSON.stringify(currentUser));
            initApp();
        }

        function initApp() {
            const saved = localStorage.getItem('ntun_final_v1');
            if (saved) currentUser = JSON.parse(saved);
            if (!currentUser) return;

            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('userName').innerText = currentUser.name;
            document.getElementById('userImg').src = currentUser.picture;

            db.collection("classrooms").onSnapshot(snap => {
                classrooms = {};
                snap.forEach(doc => { classrooms[doc.id] = doc.data(); });
                renderUI();
            });
        }

        function logout() { localStorage.removeItem('ntun_final_v1'); location.reload(); }

        // --- Core UI ---
        function renderUI() {
            if (activeRoomId) renderRoomView();
            else renderDashboard();
        }

        function renderDashboard() {
            const area = document.getElementById('contentArea');
            const isStaff = ['super_admin', 'admin', 'teacher'].includes(currentUser.role);
            
            let html = `
                <div class="mb-14">
                    <p class="text-white/60 text-xl font-light">ยินดีต้อนรับกลับมา</p>
                    <h1 class="text-6xl font-black mt-2 tracking-tighter">สวัสดี, ${currentUser.name}</h1>
                    <div class="mt-4 glass-pill inline-flex px-6 py-2 text-xs font-bold uppercase tracking-widest text-blue-200">
                        สถานะ: ${currentUser.role}
                    </div>
                </div>`;

            if (isStaff) {
                html += `
                <div class="glass-panel p-8 mb-14 flex flex-col md:flex-row gap-6 items-end">
                    <div class="flex-1 w-full">
                        <label class="text-xs font-bold ml-4 opacity-50 uppercase">ชื่อห้องเรียน</label>
                        <input id="rName" class="w-full bg-white/10 p-4 rounded-2xl mt-2 border border-white/10 outline-none focus:border-white/40" placeholder="เช่น ม.6/1">
                    </div>
                    <div class="w-full md:w-32">
                        <label class="text-xs font-bold ml-4 opacity-50 uppercase">ที่นั่ง</label>
                        <input id="rCount" type="number" value="40" class="w-full bg-white/10 p-4 rounded-2xl mt-2 text-center border border-white/10">
                    </div>
                    <button onclick="createRoom()" class="bg-gradient-to-r from-blue-400 to-indigo-500 px-10 py-4 rounded-2xl font-black shadow-2xl hover:scale-105 transition-all">สร้างห้อง</button>
                    <button onclick="showUserManagement()" class="glass-pill w-14 h-14 flex items-center justify-center text-2xl hover:bg-white/20 transition-all"><i class='bx bx-shield-quarter'></i></button>
                </div>`;
            }

            html += `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">`;
            for (const id in classrooms) {
                const room = classrooms[id];
                const booked = room.seats.filter(s => s.bookedBy).length;
                html += `
                <div onclick="activeRoomId='${id}'; renderUI()" class="glass-panel p-8 cursor-pointer hover:bg-white/20 transition-all group">
                    <div class="flex justify-between items-start mb-12">
                        <div class="w-16 h-16 glass-pill flex items-center justify-center text-4xl text-blue-300"><i class='bx bxs-door-open'></i></div>
                        ${isStaff ? `<button onclick="event.stopPropagation(); deleteRoom('${id}')" class="text-white/20 hover:text-red-500 p-2 transition-all"><i class='bx bx-trash text-2xl'></i></button>` : ''}
                    </div>
                    <h3 class="text-3xl font-black mb-1">${room.name}</h3>
                    <p class="text-xs opacity-50 font-bold tracking-widest uppercase">ID: ${id}</p>
                    <div class="mt-10">
                        <div class="flex justify-between text-xs mb-2"><span>สมาชิก</span><span>${booked}/${room.seats.length}</span></div>
                        <div class="w-full h-3 bg-white/10 rounded-full overflow-hidden">
                            <div class="h-full bg-gradient-to-r from-blue-400 to-green-400 transition-all duration-1000" style="width:${(booked/room.seats.length)*100}%"></div>
                        </div>
                    </div>
                </div>`;
            }
            html += `</div>`;
            area.innerHTML = html;
        }

        function renderRoomView() {
            const room = classrooms[activeRoomId];
            const isStaff = ['super_admin', 'admin', 'teacher'].includes(currentUser.role);
            
            document.getElementById('contentArea').innerHTML = `
                <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-5">
                    <button onclick="activeRoomId=null; renderUI()" class="glass-pill px-8 py-3.5 flex items-center gap-2 hover:bg-white/20 transition font-bold">
                        <i class='bx bx-left-arrow-alt text-2xl'></i> กลับหน้าหลัก
                    </button>
                    <div class="flex gap-3">
                        ${isStaff ? `<button onclick="resetLayout()" class="glass-pill px-6 py-3.5 text-xs font-black uppercase bg-blue-500/20 hover:bg-blue-500/40">จัดผัง 3:3:2</button>` : ''}
                        <div class="glass-pill px-8 py-3.5 text-sm font-black text-blue-300 border-white/40">ROOM: ${activeRoomId}</div>
                    </div>
                </div>
                
                <div class="glass-panel p-10 overflow-auto min-h-[80vh] flex justify-center bg-black/10">
                    <div id="roomMap" class="relative w-[1000px] h-[850px]">
                        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-96 h-14 bg-white/10 rounded-2xl border border-white/20 flex items-center justify-center text-[10px] tracking-[20px] opacity-40 font-black uppercase">Whiteboard</div>
                        
                        ${room.seats.map(s => {
                            let state = s.bookedBy === currentUser.email ? 'my-seat' : (s.bookedBy ? 'booked' : '');
                            let label = s.id;
                            if (s.bookedBy) label = isStaff ? s.name.split(' ')[0] : (s.bookedBy === currentUser.email ? 'ME' : 'Reserved');
                            return `
                            <div id="desk-${s.id}" class="desk ${state}" style="left:${s.x}px; top:${s.y}px;" 
                                 onmousedown="startDrag(event, ${s.id})" ontouchstart="startDrag(event, ${s.id})">
                                <svg viewBox="0 0 100 110">
                                    <rect x="5" y="10" width="90" height="75" class="desk-svg-top" />
                                    <path d="M25 95 Q50 115 75 95" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="4" stroke-linecap="round" />
                                </svg>
                                <div class="desk-txt text-white">${label}</div>
                            </div>`;
                        }).join('')}
                    </div>
                </div>`;
        }

        // --- Functions ---
        async function createRoom() {
            const name = document.getElementById('rName').value;
            const count = parseInt(document.getElementById('rCount').value);
            if (!name || isNaN(count)) return;
            const id = Math.random().toString(36).substring(2, 8).toUpperCase();
            await db.collection("classrooms").doc(id).set({ name, seats: calc332(count) });
        }

        async function deleteRoom(id) {
            const res = await Swal.fire({ title: 'ยืนยันการลบห้อง?', text: 'ข้อมูลทั้งหมดจะหายไป', icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', background: '#1e1b4b', color: '#fff' });
            if (res.isConfirmed) await db.collection("classrooms").doc(id).delete();
        }

        async function resetLayout() {
            const room = classrooms[activeRoomId];
            const newSeats = calc332(room.seats.length);
            newSeats.forEach((s, i) => { if(room.seats[i]) { s.bookedBy = room.seats[i].bookedBy; s.name = room.seats[i].name; } });
            await db.collection("classrooms").doc(activeRoomId).update({ seats: newSeats });
        }

        function calc332(count) {
            const seats = [];
            const blockGap = 95, colW = 85, rowH = 125;
            for (let i = 0; i < count; i++) {
                let x; const row = Math.floor(i / 8), pos = i % 8;
                if (pos < 3) x = pos * colW;
                else if (pos < 6) x = pos * colW + blockGap;
                else x = pos * colW + (blockGap * 2);
                seats.push({ id: i + 1, x: x + 100, y: row * rowH + 180, bookedBy: null, name: null });
            }
            return seats;
        }

        // --- Drag/Booking Logic ---
        let dragId = null, isMoving = false, startX, startY, initX, initY;
        function startDrag(e, id) {
            const isStaff = ['super_admin', 'admin', 'teacher'].includes(currentUser.role);
            dragId = id; isMoving = false;
            const ev = e.touches ? e.touches[0] : e;
            startX = ev.clientX; startY = ev.clientY;
            const el = document.getElementById('desk-'+id);
            initX = parseInt(el.style.left); initY = parseInt(el.style.top);
        }

        document.addEventListener('mousemove', (e) => {
            if(!dragId || !['super_admin', 'admin', 'teacher'].includes(currentUser.role)) return;
            isMoving = true;
            const dx = e.clientX - startX; const dy = e.clientY - startY;
            const el = document.getElementById('desk-'+dragId);
            el.style.left = (initX + dx)+'px'; el.style.top = (initY + dy)+'px';
        });

        document.addEventListener('mouseup', async () => {
            if(!dragId) return;
            if(isMoving) {
                const room = classrooms[activeRoomId];
                const seat = room.seats.find(s => s.id === dragId);
                const el = document.getElementById('desk-'+dragId);
                seat.x = parseInt(el.style.left); seat.y = parseInt(el.style.top);
                await db.collection("classrooms").doc(activeRoomId).update({ seats: room.seats });
            } else { handleBooking(dragId); }
            dragId = null;
        });

        async function handleBooking(sid) {
            const room = classrooms[activeRoomId];
            const seat = room.seats.find(s => s.id === sid);
            const isStaff = ['super_admin', 'admin', 'teacher'].includes(currentUser.role);
            if (seat.bookedBy) {
                if (seat.bookedBy === currentUser.email || isStaff) {
                    const res = await Swal.fire({ title: 'ยกเลิกการจอง?', icon: 'question', showCancelButton: true, background: '#1e1b4b', color: '#fff' });
                    if(res.isConfirmed) { seat.bookedBy = null; seat.name = null; updateRoom(); }
                }
            } else {
                if (!isStaff && room.seats.some(s => s.bookedBy === currentUser.email)) return Swal.fire({text:'คุณได้จองไปแล้วหนึ่งที่นั่ง', background: '#1e1b4b', color: '#fff'});
                seat.bookedBy = currentUser.email; seat.name = currentUser.name;
                updateRoom();
            }
        }
        function updateRoom() { db.collection("classrooms").doc(activeRoomId).update({ seats: classrooms[activeRoomId].seats }); }

        async function showUserManagement() {
            const snap = await db.collection("users").get();
            let rows = '';
            snap.forEach(doc => {
                if(doc.id !== SUPER_ADMIN) {
                    rows += `<div class="flex justify-between items-center p-4 glass-pill mb-3">
                        <div class="text-left text-xs"><p class="font-bold">${doc.id}</p><p class="opacity-50 uppercase">${doc.data().role}</p></div>
                        <button onclick="removeRole('${doc.id}')" class="text-red-400 p-2 hover:scale-110 transition-all"><i class='bx bx-trash'></i></button>
                    </div>`;
                }
            });
            Swal.fire({
                title: 'จัดการสิทธิ์สมาชิก',
                background: '#1e1b4b', color: '#fff',
                html: `<div class="p-4">
                    <input id="addEmail" class="w-full bg-white/10 p-4 rounded-2xl mb-3 text-sm outline-none border border-white/10" placeholder="Email @ntun.ac.th">
                    <select id="addRole" class="w-full bg-white/10 p-4 rounded-2xl mb-6 text-sm outline-none border border-white/10">
                        ${currentUser.role === 'super_admin' ? '<option value="admin">ADMIN</option>' : ''}
                        <option value="teacher">TEACHER</option>
                    </select>
                    <button onclick="addRole()" class="bg-blue-600 w-full py-4 rounded-2xl font-black mb-8 shadow-xl">เพิ่มสมาชิกใหม่</button>
                    <div class="max-h-60 overflow-y-auto">${rows || '<p class="opacity-30">ไม่มีรายชื่อ</p>'}</div>
                </div>`,
                showConfirmButton: false
            });
        }

        window.addRole = async () => {
            const email = document.getElementById('addEmail').value.trim().toLowerCase();
            const role = document.getElementById('addRole').value;
            if(!email.endsWith('@ntun.ac.th')) return Swal.fire('Error', 'ต้องเป็นเมล @ntun.ac.th', 'error');
            await db.collection("users").doc(email).set({ role });
            Swal.close(); showUserManagement();
        };

        window.removeRole = async (email) => {
            await db.collection("users").doc(email).delete();
            Swal.close(); showUserManagement();
        };

        window.onload = initApp;
    </script>
</body>
</html>
