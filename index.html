<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NTUN Space - Starry Classroom</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --accent: #30d158;
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.2);
        }

        body { 
            font-family: 'Kanit', sans-serif; 
            background: #020617;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(59, 130, 246, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(147, 51, 234, 0.15) 0%, transparent 40%),
                url('https://www.transparenttextures.com/patterns/stardust.png'); /* พื้นหลังดวงดาว */
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }

        /* Glassmorphism Components */
        .glass {
            background: var(--glass);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 24px;
        }

        .btn-ios {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 8px 20px;
            transition: all 0.3s;
            font-weight: 500;
        }
        .btn-ios:hover { background: rgba(255, 255, 255, 0.25); transform: translateY(-2px); }

        /* Responsive Room Map (No Scroll) */
        .room-viewport {
            width: 100%;
            aspect-ratio: 4/3;
            max-height: 70vh;
            position: relative;
            background: rgba(0,0,0,0.2);
            border-radius: 30px;
            overflow: hidden; /* ห้ามเลื่อน */
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        #roomMap {
            flex-grow: 1;
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* Desk Design */
        .desk-unit {
            position: absolute;
            width: 10%; /* Auto size based on container */
            aspect-ratio: 1/1.2;
            cursor: pointer;
            transition: transform 0.2s, left 0.5s, top 0.5s;
        }
        .desk-svg { width: 100%; height: 100%; }
        .desk-top { fill: #f8fafc; rx: 8; }
        .booked .desk-top { fill: #ef4444; }
        .my-seat .desk-top { fill: var(--accent); }
        .desk-label { 
            position: absolute; top: 20%; width: 100%; text-align: center; 
            font-size: 1.2vw; font-weight: 700; color: #1e293b;
        }

        /* Long Whiteboard */
        .whiteboard {
            width: 80%;
            height: 12px;
            background: linear-gradient(90deg, #fff, #e2e8f0, #fff);
            margin: 0 auto 40px;
            border-radius: 50px;
            box-shadow: 0 0 30px rgba(255,255,255,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Star Animation */
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        .star { position: fixed; background: white; border-radius: 50%; animation: twinkle var(--d) infinite; }

        /* SweetAlert */
        .swal2-popup.glass-popup {
            background: rgba(15, 23, 42, 0.8) !important;
            backdrop-filter: blur(20px) !important;
            border: 1px solid var(--border) !important;
            border-radius: 32px !important;
            color: white !important;
        }
    </style>
</head>
<body>

    <div id="stars"></div>

    <div id="loginPage" class="fixed inset-0 z-[200] flex items-center justify-center p-6">
        <div class="glass p-12 w-full max-w-md text-center">
            <div class="w-24 h-24 bg-gradient-to-tr from-blue-600 to-purple-600 rounded-[2.5rem] mx-auto mb-8 flex items-center justify-center text-white text-5xl shadow-2xl">
                <i class='bx bxs-star'></i>
            </div>
            <h1 class="text-4xl font-bold mb-2 tracking-tight">NTUN Space</h1>
            <p class="text-white/50 mb-10 font-light">ระบบจองโต๊ะเรียนออนไลน์</p>
            <div id="g_id_onload" data-client_id="738644222886-o9uq6eonuu9hp8srsad1465lh9id41kj.apps.googleusercontent.com" data-callback="handleGoogleLogin"></div>
            <div class="g_id_signin flex justify-center" data-type="standard" data-shape="pill" data-size="large" data-theme="filled_blue"></div>
        </div>
    </div>

    <div id="mainApp" class="hidden min-h-screen flex flex-col p-4 md:p-8 max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div class="glass px-6 py-3 flex items-center gap-3">
                <img src="https://upload.wikimedia.org/wikipedia/th/thumb/f/f4/Emblem_of_Nawaminthrachinuthit_Triam_Udom_Suksa_Nomklao_School.png/220px-Emblem_of_Nawaminthrachinuthit_Triam_Udom_Suksa_Nomklao_School.png" class="w-8 h-8">
                <span class="font-bold text-sm hidden sm:block">NTUN SEAT RESERVATION</span>
            </div>
            <div class="flex items-center gap-3">
                <div class="glass pl-2 pr-5 py-2 flex items-center gap-3">
                    <img id="userImg" src="" class="w-9 h-9 rounded-full border border-white/20">
                    <span id="userName" class="text-sm font-bold">User</span>
                </div>
                <button onclick="logout()" class="btn-ios text-red-400 bg-red-400/10"><i class='bx bx-power-off'></i></button>
            </div>
        </header>

        <div id="contentArea" class="animate-ui"></div>
    </div>

    <script>
        // --- 1. Starry Background Logic ---
        function createStars() {
            const container = document.getElementById('stars');
            for(let i=0; i<150; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 'px';
                star.style.width = size; star.style.height = size;
                star.style.top = Math.random() * 100 + '%';
                star.style.left = Math.random() * 100 + '%';
                star.style.setProperty('--d', (Math.random() * 3 + 2) + 's');
                container.appendChild(star);
            }
        }
        createStars();

        // --- 2. Firebase & Auth ---
        const firebaseConfig = {
            apiKey: "AIzaSyAlaTyhtXf-d6qDSD5AeWR33Hg3VCn55o8",
            authDomain: "ntunspace.firebaseapp.com",
            projectId: "ntunspace",
            storageBucket: "ntunspace.firebasestorage.app",
            messagingSenderId: "952526844615",
            appId: "1:952526844615:web:d1f78ba8e3b44c24ee84e2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const SUPER_ADMIN = "ntun21933@ntun.ac.th";

        let currentUser = null;
        let activeRoomId = null;
        let classrooms = {};

        function parseJwt(token) {
            var base64Url = token.split('.')[1];
            var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            return JSON.parse(decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')));
        }

        async function handleGoogleLogin(response) {
            const payload = parseJwt(response.credential);
            const email = payload.email.toLowerCase();
            if (!email.endsWith('@ntun.ac.th')) return Swal.fire({icon:'error', title:'ผิดพลาด', text:'ต้องใช้เมล @ntun.ac.th', customClass:{popup:'glass-popup'}});

            let role = 'student';
            const userDoc = await db.collection("users").doc(email).get();
            if (email === SUPER_ADMIN) role = 'super_admin';
            else if (userDoc.exists) role = userDoc.data().role;

            currentUser = { email, name: payload.name, role, picture: payload.picture };
            localStorage.setItem('ntun_star_v1', JSON.stringify(currentUser));
            initApp();
        }

        const saved = localStorage.getItem('ntun_star_v1');
        if (saved) { currentUser = JSON.parse(saved); initApp(); }

        function initApp() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('userName').innerText = currentUser.name.split(' ')[0];
            document.getElementById('userImg').src = currentUser.picture;

            db.collection("classrooms").onSnapshot(snap => {
                classrooms = {};
                snap.forEach(doc => { classrooms[doc.id] = doc.data(); });
                renderUI();
            });
        }

        // --- 3. UI Renderer ---
        function renderUI() {
            if (activeRoomId && classrooms[activeRoomId]) renderRoomView();
            else renderDashboard();
        }

        function renderDashboard() {
            const area = document.getElementById('contentArea');
            const isAdmin = ['super_admin', 'admin', 'teacher'].includes(currentUser.role);
            let html = `<div class="mb-8"><h1 class="text-5xl font-bold mb-2">สวัสดี, ${currentUser.name.split(' ')[0]}</h1><p class="opacity-50">เลือกห้องเรียนเพื่อทำการจองโต๊ะ</p></div>`;

            if (isAdmin) {
                html += `
                <div class="glass p-6 mb-10 flex flex-wrap gap-4 items-end">
                    <div class="flex-1 min-w-[200px]"><label class="text-[10px] font-bold opacity-40 ml-2 mb-2 block uppercase">ชื่อห้อง</label><input id="roomName" type="text" placeholder="ม.x/x" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-white"></div>
                    <button onclick="createRoom()" class="btn-ios bg-blue-500 py-4 px-10">สร้างห้องเรียน</button>
                    <button onclick="showUserManagement()" class="btn-ios py-4"><i class='bx bxs-user-detail'></i> สิทธิเข้าถึง</button>
                </div>`;
            }

            html += `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">`;
            for (const id in classrooms) {
                const c = classrooms[id];
                const booked = c.seats.filter(s => s.bookedBy).length;
                html += `
                <div onclick="openRoom('${id}')" class="glass p-8 cursor-pointer hover:bg-white/15 transition-all group">
                    <div class="flex justify-between items-start mb-6">
                        <div class="text-4xl opacity-50 group-hover:scale-110 transition-transform"><i class='bx bxs-door-open'></i></div>
                        <button onclick="event.stopPropagation(); deleteRoom('${id}')" class="text-white/20 hover:text-red-400"><i class='bx bx-trash'></i></button>
                    </div>
                    <h3 class="text-2xl font-bold">${c.name}</h3>
                    <p class="text-[10px] font-black opacity-30 uppercase tracking-widest mb-4">Code: ${id}</p>
                    <div class="flex justify-between text-xs font-bold"><span class="opacity-50">สถานะที่นั่ง</span><span>${booked} / ${c.seats.length}</span></div>
                    <div class="w-full h-1.5 bg-white/10 rounded-full mt-2 overflow-hidden"><div class="h-full bg-green-400" style="width: ${(booked/c.seats.length)*100}%"></div></div>
                </div>`;
            }
            html += `</div>`;
            area.innerHTML = html;
        }

        function renderRoomView() {
            const room = classrooms[activeRoomId];
            const area = document.getElementById('contentArea');
            const isAdmin = ['super_admin', 'admin', 'teacher'].includes(currentUser.role);
            
            area.innerHTML = `
                <div class="flex justify-between items-center mb-6">
                    <button onclick="activeRoomId=null; renderUI()" class="btn-ios flex items-center gap-2"><i class='bx bx-left-arrow-alt'></i> กลับ</button>
                    <div class="flex gap-2">
                        ${isAdmin ? `<button onclick="resetToStandard()" class="btn-ios bg-orange-500/20 text-orange-300 border-orange-500/30"><i class='bx bx-refresh'></i> รีเซ็ตแถว (3:3:2)</button>` : ''}
                        <div class="btn-ios opacity-50 uppercase tracking-tighter">${room.name}</div>
                    </div>
                </div>
                
                <div class="room-viewport glass">
                    <div class="whiteboard"><p class="text-[8px] font-black tracking-[15px] opacity-30 text-black">WHITEBOARD</p></div>
                    <div id="roomMap">
                        ${room.seats.map(s => {
                            let state = '', display = s.id;
                            if (s.bookedBy) {
                                if (s.bookedBy === currentUser.email) { state = 'my-seat'; display = "YOU"; }
                                else { state = 'booked'; display = isAdmin ? s.name.split(' ')[0] : 'FULL'; }
                            }
                            return `
                            <div id="desk-${s.id}" class="desk-unit ${state}" style="left:${s.x}%; top:${s.y}%;" onmousedown="startDrag(event, ${s.id})" ontouchstart="startDrag(event, ${s.id})">
                                <svg class="desk-svg" viewBox="0 0 100 110">
                                    <rect x="20" y="80" width="60" height="25" rx="8" fill="rgba(255,255,255,0.2)" />
                                    <rect x="5" y="10" width="90" height="65" class="desk-top" />
                                </svg>
                                <div class="desk-label">${display}</div>
                            </div>`;
                        }).join('')}
                    </div>
                </div>`;
        }

        // --- 4. Logic & Drag Function ---
        function resetToStandard() {
            const room = classrooms[activeRoomId];
            const seats = room.seats;
            // จัดแถวแบบ 3:3:2 (รวม 8 ตัวต่อหนึ่งแถวแนวนอน)
            seats.forEach((s, i) => {
                const row = Math.floor(i / 8);
                const col = i % 8;
                let xPos = 0;
                // แบ่งสัดส่วน 3 |ช่อง| 3 |ช่อง| 2
                if (col < 3) xPos = 5 + (col * 11);
                else if (col < 6) xPos = 12 + (col * 11);
                else xPos = 19 + (col * 11);

                s.x = xPos;
                s.y = 5 + (row * 18);
            });
            saveRoom();
        }

        async function createRoom() {
            const name = document.getElementById('roomName').value;
            if (!name) return;
            const id = Math.random().toString(36).substring(2, 8).toUpperCase();
            // Default 40 seats
            const seats = [];
            for (let i = 0; i < 40; i++) {
                const row = Math.floor(i / 8);
                const col = i % 8;
                let xPos = 0;
                if (col < 3) xPos = 5 + (col * 11);
                else if (col < 6) xPos = 12 + (col * 11);
                else xPos = 19 + (col * 11);
                seats.push({ id: i + 1, x: xPos, y: 5 + (row * 18), bookedBy: null, name: null });
            }
            await db.collection("classrooms").doc(id).set({ name, seats });
        }

        let dragId = null, isMoving = false, startX, startY, initX, initY;
        function startDrag(e, id) {
            const isAdmin = ['super_admin','admin','teacher'].includes(currentUser.role);
            dragId = id; isMoving = false;
            const ev = e.touches ? e.touches[0] : e;
            startX = ev.clientX; startY = ev.clientY;
            const el = document.getElementById('desk-'+id);
            initX = parseFloat(el.style.left); initY = parseFloat(el.style.top);
        }

        document.addEventListener('mousemove', handleMove);
        document.addEventListener('touchmove', handleMove, {passive: false});
        function handleMove(e) {
            if(!dragId || !['super_admin','admin','teacher'].includes(currentUser.role)) return;
            const ev = e.touches ? e.touches[0] : e;
            const container = document.getElementById('roomMap');
            const rect = container.getBoundingClientRect();
            
            const dx = ((ev.clientX - startX) / rect.width) * 100;
            const dy = ((ev.clientY - startY) / rect.height) * 100;

            if(Math.abs(dx) > 0.5 || Math.abs(dy) > 0.5) isMoving = true;
            if(isMoving) {
                const el = document.getElementById('desk-'+dragId);
                el.style.left = (initX + dx) + '%';
                el.style.top = (initY + dy) + '%';
            }
        }

        document.addEventListener('mouseup', endDrag);
        document.addEventListener('touchend', endDrag);
        function endDrag() {
            if(!dragId) return;
            if(isMoving) {
                const el = document.getElementById('desk-'+dragId);
                const seat = classrooms[activeRoomId].seats.find(s => s.id === dragId);
                seat.x = parseFloat(el.style.left);
                seat.y = parseFloat(el.style.top);
                saveRoom();
            } else handleBooking(dragId);
            dragId = null;
        }

        async function handleBooking(sid) {
            const room = classrooms[activeRoomId];
            const seat = room.seats.find(s => s.id === sid);
            const isAdmin = ['super_admin','admin','teacher'].includes(currentUser.role);
            if (seat.bookedBy) {
                if (seat.bookedBy === currentUser.email || isAdmin) {
                    Swal.fire({ title: 'ยกเลิกการจอง?', icon: 'warning', showCancelButton: true, customClass: {popup: 'glass-popup'} })
                    .then(r => { if(r.isConfirmed) { seat.bookedBy = null; seat.name = null; saveRoom(); }});
                }
            } else {
                if (!isAdmin && room.seats.some(s => s.bookedBy === currentUser.email)) return;
                seat.bookedBy = currentUser.email; seat.name = currentUser.name;
                saveRoom();
            }
        }

        function saveRoom() { db.collection("classrooms").doc(activeRoomId).update({ seats: classrooms[activeRoomId].seats }); }
        function openRoom(id) { activeRoomId = id; renderUI(); }
        function logout() { localStorage.removeItem('ntun_star_v1'); location.reload(); }
        async function deleteRoom(id) {
            Swal.fire({title:'ลบห้องนี้?', icon:'warning', showCancelButton:true, customClass:{popup:'glass-popup'}}).then(r => {
                if(r.isConfirmed) db.collection("classrooms").doc(id).delete();
            });
        }
    </script>
</body>
</html>
