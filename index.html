<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTUN Space - V14 (Perfect Lock & Reset Layout)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        body { 
            font-family: 'Kanit', sans-serif; 
            background: linear-gradient(180deg, #7dd3fc 0%, #6366f1 50%, #a855f7 100%);
            min-height: 100vh; color: white; overflow-x: hidden;
        }
        .stars { position: fixed; inset: 0; background: url('https://s3-us-west-2.amazonaws.com/s.cdpn.io/123163/stars.png'); opacity: 0.4; z-index: -1; }
        .glass { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .glass-pill { border-radius: 999px; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .desk { width: 65px; height: 80px; position: absolute; cursor: pointer; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .desk-top { fill: rgba(255, 255, 255, 0.2); stroke: rgba(255, 255, 255, 0.4); stroke-width: 2; rx: 12; }
        .booked .desk-top { fill: rgba(59, 130, 246, 0.6); stroke: #93c5fd; }
        .my-seat .desk-top { fill: rgba(34, 197, 94, 0.6); stroke: #86efac; filter: drop-shadow(0 0 15px rgba(34,197,94,0.6)); }
        .desk-label { position: absolute; top: 28px; width: 100%; text-align: center; font-size: 10px; font-weight: 600; pointer-events: none; }
        .map-container { background: rgba(0,0,0,0.2); border-radius: 40px; box-shadow: inset 0 0 50px rgba(0,0,0,0.1); position: relative; }
    </style>
</head>
<body>
    <div class="stars"></div>

    <div id="loginPage" class="fixed inset-0 z-[100] flex items-center justify-center p-6">
        <div class="glass p-12 w-full max-w-md text-center rounded-[3rem] shadow-2xl">
            <img src="photo/logo.png" class="w-24 mx-auto mb-6 drop-shadow-xl">
            <h1 class="text-3xl font-black mb-2 tracking-tight">NTUN SPACE</h1>
            <p class="text-white/60 mb-10 font-light text-sm italic text-xs">SMART SEATING V14</p>
            <div id="g_id_onload" data-client_id="738644222886-o9uq6eonuu9hp8srsad1465lh9id41kj.apps.googleusercontent.com" data-callback="handleGoogleLogin"></div>
            <div class="g_id_signin flex justify-center" data-type="standard" data-shape="pill"></div>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <header class="p-6 flex justify-between items-center">
            <div class="glass-pill px-6 py-3 flex items-center gap-3">
                <img src="photo/logo.png" class="w-8">
                <span class="text-[10px] font-bold tracking-widest opacity-80 uppercase">NTUN Space</span>
            </div>
            <div class="flex items-center gap-2">
                <div class="glass-pill flex items-center gap-3 pr-4 pl-1 py-1">
                    <img id="userImg" src="" class="w-9 h-9 rounded-full">
                    <span id="userName" class="text-sm font-semibold"></span>
                </div>
                <button onclick="logout()" class="glass-pill bg-red-500/20 px-4 py-2 hover:bg-red-500/40 transition">
                    <i class='bx bx-power-off text-lg'></i>
                </button>
            </div>
        </header>

        <main class="max-w-6xl mx-auto px-6 py-4">
            <div id="studentZone" class="mb-10 text-center">
                <div class="flex max-w-md mx-auto gap-2">
                    <input id="joinCode" class="flex-1 bg-white/10 p-4 rounded-2xl border border-white/20 outline-none text-center font-black tracking-widest uppercase" placeholder="ROOM ID">
                    <button onclick="joinByCode()" class="bg-white text-indigo-600 px-8 rounded-2xl font-black hover:bg-indigo-50 transition">JOIN</button>
                </div>
            </div>
            <div id="contentArea"></div>
        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAlaTyhtXf-d6qDSD5AeWR33Hg3VCn55o8",
            authDomain: "ntunspace.firebaseapp.com",
            projectId: "ntunspace",
            storageBucket: "ntunspace.firebasestorage.app",
            messagingSenderId: "952526844615",
            appId: "1:952526844615:web:d1f78ba8e3b44c24ee84e2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const SUPER_ADMIN = "ntun21933@ntun.ac.th";
        let currentUser = null;
        let activeRoomId = null;
        let classrooms = {};

        function decodeJwt(token) {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            return JSON.parse(decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')));
        }

        async function handleGoogleLogin(response) {
            const payload = decodeJwt(response.credential);
            const email = payload.email.toLowerCase();
            if (!email.endsWith('@ntun.ac.th')) return Swal.fire('Error', 'Use @ntun.ac.th only', 'error');

            let role = 'student';
            if (email === SUPER_ADMIN) role = 'super_admin';
            else {
                const userDoc = await db.collection("users").doc(email).get();
                if (userDoc.exists) role = userDoc.data().role;
            }

            currentUser = { email, name: payload.name, role, picture: payload.picture };
            localStorage.setItem('ntun_session_v14', JSON.stringify(currentUser));
            initApp();
        }

        function initApp() {
            const saved = localStorage.getItem('ntun_session_v14');
            if (saved) currentUser = JSON.parse(saved);
            if (!currentUser) return;

            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('userName').innerText = currentUser.name;
            document.getElementById('userImg').src = currentUser.picture;

            if (['super_admin', 'admin', 'teacher'].includes(currentUser.role)) {
                document.getElementById('studentZone').classList.add('hidden');
            }

            db.collection("classrooms").onSnapshot(snap => {
                classrooms = {};
                snap.forEach(doc => { classrooms[doc.id] = doc.data(); });
                renderUI();
            });
        }

        function logout() { localStorage.removeItem('ntun_session_v14'); location.reload(); }

        // --- Logic: 3:3:2 Reset ---
        function calc332(count) {
            const seats = [];
            const colW = 85, rowH = 120, blockGap = 95;
            for (let i = 0; i < count; i++) {
                let x; const row = Math.floor(i / 8), pos = i % 8;
                if (pos < 3) x = pos * colW;
                else if (pos < 6) x = pos * colW + blockGap;
                else x = pos * colW + (blockGap * 2);
                seats.push({ id: i + 1, x: x + 100, y: row * rowH + 180, bookedBy: null, name: null });
            }
            return seats;
        }

        async function resetToDefaultLayout() {
            const res = await Swal.fire({ title: 'รีเซ็ตผังที่นั่ง?', text: 'โต๊ะจะกลับมาเรียงแบบ 3:3:2 มาตรฐาน', icon: 'warning', showCancelButton: true });
            if (res.isConfirmed) {
                const room = classrooms[activeRoomId];
                // รักษาข้อมูลการจองไว้ แต่เปลี่ยนตำแหน่ง x, y
                const defaultPos = calc332(room.seats.length);
                room.seats = room.seats.map((s, idx) => ({
                    ...s,
                    x: defaultPos[idx].x,
                    y: defaultPos[idx].y
                }));
                updateRoom();
            }
        }

        // --- Logic: Advanced Booking Lock ---
        async function handleBooking(sid) {
            const room = classrooms[activeRoomId];
            const seat = room.seats.find(s => s.id === sid);
            const isStaff = ['super_admin', 'admin', 'teacher'].includes(currentUser.role);

            if (seat.bookedBy) {
                if (seat.bookedBy === currentUser.email || isStaff) {
                    const res = await Swal.fire({ title: 'ยกเลิกการจอง?', icon: 'warning', showCancelButton: true });
                    if(res.isConfirmed) { seat.bookedBy = null; seat.name = null; updateRoom(); }
                }
            } else {
                if (!isStaff) {
                    // Check Global Lock across ALL rooms
                    let alreadyBooked = false;
                    let foundIn = "";
                    for (const rid in classrooms) {
                        if (classrooms[rid].seats.some(s => s.bookedBy === currentUser.email)) {
                            alreadyBooked = true;
                            foundIn = classrooms[rid].name;
                            break;
                        }
                    }

                    if (alreadyBooked) {
                        return Swal.fire({
                            icon: 'error',
                            title: 'ไม่สามารถจองได้',
                            text: `คุณได้จองที่นั่งในห้อง "${foundIn}" แล้ว กรุณายกเลิกที่เดิมก่อน`
                        });
                    }
                }
                seat.bookedBy = currentUser.email; seat.name = currentUser.name;
                updateRoom();
            }
        }

        function updateRoom() { db.collection("classrooms").doc(activeRoomId).update({ seats: classrooms[activeRoomId].seats }); }

        function renderUI() {
            if (activeRoomId) renderRoomView();
            else renderDashboard();
        }

        function renderDashboard() {
            const area = document.getElementById('contentArea');
            const isStaff = ['super_admin', 'admin', 'teacher'].includes(currentUser.role);
            let html = '';
            if (isStaff) {
                html += `<div class="mb-6 flex justify-between items-center"><h2 class="text-2xl font-bold">Classrooms</h2><button onclick="showCreateModal()" class="bg-indigo-500 px-6 py-2 rounded-xl font-bold">สร้างห้อง</button></div>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">`;
                for (const id in classrooms) {
                    html += `<div class="glass p-6 rounded-[2rem] relative group">
                        <h3 class="text-lg font-bold">${classrooms[id].name}</h3>
                        <p class="text-[10px] opacity-50 font-mono mb-4">ID: ${id}</p>
                        <div class="flex gap-2">
                            <button onclick="activeRoomId='${id}'; renderUI()" class="flex-1 bg-white/10 hover:bg-white/20 py-2 rounded-xl text-xs transition">จัดการ</button>
                            <button onclick="deleteRoom('${id}')" class="bg-red-500/20 hover:bg-red-500/40 p-2 rounded-xl text-red-400"><i class='bx bx-trash'></i></button>
                        </div>
                    </div>`;
                }
                html += `</div>`;
            } else {
                const myRoomId = Object.keys(classrooms).find(id => classrooms[id].seats.some(s => s.bookedBy === currentUser.email));
                if (myRoomId) {
                    html = `<div class="max-w-md mx-auto glass p-10 rounded-[3rem] text-center mt-10">
                        <img src="photo/logo.png" class="w-16 mx-auto mb-4">
                        <h3 class="text-xl font-bold">จองสำเร็จ</h3>
                        <p class="opacity-50 text-sm mb-6">ห้อง: ${classrooms[myRoomId].name}</p>
                        <button onclick="activeRoomId='${myRoomId}'; renderUI()" class="w-full bg-white text-indigo-600 py-3 rounded-2xl font-bold">ดูที่นั่งของฉัน</button>
                    </div>`;
                } else {
                    html = `<div class="text-center opacity-30 py-20"><i class='bx bx-map-pin text-5xl mb-2'></i><p>ใส่ ROOM ID เพื่อเริ่มจอง</p></div>`;
                }
            }
            area.innerHTML = html;
        }

        function renderRoomView() {
            const room = classrooms[activeRoomId];
            const isStaff = ['super_admin', 'admin', 'teacher'].includes(currentUser.role);
            
            document.getElementById('contentArea').innerHTML = `
                <div class="flex justify-between items-center mb-6">
                    <button onclick="activeRoomId=null; renderUI()" class="glass-pill px-5 py-2 flex items-center gap-2 text-xs font-bold">
                        <i class='bx bx-left-arrow-alt'></i> BACK
                    </button>
                    <div class="flex gap-2">
                        ${isStaff ? `<button onclick="resetToDefaultLayout()" class="glass-pill bg-indigo-500/30 px-5 py-2 flex items-center gap-2 text-xs font-bold hover:bg-indigo-500/50 transition"><i class='bx bx-refresh'></i> RESET 3:3:2</button>` : ''}
                        <div class="glass-pill px-6 py-2 text-xs font-bold bg-white/10 uppercase">${room.name}</div>
                    </div>
                </div>
                <div class="map-container p-6 overflow-auto glass min-h-[70vh]">
                    <div id="roomMap" class="relative w-[1000px] h-[800px] mx-auto">
                        <div class="absolute top-4 left-1/2 -translate-x-1/2 text-[10px] opacity-30 font-bold tracking-[10px]">WHITEBOARD</div>
                        ${room.seats.map(s => {
                            let state = s.bookedBy === currentUser.email ? 'my-seat' : (s.bookedBy ? 'booked' : '');
                            let label = s.bookedBy ? (isStaff ? s.name.split(' ')[0] : (s.bookedBy === currentUser.email ? 'ME' : 'OCCUPIED')) : s.id;
                            return `<div id="desk-${s.id}" class="desk ${state}" style="left:${s.x}px; top:${s.y}px;" onmousedown="startDrag(event, ${s.id})" ontouchstart="startDrag(event, ${s.id})">
                                <svg viewBox="0 0 100 110"><rect x="5" y="10" width="90" height="70" class="desk-top" /></svg>
                                <div class="desk-label text-white">${label}</div>
                            </div>`;
                        }).join('')}
                    </div>
                </div>`;
        }

        // --- Helper Funcs ---
        function joinByCode() {
            const code = document.getElementById('joinCode').value.trim().toUpperCase();
            if (classrooms[code]) { activeRoomId = code; renderUI(); }
            else Swal.fire('Error', 'Room not found', 'error');
        }

        function showCreateModal() {
            Swal.fire({
                title: 'สร้างห้องเรียนใหม่',
                html: `<input id="rName" class="swal2-input" placeholder="ชื่อห้อง"><input id="rCount" type="number" class="swal2-input" value="40" placeholder="จำนวนที่นั่ง">`,
                preConfirm: () => {
                    const name = document.getElementById('rName').value;
                    const count = document.getElementById('rCount').value;
                    if (name && count) {
                        const id = Math.random().toString(36).substring(2, 8).toUpperCase();
                        db.collection("classrooms").doc(id).set({ name, seats: calc332(parseInt(count)) });
                    }
                }
            });
        }

        async function deleteRoom(id) {
            const res = await Swal.fire({ title: 'ลบห้อง?', icon: 'warning', showCancelButton: true });
            if(res.isConfirmed) await db.collection("classrooms").doc(id).delete();
        }

        // --- Drag/Drop Management ---
        let dragId = null, isMoving = false, startX, startY, initX, initY;
        function startDrag(e, id) {
            dragId = id; isMoving = false;
            const ev = e.touches ? e.touches[0] : e;
            startX = ev.clientX; startY = ev.clientY;
            const el = document.getElementById('desk-'+id);
            initX = parseInt(el.style.left); initY = parseInt(el.style.top);
        }

        document.addEventListener('mousemove', (e) => {
            if(!dragId || !['super_admin', 'admin', 'teacher'].includes(currentUser.role)) return;
            const dx = e.clientX - startX; const dy = e.clientY - startY;
            if(Math.abs(dx) > 5 || Math.abs(dy) > 5) {
                isMoving = true;
                const el = document.getElementById('desk-'+dragId);
                el.style.left = (initX + dx)+'px'; el.style.top = (initY + dy)+'px';
            }
        });

        document.addEventListener('mouseup', () => {
            if(!dragId) return;
            if(!isMoving) handleBooking(dragId);
            else if(['super_admin', 'admin', 'teacher'].includes(currentUser.role)) {
                const room = classrooms[activeRoomId];
                const seat = room.seats.find(s => s.id === dragId);
                const el = document.getElementById('desk-'+dragId);
                seat.x = parseInt(el.style.left); seat.y = parseInt(el.style.top);
                updateRoom();
            }
            dragId = null;
        });

        window.onload = initApp;
    </script>
</body>
</html>
