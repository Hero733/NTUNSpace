<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NTUN Space</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%); -webkit-tap-highlight-color: transparent; overscroll-behavior: none; }
        .glass-panel { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.8); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08); }
        .whiteboard { background: linear-gradient(180deg, #ffffff 0%, #f8f9fa 100%); box-shadow: 0 10px 20px rgba(0,0,0,0.1), inset 0 2px 0 rgba(255,255,255,1); border-bottom: 4px solid #dee2e6; transform: perspective(500px) rotateX(-5deg); }
        
        .seat { width: 70px; height: 75px; position: absolute; transition: transform 0.2s cubic-bezier(0.25, 0.8, 0.25, 1); touch-action: none; }
        .seat:not(.dragging):hover { transform: translateY(-3px) scale(1.05); cursor: pointer; }
        
        .desk-svg { width: 100%; height: 100%; filter: drop-shadow(0 6px 4px rgba(0,0,0,0.15)); }
        .seat:not(.booked) .desk-top { fill: #D97706; }
        .seat:not(.booked) .desk-edge { fill: #B45309; }
        .seat:not(.booked) .desk-chair { fill: #64748B; }
        .seat.booked .desk-top { fill: #EF4444; }
        .seat.booked .desk-edge { fill: #B91C1C; }
        .seat.booked .desk-chair { fill: #450A0A; }
        
        .seat-name {
            position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%); font-size: 10px; font-weight: 800; color: #1c1c1e;
            white-space: nowrap; text-shadow: 0 1px 2px rgba(255,255,255,1); background: rgba(255,255,255,0.9); padding: 2px 6px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); pointer-events: none;
        }
        
        #dragArea { position: relative; width: 750px; margin: 0 auto; min-height: 500px; }
        .map-container { overflow-x: auto; padding-bottom: 20px; }
    </style>
</head>
<body class="text-[#1c1c1e] h-screen w-screen overflow-hidden flex flex-col">

    <div id="loginPage" class="flex-1 flex flex-col items-center justify-center p-6 z-50 absolute inset-0">
        <div class="glass-panel p-10 rounded-[40px] w-full max-w-md text-center">
            <div class="w-20 h-20 bg-gradient-to-tr from-blue-500 to-purple-500 rounded-3xl mx-auto mb-6 flex items-center justify-center shadow-lg shadow-blue-500/30">
                <i class='bx bxs-graduation text-white text-4xl'></i>
            </div>
            <h1 class="text-3xl font-extrabold mb-2 tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-purple-600">NTUN Space</h1>
            <p class="text-gray-500 text-sm mb-10 font-medium">เข้าสู่ระบบด้วย Google</p>
            
            <div id="g_id_onload" data-client_id="738644222886-o9uq6eonuu9hp8srsad1465lh9id41kj.apps.googleusercontent.com" data-context="signin" data-ux_mode="popup" data-callback="handleGoogleLogin" data-auto_prompt="false"></div>
            
            <div class="flex justify-center mb-4"><div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="outline" data-text="signin_with" data-size="large"></div></div>
            <p class="text-[10px] text-gray-400 mt-4">*รองรับเฉพาะอีเมล @ntun.ac.th</p>
        </div>
    </div>

    <div id="mainApp" class="hidden flex-1 flex flex-col relative h-full">
        <header class="glass-panel pt-14 pb-4 px-6 z-10 flex justify-between items-center rounded-b-[32px]">
            <div><h2 class="text-xl font-extrabold text-gray-800" id="headerTitle">หน้าหลัก</h2><p class="text-xs text-gray-500 font-medium" id="userEmailDisplay"></p></div>
            <div id="roleBadge" class="px-4 py-1.5 rounded-xl text-xs font-bold shadow-sm"></div>
        </header>

        <main class="flex-1 overflow-y-auto p-4 pb-32 relative" id="mainContent"></main>

        <nav class="glass-panel absolute bottom-6 left-6 right-6 rounded-3xl p-2 flex justify-around items-center z-20">
            <button onclick="renderDashboard()" class="flex-1 py-3 flex flex-col items-center text-blue-600 bg-blue-50/50 rounded-2xl transition">
                <i class='bx bxs-home text-2xl'></i><span class="text-[10px] mt-1 font-bold">หน้าหลัก</span>
            </button>
            <button onclick="logout()" class="flex-1 py-3 flex flex-col items-center text-gray-400 hover:text-red-500 transition">
                <i class='bx bx-log-out text-2xl'></i><span class="text-[10px] mt-1 font-bold">ออกระบบ</span>
            </button>
        </nav>
    </div>

    <script>
        const ADMIN_EMAILS = ['ntun21933@ntun.ac.th'];
        let currentUser = null;
        let activeRoom = null;

        let classroomsDB = JSON.parse(localStorage.getItem('ntunClassroomsDB')) || {};

        function patchDatabase() {
            let patched = false;
            for (let code in classroomsDB) {
                if (classroomsDB[code].isBookingOpen === undefined) {
                    classroomsDB[code].isBookingOpen = true;
                    patched = true;
                }
                if (classroomsDB[code].seats.length > 0 && classroomsDB[code].seats[0].x === undefined) {
                    applyDefaultLayout(classroomsDB[code].seats);
                    patched = true;
                }
            }
            if (patched) saveDB();
        }

        function saveDB() { localStorage.setItem('ntunClassroomsDB', JSON.stringify(classroomsDB)); }

        function applyDefaultLayout(seats) {
            const colX = [0, 85, 170,  295, 380, 465,  590, 675]; 
            let row = 0, colIndex = 0;
            seats.forEach(seat => {
                seat.x = colX[colIndex];
                seat.y = row * 110; 
                colIndex++;
                if (colIndex >= 8) { colIndex = 0; row++; }
            });
            return seats;
        }

        function generateSeatData(count) {
            let seats = [];
            for(let i=1; i<=count; i++) { seats.push({ id: i, bookedBy: null, name: null }); }
            return applyDefaultLayout(seats);
        }

        // ลบระบบสร้างห้องเทสอัตโนมัติออกแล้ว 
        if (Object.keys(classroomsDB).length === 0) {
            classroomsDB = {}; 
            saveDB();
        }
        
        patchDatabase();

        function handleGoogleLogin(response) {
            const payload = JSON.parse(decodeURIComponent(atob(response.credential.split('.')[1].replace(/-/g, '+').replace(/_/g, '/'))));
            const email = payload.email;
            const isAdmin = ADMIN_EMAILS.includes(email);
            
            if (!email.endsWith('@ntun.ac.th') && !isAdmin) {
                return Swal.fire('ไม่อนุญาต', 'ใช้อีเมล @ntun.ac.th เท่านั้น', 'error');
            }
            currentUser = { email, name: isAdmin ? "แอดมินสูงสุด" : payload.name, isAdmin };
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('userEmailDisplay').innerText = currentUser.email;
            
            const badge = document.getElementById('roleBadge');
            badge.innerText = currentUser.isAdmin ? 'Admin' : 'Student';
            badge.className = `px-4 py-1.5 rounded-xl text-xs font-extrabold shadow-sm ${currentUser.isAdmin ? 'bg-red-100 text-red-700' : 'bg-blue-100 text-blue-700'}`;
            renderDashboard();
        }

        function logout() { location.reload(); }

        function renderDashboard() {
            document.getElementById('headerTitle').innerText = "หน้าหลัก";
            activeRoom = null;
            const content = document.getElementById('mainContent');
            
            if (currentUser.isAdmin) {
                content.innerHTML = `
                    <div class="glass-panel p-6 rounded-[32px] mb-6 shadow-sm">
                        <h3 class="font-extrabold text-lg text-gray-800 mb-4 flex items-center gap-2"><i class='bx bxs-layer-plus text-purple-600 text-2xl'></i> สร้างชั้นเรียน</h3>
                        <input type="text" id="roomName" placeholder="ชื่อห้อง" class="w-full p-4 bg-white/70 border border-white rounded-2xl mb-3 focus:ring-2 focus:ring-purple-400 font-medium">
                        <input type="number" id="seatCount" placeholder="จำนวนที่นั่ง" class="w-full p-4 bg-white/70 border border-white rounded-2xl mb-4 focus:ring-2 focus:ring-purple-400 font-medium">
                        <button onclick="createRoom()" class="w-full bg-gradient-to-r from-purple-500 to-indigo-500 text-white font-bold py-4 rounded-2xl shadow-lg hover:scale-[1.02] transition">สร้างห้อง</button>
                    </div>
                    <div id="teacherRoomsList" class="flex flex-col gap-4"></div>`;
                renderTeacherRoomsList();
            } else {
                content.innerHTML = `
                    <div class="glass-panel p-8 rounded-[32px] text-center mt-10">
                        <div class="w-20 h-20 bg-blue-500 text-white rounded-[24px] flex items-center justify-center mx-auto mb-6"><i class='bx bx-door-open text-4xl'></i></div>
                        <h3 class="font-extrabold text-2xl mb-2 text-gray-800">เข้าร่วมชั้นเรียน</h3>
                        <p class="text-sm text-gray-500 mb-6 font-medium">กรุณากรอกรหัสห้องเรียน 6 หลักเพื่อเข้าใช้งาน</p>
                        <input type="text" id="roomCodeInput" maxlength="6" placeholder="______" class="w-full text-center tracking-[8px] uppercase font-mono font-bold text-3xl p-4 bg-white/70 border border-white rounded-2xl mb-6">
                        <button onclick="joinRoom()" class="w-full bg-gradient-to-r from-blue-500 to-cyan-500 text-white font-bold py-4 rounded-2xl shadow-lg">เข้าร่วม (Join)</button>
                    </div>`;
            }
        }

        function createRoom() {
            const name = document.getElementById('roomName').value.trim(), count = parseInt(document.getElementById('seatCount').value);
            if (!name || isNaN(count)) return Swal.fire('ผิดพลาด', 'กรอกข้อมูลให้ครบ', 'warning');
            const code = Math.random().toString(36).substring(2, 8).toUpperCase();
            classroomsDB[code] = { name: name, maxSeats: count, isBookingOpen: true, seats: generateSeatData(count) };
            saveDB(); renderTeacherRoomsList(); Swal.fire('สำเร็จ', 'รหัส: ' + code, 'success');
        }

        function renderTeacherRoomsList() {
            let html = '';
            for (const [code, r] of Object.entries(classroomsDB)) {
                html += `
                    <div class="glass-panel p-5 rounded-[24px] flex justify-between items-center cursor-pointer hover:bg-white/40 transition" onclick="activeRoom='${code}'; renderSeatMap();">
                        <div>
                            <h4 class="font-extrabold text-gray-800">${r.name}</h4>
                            <p class="text-xs text-blue-600 font-bold mt-1">Code: ${code} <span class="text-gray-400 font-normal ml-2">(${r.seats.length} โต๊ะ)</span></p>
                        </div>
                        <button onclick="event.stopPropagation(); deleteRoom('${code}')" class="bg-red-100 text-red-600 p-3 rounded-xl"><i class='bx bx-trash text-xl'></i></button>
                    </div>`;
            }
            document.getElementById('teacherRoomsList').innerHTML = html;
        }

        function deleteRoom(code) {
            Swal.fire({title: 'ลบห้องนี้?', icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444'}).then(r => {
                if (r.isConfirmed) { delete classroomsDB[code]; saveDB(); renderTeacherRoomsList(); }
            });
        }

        function joinRoom() {
            const code = document.getElementById('roomCodeInput').value.trim().toUpperCase();
            if (classroomsDB[code]) { activeRoom = code; renderSeatMap(); }
            else Swal.fire('ไม่พบห้อง', 'รหัสไม่ถูกต้อง', 'error');
        }

        function toggleBooking() {
            classroomsDB[activeRoom].isBookingOpen = !classroomsDB[activeRoom].isBookingOpen;
            saveDB(); renderSeatMap();
            Swal.fire({title: classroomsDB[activeRoom].isBookingOpen ? 'เปิดรับจองแล้ว' : 'ปิดการจองแล้ว', icon: 'success', timer: 1000, showConfirmButton: false});
        }

        function resetSeatLayout() {
            Swal.fire({title: 'รีเซ็ตแผนผัง?', text: 'โต๊ะจะกลับไปเรียงแบบ 3-3-2', showCancelButton: true}).then(r => {
                if(r.isConfirmed) {
                    applyDefaultLayout(classroomsDB[activeRoom].seats);
                    saveDB(); renderSeatMap();
                }
            });
        }

        function renderSeatMap() {
            const room = classroomsDB[activeRoom];
            document.getElementById('headerTitle').innerText = room.name;
            
            const totalRows = Math.ceil(room.seats.length / 8);
            const areaHeight = (totalRows * 110) + 100; 
            
            let html = `
                <div class="glass-panel p-4 md:p-6 rounded-[32px] mt-6 relative shadow-sm">
                    ${currentUser.isAdmin ? `
                        <div class="flex flex-wrap gap-2 justify-center mb-6 border-b border-gray-200 pb-4">
                            <button onclick="toggleBooking()" class="text-xs font-bold px-4 py-2 rounded-xl ${room.isBookingOpen ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}"><i class='bx ${room.isBookingOpen ? 'bx-lock-open' : 'bx-lock'}'></i> ${room.isBookingOpen ? 'สถานะ: เปิดรับจอง' : 'สถานะ: ปิดจองแล้ว'}</button>
                            <button onclick="resetSeatLayout()" class="text-xs font-bold bg-gray-200 text-gray-700 px-4 py-2 rounded-xl"><i class='bx bx-reset'></i> รีเซ็ตแผนผัง</button>
                            <p class="w-full text-center text-[10px] text-gray-400 mt-2">*ครูแตะค้างแล้วลากเพื่อย้ายโต๊ะ / แตะ 1 ครั้งเพื่อเพิ่ม-ลบ นร.</p>
                        </div>
                    ` : `
                        <div class="text-center mb-6">
                            <span class="text-xs font-bold px-4 py-2 rounded-full ${room.isBookingOpen ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}"><i class='bx ${room.isBookingOpen ? 'bx-lock-open' : 'bx-lock'}'></i> ${room.isBookingOpen ? 'เปิดรับจองที่นั่ง' : 'ขณะนี้ปิดรับจองที่นั่ง'}</span>
                        </div>
                    `}
                    
                    <div class="map-container">
                        <div class="whiteboard w-[300px] h-8 mx-auto rounded-lg mb-8 flex items-center justify-center border border-gray-300 shadow-sm"><span class="text-[10px] font-bold text-gray-400 tracking-widest">หน้ากระดานเรียน</span></div>
                        <div id="dragArea" style="height: ${areaHeight}px;">
                            ${room.seats.map(s => generateSeatHTML(s)).join('')}
                        </div>
                    </div>
                </div>`;
            
            document.getElementById('mainContent').innerHTML = html;
        }

        function generateSeatHTML(seat) {
            const isBooked = seat.bookedBy !== null;
            const isMine = seat.bookedBy === currentUser.email;
            const nameLabel = isBooked ? `<span class="seat-name ${isMine?'border border-blue-500 text-blue-600':''}">${isMine?'คุณ':seat.name}</span>` : `<span class="seat-name text-gray-300 shadow-none bg-transparent">${seat.id}</span>`;
            
            const events = `onmousedown="initDrag(event, ${seat.id})" ontouchstart="initDrag(event, ${seat.id})"`;
            
            return `
                <div id="seat-${seat.id}" class="seat ${isBooked?'booked':''}" style="left: ${seat.x}px; top: ${seat.y}px;" ${events}>
                    <svg viewBox="0 0 100 100" class="desk-svg">
                        <rect x="25" y="55" width="50" height="35" rx="8" class="desk-chair" />
                        <path d="M 5 50 L 95 50 L 95 65 L 5 65 Z" class="desk-edge" />
                        <path d="M 15 10 L 85 10 L 95 50 L 5 50 Z" class="desk-top" />
                    </svg>
                    ${nameLabel}
                </div>`;
        }

        let activeSeatId = null;
        let isDragging = false;
        let startX, startY, initialLeft, initialTop;

        function initDrag(e, seatId) {
            activeSeatId = seatId;
            isDragging = false; 
            
            startX = e.clientX || (e.touches && e.touches[0].clientX);
            startY = e.clientY || (e.touches && e.touches[0].clientY);
            
            const el = document.getElementById('seat-' + seatId);
            initialLeft = parseInt(el.style.left) || 0;
            initialTop = parseInt(el.style.top) || 0;
            el.style.zIndex = 100;
            el.classList.add('dragging'); 
        }

        document.addEventListener('mousemove', handleMove, {passive: false});
        document.addEventListener('touchmove', handleMove, {passive: false});

        function handleMove(e) {
            if (!activeSeatId) return;
            if (!currentUser.isAdmin) return; 

            const currentX = e.clientX || (e.touches && e.touches[0].clientX);
            const currentY = e.clientY || (e.touches && e.touches[0].clientY);
            const dx = currentX - startX;
            const dy = currentY - startY;

            if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
                isDragging = true;
                e.preventDefault(); 
            }

            if (isDragging) {
                const el = document.getElementById('seat-' + activeSeatId);
                let newLeft = initialLeft + dx;
                let newTop = initialTop + dy;
                
                if(newLeft < 0) newLeft = 0;
                if(newLeft > 680) newLeft = 680;
                if(newTop < 0) newTop = 0;

                el.style.left = newLeft + 'px';
                el.style.top = newTop + 'px';
            }
        }

        document.addEventListener('mouseup', handleUp);
        document.addEventListener('touchend', handleUp);

        function handleUp(e) {
            if (!activeSeatId) return;
            const el = document.getElementById('seat-' + activeSeatId);
            el.style.zIndex = '';
            el.classList.remove('dragging');

            if (isDragging && currentUser.isAdmin) {
                const room = classroomsDB[activeRoom];
                const seat = room.seats.find(s => s.id === activeSeatId);
                seat.x = parseInt(el.style.left);
                seat.y = parseInt(el.style.top);
                saveDB();
            } else {
                handleSeatClick(activeRoom, activeSeatId);
            }

            activeSeatId = null;
            isDragging = false;
        }

        function handleSeatClick(roomId, seatId) {
            const room = classroomsDB[roomId];
            const seat = room.seats.find(s => s.id === seatId);

            if (currentUser.isAdmin) {
                if (seat.bookedBy) {
                    Swal.fire({ title: 'ลบการจอง?', text: `ต้องการเตะ "${seat.name}" ออกจากโต๊ะ ${seatId} ใช่หรือไม่?`, icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', confirmButtonText: 'ลบออก' }).then(r => {
                        if(r.isConfirmed) { seat.bookedBy = null; seat.name = null; saveDB(); renderSeatMap(); }
                    });
                } else {
                    Swal.fire({ title: 'เพิ่มการจอง', input: 'text', inputLabel: `พิมพ์ชื่อนักเรียนสำหรับโต๊ะ ${seatId}`, showCancelButton: true, confirmButtonText: 'เพิ่ม' }).then(r => {
                        if(r.isConfirmed && r.value) { seat.bookedBy = 'manual_admin'; seat.name = r.value; saveDB(); renderSeatMap(); }
                    });
                }
            } else {
                if (!room.isBookingOpen) return Swal.fire('ปิดจอง', 'คุณครูปิดการจองที่นั่งแล้ว ไม่สามารถทำรายการได้', 'warning');

                if (seat.bookedBy === currentUser.email) {
                    Swal.fire({ title: 'ยกเลิกที่นั่ง?', text: `คุณต้องการออกจากโต๊ะหมายเลข ${seatId} ใช่หรือไม่?`, showCancelButton: true, confirmButtonColor: '#ef4444', confirmButtonText: 'ออกจากที่นั่ง' }).then(r => {
                        if(r.isConfirmed) { seat.bookedBy = null; seat.name = null; saveDB(); renderSeatMap(); }
                    });
                } else if (!seat.bookedBy) {
                    if (room.seats.some(s => s.bookedBy === currentUser.email)) return Swal.fire('จองได้ที่เดียว', 'คุณมีที่นั่งในห้องนี้แล้ว', 'error');
                    Swal.fire({ title: 'ยอมรับการจอง?', text: `ยืนยันการจองโต๊ะหมายเลข ${seatId}`, showCancelButton: true, confirmButtonColor: '#007aff', confirmButtonText: 'ยอมรับ' }).then(r => {
                        if(r.isConfirmed) { seat.bookedBy = currentUser.email; seat.name = currentUser.name; saveDB(); renderSeatMap(); }
                    });
                } else {
                    Swal.fire('ไม่ว่าง', 'ที่นั่งนี้มีเพื่อนจองแล้วครับ', 'error');
                }
            }
        }
    </script>
</body>
</html>
