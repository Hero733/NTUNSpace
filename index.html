<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NTUN Space - Professional Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        body { 
            font-family: 'Kanit', sans-serif; 
            background: #5d81d3;
            background-image: 
                radial-gradient(at 0% 0%, rgba(100, 149, 237, 0.5) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(72, 61, 139, 0.3) 0px, transparent 50%),
                url('https://www.transparenttextures.com/patterns/stardust.png'); /* เพิ่มละอองดาวแบบในรูป */
            min-height: 100vh;
            color: white;
            padding-bottom: 50px;
        }

        /* Glassmorphism Capsule */
        .glass-pill {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            transition: all 0.3s;
        }
        .glass-pill:hover { background: rgba(255, 255, 255, 0.25); }

        /* การ์ดแบบในรูป */
        .main-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 40px;
            padding: 35px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }

        /* ปุ่มสถานะสีเขียวแบบในรูป */
        .status-badge {
            background: rgba(48, 209, 88, 0.2);
            color: #32ff7e;
            border: 1px solid rgba(48, 209, 88, 0.4);
            border-radius: 50px;
            padding: 6px 16px;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Progress Bar นีออน */
        .progress-rail {
            width: 100%; height: 10px; background: rgba(255,255,255,0.1); border-radius: 20px; overflow: hidden;
        }
        .progress-bar {
            height: 100%; background: linear-gradient(90deg, #32ff7e, #30d158);
            border-radius: 20px; box-shadow: 0 0 15px rgba(48, 209, 88, 0.6);
        }

        /* Desk UI (Minimalist & Clean) */
        .desk { cursor: pointer; transition: 0.2s; }
        .desk:active { transform: scale(0.9); }
        .desk-top { fill: #ffffff; rx: 12; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }
        .booked .desk-top { fill: #ff453a; }
        .my-seat .desk-top { fill: #30d158; }
        .desk-label { font-size: 11px; font-weight: 700; fill: #1c1c1e; pointer-events: none; }

        /* Responsive Map */
        .map-container {
            width: 100%; overflow: auto; border-radius: 35px;
            background: rgba(0,0,0,0.05); scrollbar-width: none;
        }
        #roomMap { position: relative; width: 1100px; height: 850px; transform-origin: top center; }

        @media (max-width: 768px) { #roomMap { transform: scale(0.65); height: 550px; } }
        @media (max-width: 480px) { #roomMap { transform: scale(0.48); height: 420px; } }

        /* SweetAlert Glass */
        .swal2-popup.hero-ui {
            background: rgba(255, 255, 255, 0.2) !important;
            backdrop-filter: blur(40px) !important;
            border-radius: 45px !important;
            border: 1px solid rgba(255,255,255,0.3) !important;
            color: white !important;
        }
    </style>
</head>
<body>

    <div id="loginPage" class="fixed inset-0 z-[200] flex items-center justify-center p-6 bg-[#5d81d3]">
        <div class="main-card w-full max-w-md text-center">
            <div class="w-24 h-24 bg-white/20 rounded-[2.5rem] mx-auto mb-8 flex items-center justify-center text-white text-5xl border border-white/30 shadow-xl">
                <i class='bx bxs-dashboard'></i>
            </div>
            <h1 class="text-4xl font-bold mb-2">NTUN Space</h1>
            <p class="text-white/60 mb-10">Classroom & Club Management</p>
            <div id="g_id_onload" data-client_id="738644222886-o9uq6eonuu9hp8srsad1465lh9id41kj.apps.googleusercontent.com" data-callback="handleGoogleLogin"></div>
            <div class="g_id_signin flex justify-center" data-type="standard" data-shape="pill" data-size="large" data-theme="filled_blue"></div>
        </div>
    </div>

    <div id="mainApp" class="hidden min-h-screen max-w-6xl mx-auto px-4 pt-8">
        <header class="flex justify-between items-center mb-16">
            <div class="glass-pill px-6 py-3 flex items-center gap-3">
                <i class='bx bxs-school text-2xl'></i>
                <div class="h-6 w-[1px] bg-white/20"></div>
                <span class="text-sm font-bold tracking-tight">ระบบลงทะเบียนเรียน</span>
            </div>
            
            <div class="flex items-center gap-3">
                <div class="hidden md:flex glass-pill px-6 py-3 items-center gap-3">
                    <i class='bx bxs-grid-alt'></i> <span>แดชบอร์ด</span>
                </div>
                <div class="glass-pill pl-2 pr-5 py-2 flex items-center gap-3">
                    <img id="userImg" src="" class="w-9 h-9 rounded-full object-cover border border-white/30">
                    <span id="userNameSmall" class="text-sm font-bold">User</span>
                    <button onclick="logout()" class="ml-2 text-white/50 hover:text-white"><i class='bx bx-log-out-circle text-xl'></i></button>
                </div>
            </div>
        </header>

        <section class="mb-12">
            <p class="text-white/60 text-lg ml-1 font-light">ยินดีต้อนรับกลับมา</p>
            <h1 id="heroName" class="text-6xl font-bold mb-5">สวัสดี, User</h1>
            <div class="glass-pill inline-flex items-center gap-2 px-4 py-2 text-[12px] font-bold text-white/80 border-white/10 uppercase tracking-widest">
                <div class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></div>
                ช่วงที่ 2A — ลงทะเบียนชุมนุม
            </div>
        </section>

        <div id="contentArea"></div>
    </div>

    <script>
        // --- Firebase & Auth ---
        const firebaseConfig = {
            apiKey: "AIzaSyAlaTyhtXf-d6qDSD5AeWR33Hg3VCn55o8",
            authDomain: "ntunspace.firebaseapp.com",
            projectId: "ntunspace",
            storageBucket: "ntunspace.firebasestorage.app",
            messagingSenderId: "952526844615",
            appId: "1:952526844615:web:d1f78ba8e3b44c24ee84e2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const SUPER_ADMIN = "ntun21933@ntun.ac.th";

        let currentUser = null;
        let activeRoomId = null;
        let classrooms = {};

        function parseJwt(token) {
            var base64Url = token.split('.')[1];
            var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            return JSON.parse(decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')));
        }

        async function handleGoogleLogin(response) {
            const payload = parseJwt(response.credential);
            const email = payload.email.toLowerCase();
            if (!email.endsWith('@ntun.ac.th')) return Swal.fire({icon:'error', title:'Email Error', text:'@ntun.ac.th เท่านั้น', customClass:{popup:'swal2-popup hero-ui'}});

            let role = 'student';
            const userDoc = await db.collection("users").doc(email).get();
            if (email === SUPER_ADMIN) role = 'super_admin';
            else if (userDoc.exists) role = userDoc.data().role;

            currentUser = { email, name: payload.name, role, picture: payload.picture };
            localStorage.setItem('ntun_final_v1', JSON.stringify(currentUser));
            initApp();
        }

        const saved = localStorage.getItem('ntun_final_v1');
        if (saved) { currentUser = JSON.parse(saved); initApp(); }

        function initApp() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('heroName').innerText = `สวัสดี, ${currentUser.name.split(' ')[0]}`;
            document.getElementById('userNameSmall').innerText = currentUser.name.split(' ')[0];
            document.getElementById('userImg').src = currentUser.picture;

            db.collection("classrooms").onSnapshot(snap => {
                classrooms = {};
                snap.forEach(doc => { classrooms[doc.id] = doc.data(); });
                renderUI();
            });
        }

        function renderUI() {
            if (activeRoomId && classrooms[activeRoomId]) renderRoomView();
            else renderDashboard();
        }

        function renderDashboard() {
            const area = document.getElementById('contentArea');
            const isAdmin = ['super_admin', 'admin', 'teacher'].includes(currentUser.role);
            let html = `<div class="flex items-center gap-3 mb-8"><i class='bx bxs-grid text-2xl text-white/50'></i> <h2 class="text-2xl font-bold">ชุมนุมของฉัน</h2></div>`;

            if (isAdmin) {
                html += `
                <div class="main-card mb-10 flex flex-wrap gap-4 items-end">
                    <div class="flex-1 min-w-[200px]"><label class="text-xs font-bold opacity-50 mb-2 block uppercase tracking-wider">ชื่อชุมนุม / ห้อง</label><input id="roomName" type="text" placeholder="ระบุชื่อ..." class="w-full bg-white/10 border-none rounded-2xl p-4 text-white placeholder:text-white/20"></div>
                    <div class="w-32"><label class="text-xs font-bold opacity-50 mb-2 block uppercase tracking-wider">ที่นั่ง</label><input id="roomCount" type="number" value="40" class="w-full bg-white/10 border-none rounded-2xl p-4 text-center"></div>
                    <button onclick="createRoom()" class="glass-pill bg-white/20 px-8 py-4 font-bold"><i class='bx bx-plus-circle'></i> สร้าง</button>
                    <button onclick="showUserManagement()" class="glass-pill bg-blue-500/50 border-blue-400 px-6 py-4 font-bold ml-auto"><i class='bx bxs-user-badge'></i> จัดการยศ</button>
                </div>`;
            }

            html += `<div class="grid grid-cols-1 md:grid-cols-2 gap-8">`;
            for (const id in classrooms) {
                const c = classrooms[id];
                const booked = c.seats.filter(s => s.bookedBy).length;
                const percent = (booked / c.seats.length) * 100;
                const isMyRoom = c.seats.some(s => s.bookedBy === currentUser.email);

                html += `
                <div onclick="openRoom('${id}')" class="main-card group cursor-pointer hover:bg-white/15 transition-all">
                    <div class="flex justify-between items-start mb-6">
                        <div class="text-lg font-bold tracking-tight">${c.name}</div>
                        ${isMyRoom ? `<div class="status-badge"><i class='bx bxs-check-circle'></i> ลงทะเบียนแล้ว</div>` : `<div class="text-xs font-bold opacity-30 uppercase tracking-widest">ว่าง ${c.seats.length - booked} ที่</div>`}
                    </div>
                    <p class="text-white/40 text-sm mb-10 font-light">พัฒนาซอฟต์แวร์และแอปพลิเคชัน เรียนรู้คอมพิวเตอร์ Python, JavaScript และอื่นๆ พร้อมทำโปรเจกต์จริง</p>
                    <div class="flex justify-between text-xs font-bold mb-3 uppercase tracking-tighter">
                        <span class="opacity-60 text-sm">สมาชิก</span>
                        <span>${booked} / ${c.seats.length} คน</span>
                    </div>
                    <div class="progress-rail"><div class="progress-bar" style="width: ${percent}%"></div></div>
                </div>`;
            }
            html += `</div>`;
            area.innerHTML = html;
        }

        function renderRoomView() {
            const room = classrooms[activeRoomId];
            const area = document.getElementById('contentArea');
            const isAdmin = ['super_admin', 'admin', 'teacher'].includes(currentUser.role);
            
            area.innerHTML = `
                <div class="flex justify-between items-center mb-8">
                    <button onclick="activeRoomId=null; renderUI()" class="glass-pill px-6 py-3 flex items-center gap-2 font-bold text-sm"><i class='bx bx-left-arrow-alt'></i> กลับสู่แดชบอร์ด</button>
                    <div class="glass-pill px-6 py-3 font-bold text-sm bg-white/5 uppercase tracking-widest border-white/5">ROOM ID: ${activeRoomId}</div>
                </div>
                <div class="main-card p-4 overflow-hidden">
                    <div class="map-container">
                        <div class="w-full flex justify-center py-10 opacity-20 pointer-events-none">
                            <div class="w-96 h-1 bg-white rounded-full shadow-[0_0_20px_#fff]"></div>
                        </div>
                        <div id="roomMap">
                            ${room.seats.map(s => {
                                let state = '', display = s.id;
                                if (s.bookedBy) {
                                    if (s.bookedBy === currentUser.email) { state = 'my-seat'; display = "YOU"; }
                                    else { state = 'booked'; display = isAdmin ? s.name.split(' ')[0] : 'FULL'; }
                                }
                                return `
                                <svg id="desk-${s.id}" class="desk ${state}" style="position:absolute; left:${s.x}px; top:${s.y}px;" width="85" height="95" onmousedown="startDrag(event, ${s.id})" ontouchstart="startDrag(event, ${s.id})">
                                    <rect x="15" y="75" width="55" height="15" rx="6" fill="rgba(255,255,255,0.2)" />
                                    <rect x="0" y="5" width="85" height="65" class="desk-top" />
                                    <text x="42" y="42" text-anchor="middle" class="desk-label">${display}</text>
                                </svg>`;
                            }).join('')}
                        </div>
                    </div>
                </div>`;
        }

        // --- Logic & Database ---
        function calculatePositions(count) {
            const seats = [];
            for (let i = 0; i < count; i++) {
                const row = Math.floor(i / 8), col = i % 8;
                let x = col * 115;
                if (col >= 3) x += 80; if (col >= 6) x += 80;
                seats.push({ id: i + 1, x: x + 60, y: row * 125 + 100, bookedBy: null, name: null });
            }
            return seats;
        }

        async function createRoom() {
            const name = document.getElementById('roomName').value;
            const count = parseInt(document.getElementById('roomCount').value);
            if (!name || !count) return;
            const id = Math.random().toString(36).substring(2, 8).toUpperCase();
            await db.collection("classrooms").doc(id).set({ name, seats: calculatePositions(count) });
        }

        function openRoom(id) { activeRoomId = id; renderUI(); }
        
        async function handleBooking(sid) {
            const room = classrooms[activeRoomId];
            const seat = room.seats.find(s => s.id === sid);
            const isAdmin = ['super_admin','admin','teacher'].includes(currentUser.role);
            if (seat.bookedBy) {
                if (seat.bookedBy === currentUser.email || isAdmin) {
                    Swal.fire({ title: 'ยกเลิกการจอง?', icon: 'warning', showCancelButton: true, customClass: {popup: 'hero-ui'} })
                    .then(r => { if(r.isConfirmed) { seat.bookedBy = null; seat.name = null; db.collection("classrooms").doc(activeRoomId).update({ seats: room.seats }); }});
                }
            } else {
                if (!isAdmin && room.seats.some(s => s.bookedBy === currentUser.email)) return Swal.fire({icon: 'info', title: 'คุณจองไปแล้วครับ', customClass:{popup:'hero-ui'}});
                seat.bookedBy = currentUser.email; seat.name = currentUser.name;
                db.collection("classrooms").doc(activeRoomId).update({ seats: room.seats });
            }
        }

        // --- Drag & Drop ---
        let dragId = null, isMoving = false, startX, startY, initX, initY;
        function startDrag(e, id) {
            const isAdmin = ['super_admin','admin','teacher'].includes(currentUser.role);
            dragId = id; isMoving = false;
            const ev = e.touches ? e.touches[0] : e;
            startX = ev.clientX; startY = ev.clientY;
            const el = document.getElementById('desk-'+id);
            initX = parseInt(el.style.left); initY = parseInt(el.style.top);
        }

        document.addEventListener('mousemove', e => {
            if(!dragId || !['super_admin','admin','teacher'].includes(currentUser.role)) return;
            const ev = e.touches ? e.touches[0] : e;
            const dx = ev.clientX - startX, dy = ev.clientY - startY;
            if(Math.abs(dx) > 5 || Math.abs(dy) > 5) isMoving = true;
            if(isMoving) {
                const el = document.getElementById('desk-'+dragId);
                el.style.left = (initX + dx)+'px'; el.style.top = (initY + dy)+'px';
            }
        });

        document.addEventListener('mouseup', () => {
            if(!dragId) return;
            if(isMoving) {
                const el = document.getElementById('desk-'+dragId);
                const room = classrooms[activeRoomId];
                const seat = room.seats.find(s => s.id === dragId);
                seat.x = parseInt(el.style.left); seat.y = parseInt(el.style.top);
                db.collection("classrooms").doc(activeRoomId).update({ seats: room.seats });
            } else handleBooking(dragId);
            dragId = null;
        });

        // --- User Management (Original Request) ---
        async function showUserManagement() {
            const snap = await db.collection("users").get();
            let rows = '';
            snap.forEach(doc => {
                if (doc.id !== SUPER_ADMIN) {
                    rows += `
                    <div class="flex justify-between items-center bg-white/5 p-4 rounded-3xl mb-3 border border-white/5">
                        <div class="text-left"><p class="text-xs font-bold">${doc.id}</p><p class="text-[9px] opacity-40 font-black uppercase tracking-widest">${doc.data().role}</p></div>
                        <button onclick="removeUser('${doc.id}')" class="w-10 h-10 rounded-full bg-red-500/20 text-red-400 hover:bg-red-500 hover:text-white transition-all"><i class='bx bx-trash'></i></button>
                    </div>`;
                }
            });
            Swal.fire({
                title: 'จัดการผู้ดูแลระบบ',
                html: `
                    <div class="mb-6"><input id="swalEmail" placeholder="อีเมล @ntun.ac.th" class="w-full bg-white/10 rounded-2xl p-4 text-white mb-3 border-none"><select id="swalRole" class="w-full bg-indigo-900/50 rounded-2xl p-4 text-white border-none"><option value="teacher">Teacher (คุณครู)</option><option value="admin">Admin (ผู้ดูแล)</option></select></div>
                    <button id="addBtn" class="glass-pill w-full py-4 mb-6 bg-blue-500 border-none font-bold">เพิ่มสมาชิกใหม่</button>
                    <div class="max-h-64 overflow-y-auto pr-2">${rows || '<p class="opacity-20 py-10">ไม่พบรายชื่อผู้ดูแล</p>'}</div>
                `,
                showConfirmButton: false, showCancelButton: true, customClass:{popup:'hero-ui'},
                didOpen: () => {
                    document.getElementById('addBtn').onclick = async () => {
                        const email = document.getElementById('swalEmail').value.trim().toLowerCase();
                        if(!email.endsWith('@ntun.ac.th')) return;
                        await db.collection("users").doc(email).set({ role: document.getElementById('swalRole').value, name: "New Member" });
                        Swal.close(); showUserManagement();
                    };
                }
            });
        }
        async function removeUser(email) {
            await db.collection("users").doc(email).delete();
            Swal.close(); showUserManagement();
        }

        function logout() { localStorage.removeItem('ntun_final_v1'); location.reload(); }
    </script>
</body>
</html>
