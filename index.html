<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTUN Space - V12 (Standard Layout)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body { 
            font-family: 'Kanit', sans-serif; 
            background: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%);
            min-height: 100vh; color: white; overflow-x: hidden;
        }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glass-pill { border-radius: 999px; background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .desk { width: 65px; height: 80px; position: absolute; cursor: pointer; transition: transform 0.2s; }
        .desk:hover { transform: scale(1.1); z-index: 50; }
        .desk-top { fill: rgba(255, 255, 255, 0.1); stroke: rgba(255, 255, 255, 0.3); stroke-width: 2; rx: 10; }
        .booked .desk-top { fill: rgba(59, 130, 246, 0.5); stroke: #60a5fa; }
        .my-seat .desk-top { fill: rgba(34, 197, 94, 0.6); stroke: #4ade80; filter: drop-shadow(0 0 10px rgba(34,197,94,0.4)); }
        .desk-label { position: absolute; top: 28px; width: 100%; text-align: center; font-size: 10px; font-weight: 600; pointer-events: none; }
        .map-container { background: rgba(0,0,0,0.2); border-radius: 40px; position: relative; }
        input::placeholder { color: rgba(255,255,255,0.2); }
    </style>
</head>
<body>
    <div id="loginPage" class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-[#0f172a]">
        <div class="glass p-10 w-full max-w-sm text-center rounded-[2.5rem] shadow-2xl">
            <h1 class="text-2xl font-bold mb-1">NTUN SPACE</h1>
            <p class="text-white/40 mb-8 text-sm">Smart Seating Management</p>
            <div id="g_id_onload" data-client_id="738644222886-o9uq6eonuu9hp8srsad1465lh9id41kj.apps.googleusercontent.com" data-callback="handleGoogleLogin"></div>
            <div class="g_id_signin flex justify-center" data-type="standard" data-shape="pill"></div>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <header class="p-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center font-bold">NT</div>
                <div class="text-xs font-bold uppercase tracking-widest opacity-60">NTUN Space System</div>
            </div>
            <div class="flex items-center gap-3">
                <div class="glass-pill px-4 py-1.5 flex items-center gap-3">
                    <img id="userImg" src="" class="w-7 h-7 rounded-full">
                    <span id="userName" class="text-sm font-semibold"></span>
                </div>
                <button onclick="logout()" class="glass-pill p-2 hover:bg-red-500/20 text-red-400 transition"><i class='bx bx-power-off text-lg'></i></button>
            </div>
        </header>

        <main class="max-w-6xl mx-auto px-6 py-6">
            <div id="studentZone" class="mb-10 text-center">
                <div class="flex max-w-md mx-auto gap-2">
                    <input id="joinCode" class="flex-1 glass p-4 rounded-2xl border-white/10 outline-none text-center font-black tracking-widest text-xl uppercase" placeholder="ENTER ROOM ID">
                    <button onclick="joinByCode()" class="bg-indigo-600 px-8 rounded-2xl font-black hover:bg-indigo-500 transition">JOIN</button>
                </div>
            </div>

            <div id="staffControls" class="hidden mb-6 flex flex-col md:flex-row gap-4 justify-between items-center">
                <div class="relative w-full md:w-80">
                    <i class='bx bx-search absolute left-4 top-1/2 -translate-y-1/2 opacity-30'></i>
                    <input type="text" id="roomSearch" oninput="renderDashboard()" class="w-full glass-pill py-2.5 pl-12 pr-4 outline-none text-sm" placeholder="ค้นหาห้องเรียน...">
                </div>
                <button onclick="showCreateModal()" class="bg-white text-indigo-900 px-6 py-2.5 rounded-full font-bold text-sm flex items-center gap-2 hover:bg-indigo-50"><i class='bx bx-plus-circle'></i> สร้างห้องเรียน</button>
            </div>

            <div id="contentArea"></div>
        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAlaTyhtXf-d6qDSD5AeWR33Hg3VCn55o8",
            authDomain: "ntunspace.firebaseapp.com",
            projectId: "ntunspace",
            storageBucket: "ntunspace.firebasestorage.app",
            messagingSenderId: "952526844615",
            appId: "1:952526844615:web:d1f78ba8e3b44c24ee84e2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const SUPER_ADMIN = "ntun21933@ntun.ac.th";
        let currentUser = null;
        let activeRoomId = null;
        let classrooms = {};

        function decodeJwt(token) {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            return JSON.parse(decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')));
        }

        async function handleGoogleLogin(response) {
            const payload = decodeJwt(response.credential);
            const email = payload.email.toLowerCase();
            if (!email.endsWith('@ntun.ac.th')) return Swal.fire('Error', 'Use @ntun.ac.th', 'error');
            
            let role = (email === SUPER_ADMIN) ? 'super_admin' : 'student';
            currentUser = { email, name: payload.name, role, picture: payload.picture };
            localStorage.setItem('ntun_session_v12', JSON.stringify(currentUser));
            initApp();
        }

        function initApp() {
            const saved = localStorage.getItem('ntun_session_v12');
            if (saved) currentUser = JSON.parse(saved);
            if (!currentUser) return;

            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('userName').innerText = currentUser.name;
            document.getElementById('userImg').src = currentUser.picture;

            if (['super_admin', 'admin', 'teacher'].includes(currentUser.role)) {
                document.getElementById('studentZone').classList.add('hidden');
                document.getElementById('staffControls').classList.remove('hidden');
            }

            db.collection("classrooms").onSnapshot(snap => {
                classrooms = {};
                snap.forEach(doc => { classrooms[doc.id] = doc.data(); });
                renderUI();
            });
        }

        function logout() { localStorage.removeItem('ntun_session_v12'); location.reload(); }

        // --- Logic: Layout 3:3:2 ---
        function calculateStandardPositions(count) {
            const seats = [];
            const colW = 85;       // ความกว้างโต๊ะ
            const rowH = 110;      // ความสูงระหว่างแถว
            const blockGap = 70;   // ช่องว่างทางเดิน
            
            for (let i = 0; i < count; i++) {
                const row = Math.floor(i / 8); // 1 แถวมี 8 ตัว (3+3+2)
                const pos = i % 8;             // ตำแหน่งในแถว
                let xOffset = 0;

                if (pos < 3) {
                    xOffset = pos * colW; // กลุ่มที่ 1 (3 ตัว)
                } else if (pos < 6) {
                    xOffset = (pos * colW) + blockGap; // กลุ่มที่ 2 (3 ตัว)
                } else {
                    xOffset = (pos * colW) + (blockGap * 2); // กลุ่มที่ 3 (2 ตัว)
                }

                seats.push({
                    id: i + 1,
                    x: xOffset + 80, 
                    y: (row * rowH) + 120,
                    bookedBy: null,
                    name: null
                });
            }
            return seats;
        }

        async function resetLayout() {
            const res = await Swal.fire({
                title: 'จัดเรียง 3:3:2?',
                text: "โต๊ะทั้งหมดจะกลับไปวางตามตำแหน่งมาตรฐาน",
                icon: 'info',
                showCancelButton: true,
                background: '#1e293b', color: '#fff'
            });
            if (res.isConfirmed) {
                const room = classrooms[activeRoomId];
                room.seats = calculateStandardPositions(room.seats.length);
                await db.collection("classrooms").doc(activeRoomId).update({ seats: room.seats });
            }
        }

        // --- UI Rendering ---
        function renderUI() {
            if (activeRoomId) renderRoomView();
            else renderDashboard();
        }

        function renderDashboard() {
            const area = document.getElementById('contentArea');
            const isStaff = ['super_admin', 'admin', 'teacher'].includes(currentUser.role);
            const query = document.getElementById('roomSearch')?.value.toLowerCase() || '';
            
            let html = '<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">';
            if (isStaff) {
                for (const id in classrooms) {
                    const room = classrooms[id];
                    if (room.name.toLowerCase().includes(query)) {
                        html += `
                        <div class="glass p-6 rounded-[2rem] hover:border-white/20 transition">
                            <div class="flex justify-between mb-4">
                                <span class="text-[10px] bg-white/10 px-3 py-1 rounded-full font-mono">${id}</span>
                                <button onclick="deleteRoom('${id}')" class="text-red-400 opacity-50 hover:opacity-100"><i class='bx bx-trash'></i></button>
                            </div>
                            <h3 class="text-xl font-bold mb-6">${room.name}</h3>
                            <button onclick="enterRoom('${id}')" class="w-full bg-indigo-600/40 hover:bg-indigo-600 py-3 rounded-xl transition font-bold text-sm">เข้าจัดการห้อง</button>
                        </div>`;
                    }
                }
            } else {
                const myRoom = Object.keys(classrooms).find(id => classrooms[id].seats.some(s => s.bookedBy === currentUser.email));
                if (myRoom) {
                    html = `<div class="max-w-md mx-auto glass p-10 rounded-[3rem] text-center">
                        <i class='bx bx-check-circle text-5xl text-green-400 mb-4'></i>
                        <h3 class="text-2xl font-bold mb-2">จองสำเร็จ</h3>
                        <p class="opacity-50 mb-8">คุณมีที่นั่งในห้อง ${classrooms[myRoom].name} แล้ว</p>
                        <button onclick="enterRoom('${myRoom}')" class="w-full bg-indigo-600 py-4 rounded-2xl font-bold">ดูตำแหน่งที่นั่ง</button>
                    </div>`;
                }
            }
            area.innerHTML = html + '</div>';
        }

        function renderRoomView() {
            const room = classrooms[activeRoomId];
            const isStaff = ['super_admin', 'admin', 'teacher'].includes(currentUser.role);
            
            document.getElementById('contentArea').innerHTML = `
                <div class="flex flex-wrap justify-between items-center gap-4 mb-8">
                    <button onclick="activeRoomId=null; renderUI()" class="glass-pill px-5 py-2 flex items-center gap-2 hover:bg-white/10 transition text-sm">
                        <i class='bx bx-left-arrow-alt'></i> กลับหน้าหลัก
                    </button>
                    <div class="flex gap-2">
                        ${isStaff ? `
                            <button onclick="resetLayout()" class="glass-pill px-4 py-2 text-xs font-bold border-indigo-500/50 text-indigo-300 hover:bg-indigo-500/10">
                                <i class='bx bx-grid-alt'></i> RESET (3:3:2)
                            </button>
                            <button onclick="exportToExcel()" class="bg-emerald-600 hover:bg-emerald-500 px-5 py-2 rounded-full text-xs font-bold transition flex items-center gap-2">
                                <i class='bx bxs-file-export'></i> EXPORT
                            </button>
                        ` : ''}
                        <div class="glass-pill px-6 py-2 text-sm font-bold bg-indigo-500/10">${room.name}</div>
                    </div>
                </div>
                
                <div class="map-container p-10 glass min-h-[600px] overflow-auto">
                    <div class="relative w-[950px] h-[750px] mx-auto">
                        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-64 h-2 bg-white/10 rounded-full"></div>
                        <div class="absolute top-4 left-1/2 -translate-x-1/2 text-[9px] opacity-20 tracking-[0.5em] font-bold">WHITEBOARD</div>
                        ${room.seats.map(s => {
                            let state = s.bookedBy === currentUser.email ? 'my-seat' : (s.bookedBy ? 'booked' : '');
                            let label = s.id;
                            if (s.bookedBy === currentUser.email) label = 'ME';
                            else if (s.bookedBy && isStaff) label = s.name.split(' ')[0];
                            else if (s.bookedBy) label = 'OCC';

                            return `
                            <div id="desk-${s.id}" class="desk ${state}" style="left:${s.x}px; top:${s.y}px;" 
                                 onmousedown="startDrag(event, ${s.id})" ontouchstart="startDrag(event, ${s.id})">
                                <svg viewBox="0 0 100 110">
                                    <rect x="10" y="10" width="80" height="70" class="desk-top" />
                                </svg>
                                <div class="desk-label">${label}</div>
                            </div>`;
                        }).join('')}
                    </div>
                </div>`;
        }

        // --- Drag & Drop Core ---
        let dragId = null, isMoving = false, startX, startY, initX, initY;
        function startDrag(e, id) {
            dragId = id; isMoving = false;
            const ev = e.touches ? e.touches[0] : e;
            startX = ev.clientX; startY = ev.clientY;
            const el = document.getElementById('desk-'+id);
            initX = parseInt(el.style.left); initY = parseInt(el.style.top);
        }

        document.addEventListener('mousemove', (e) => {
            if(!dragId || !['super_admin', 'admin', 'teacher'].includes(currentUser.role)) return;
            const dx = e.clientX - startX; const dy = e.clientY - startY;
            if(Math.abs(dx) > 5 || Math.abs(dy) > 5) {
                isMoving = true;
                const el = document.getElementById('desk-'+dragId);
                el.style.left = (initX + dx)+'px'; el.style.top = (initY + dy)+'px';
            }
        });

        document.addEventListener('mouseup', async () => {
            if(!dragId) return;
            if(isMoving) {
                const room = classrooms[activeRoomId];
                const seat = room.seats.find(s => s.id === dragId);
                const el = document.getElementById('desk-'+dragId);
                seat.x = parseInt(el.style.left); seat.y = parseInt(el.style.top);
                db.collection("classrooms").doc(activeRoomId).update({ seats: room.seats });
            } else {
                handleBooking(dragId);
            }
            dragId = null;
        });

        async function handleBooking(sid) {
            const room = classrooms[activeRoomId];
            const seat = room.seats.find(s => s.id === sid);
            const isStaff = ['super_admin', 'admin', 'teacher'].includes(currentUser.role);

            if (seat.bookedBy) {
                if (seat.bookedBy === currentUser.email || isStaff) {
                    const res = await Swal.fire({ title: 'ยกเลิกการจอง?', icon: 'warning', showCancelButton: true, background: '#1e293b', color: '#fff' });
                    if(res.isConfirmed) { seat.bookedBy = null; seat.name = null; updateRoom(); }
                }
            } else {
                if (!isStaff && room.seats.some(s => s.bookedBy === currentUser.email)) return;
                seat.bookedBy = currentUser.email; seat.name = currentUser.name;
                updateRoom();
            }
        }

        function updateRoom() { db.collection("classrooms").doc(activeRoomId).update({ seats: classrooms[activeRoomId].seats }); }

        function showCreateModal() {
            Swal.fire({
                title: 'สร้างห้องเรียนใหม่',
                background: '#1e293b', color: '#fff',
                html: `
                    <input id="swal-name" class="swal2-input text-slate-900" placeholder="ชื่อห้อง (เช่น ม.6/1)">
                    <input id="swal-count" type="number" class="swal2-input text-slate-900" placeholder="จำนวนที่นั่ง">
                    <input id="swal-pass" class="swal2-input text-slate-900" placeholder="รหัสเข้าห้อง (ถ้ามี)">
                `,
                preConfirm: () => [document.getElementById('swal-name').value, document.getElementById('swal-count').value, document.getElementById('swal-pass').value]
            }).then(res => {
                if(res.isConfirmed) {
                    const [name, count, pass] = res.value;
                    const id = Math.random().toString(36).substring(2, 8).toUpperCase();
                    db.collection("classrooms").doc(id).set({
                        name,
                        seats: calculateStandardPositions(parseInt(count)),
                        password: pass || null
                    });
                }
            });
        }

        async function joinByCode() {
            const code = document.getElementById('joinCode').value.trim().toUpperCase();
            if (classrooms[code]) enterRoom(code);
            else Swal.fire('ไม่พบห้อง', 'รหัสไม่ถูกต้อง', 'error');
        }

        async function enterRoom(id) {
            const room = classrooms[id];
            if (room.password && !['super_admin', 'admin', 'teacher'].includes(currentUser.role)) {
                const { value: pass } = await Swal.fire({ title: 'Password', input: 'password', background: '#1e293b', color: '#fff' });
                if (pass !== room.password) return;
            }
            activeRoomId = id;
            renderUI();
        }

        async function deleteRoom(id) {
            const res = await Swal.fire({ title: 'ลบห้องเรียน?', icon: 'error', showCancelButton: true });
            if(res.isConfirmed) await db.collection("classrooms").doc(id).delete();
        }

        function exportToExcel() {
            const room = classrooms[activeRoomId];
            const data = room.seats.filter(s => s.bookedBy).map(s => ({
                "ที่นั่ง": s.id, "ชื่อ": s.name, "อีเมล": s.bookedBy, "ห้อง": room.name
            }));
            if (data.length === 0) return Swal.fire('ข้อมูลว่างเปล่า', '', 'info');
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Students");
            XLSX.writeFile(wb, `NTUN_${room.name}.xlsx`);
        }

        window.onload = initApp;
    </script>
</body>
</html>
