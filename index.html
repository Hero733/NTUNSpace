<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTUN SPACE - DIAGNOSTIC MODE</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Kanit', sans-serif; background: #0f172a; color: white; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .admin-bg { background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%) !important; }
        .std-bg { background: linear-gradient(135deg, #0ea5e9 0%, #6366f1 100%) !important; }
    </style>
</head>
<body id="main-body">

    <div id="login-screen" class="fixed inset-0 z-[9999] flex items-center justify-center bg-slate-900 p-6">
        <div class="glass p-10 w-full max-w-sm rounded-[2.5rem] text-center shadow-2xl">
            <h1 class="text-3xl font-bold mb-2">NTUN SPACE</h1>
            <p class="text-xs opacity-50 mb-8 uppercase tracking-widest">Login to continue</p>
            
            <div id="g_id_onload" 
                 data-client_id="118310489688-ksc64dv5rnv7o9jo2oklfeeibc2qk452.apps.googleusercontent.com" 
                 data-callback="handleCredentialResponse"></div>
            <div class="g_id_signin flex justify-center" data-type="standard"></div>
            
            <button onclick="clearEverything()" class="mt-8 text-[10px] text-red-400 underline">ล้างข้อมูลค้าง (ถ้าเข้าแอดมินไม่ได้ให้กดตรงนี้)</button>
        </div>
    </div>

    <div id="app-screen" class="hidden">
        <header class="p-6 flex justify-between items-center glass m-4 rounded-3xl">
            <h2 class="font-bold">NTUN SPACE</h2>
            <div class="flex items-center gap-3">
                <span id="display-role" class="text-[10px] font-bold px-3 py-1 rounded-full bg-white/20"></span>
                <button onclick="logout()" class="text-xs text-red-400 font-bold uppercase">Logout</button>
            </div>
        </header>

        <main class="p-6 max-w-4xl mx-auto">
            <div id="panel-admin" class="hidden animate-in">
                <div class="flex justify-between items-center mb-6">
                    <h1 class="text-3xl font-bold">Admin Dashboard</h1>
                    <button onclick="createRoom()" class="bg-green-500 px-6 py-2 rounded-full text-sm font-bold shadow-lg">เพิ่มห้องเรียน</button>
                </div>
                <div id="room-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>

            <div id="panel-student" class="hidden animate-in">
                <h1 class="text-3xl font-bold mb-6">สวัสดีคุณ <span id="student-name"></span></h1>
                <div id="booking-info"></div>
                <div id="join-section" class="glass p-8 rounded-3xl mt-6">
                    <p class="mb-4">กรอกรหัสห้องเพื่อจองที่นั่ง</p>
                    <div class="flex gap-2">
                        <input id="room-code" class="flex-1 bg-black/20 p-4 rounded-xl text-xl font-bold uppercase outline-none" placeholder="ROOM ID">
                        <button onclick="enterRoom(document.getElementById('room-code').value.toUpperCase())" class="bg-white text-blue-600 px-6 rounded-xl font-bold">JOIN</button>
                    </div>
                </div>
            </div>

            <div id="panel-map" class="hidden mt-6 glass p-6 rounded-[2rem]">
                <div class="flex justify-between items-center mb-6">
                    <button onclick="backToMain()" class="text-sm opacity-50">← กลับ</button>
                    <h3 id="current-room-name" class="font-bold text-xl"></h3>
                </div>
                <div class="overflow-auto">
                    <div id="seat-grid" class="relative w-[800px] h-[600px] mx-auto bg-black/10 rounded-xl"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAlaTyhtXf-d6qDSD5AeWR33Hg3VCn55o8",
            authDomain: "ntunspace.firebaseapp.com",
            projectId: "ntunspace",
            storageBucket: "ntunspace.firebasestorage.app",
            messagingSenderId: "952526844615",
            appId: "1:952526844615:web:d1f78ba8e3b44c24ee84e2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // --- จุดที่สำคัญที่สุด: เช็คชื่อแอดมิน ---
        const ADMIN_EMAIL = "ntun21933@ntun.ac.th"; 
        
        let user = null;
        let classrooms = {};
        let activeRoomId = null;

        function handleCredentialResponse(response) {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            const userEmail = payload.email.toLowerCase().trim(); // ล้างช่องว่างและตัวใหญ่

            // Diagnostic Alert: ให้มันเด้งบอกเลยว่าเห็นเป็นชื่ออะไร
            Swal.fire({
                title: 'Diagnostic',
                html: `ระบบตรวจพบอีเมล: <br><b>${userEmail}</b>`,
                icon: 'info',
                confirmButtonText: 'ดำเนินการต่อ'
            }).then(() => {
                if(!userEmail.endsWith('@ntun.ac.th')) {
                    Swal.fire('ผิดพลาด', 'กรุณาใช้เมลโรงเรียน', 'error');
                    return;
                }

                // เช็ค Role แบบเข้มงวด
                const isStaff = (userEmail === ADMIN_EMAIL.toLowerCase().trim());
                
                user = {
                    email: userEmail,
                    name: userEmail.split('@')[0],
                    role: isStaff ? 'ADMIN' : 'STUDENT'
                };

                localStorage.setItem('ntun_session', JSON.stringify(user));
                location.reload(); // รีโหลดเพื่อให้แน่ใจว่าล้าง State ทั้งหมด
            });
        }

        function init() {
            const saved = localStorage.getItem('ntun_session');
            if(!saved) return;
            user = JSON.parse(saved);

            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-screen').classList.remove('hidden');
            document.getElementById('display-role').innerText = user.role;

            if(user.role === 'ADMIN') {
                document.getElementById('main-body').classList.add('admin-bg');
                document.getElementById('panel-admin').classList.remove('hidden');
            } else {
                document.getElementById('main-body').classList.add('std-bg');
                document.getElementById('panel-student').classList.remove('hidden');
                document.getElementById('student-name').innerText = user.name;
            }

            db.collection("classrooms").onSnapshot(snap => {
                classrooms = {};
                snap.forEach(doc => classrooms[doc.id] = doc.data());
                renderUI();
            });
        }

        function renderUI() {
            if(activeRoomId) renderMap();
            else if(user.role === 'ADMIN') renderAdminGrid();
            else renderStudentStatus();
        }

        function renderAdminGrid() {
            const list = document.getElementById('room-list');
            list.innerHTML = Object.entries(classrooms).map(([id, r]) => `
                <div class="glass p-6 rounded-3xl cursor-pointer" onclick="enterRoom('${id}')">
                    <div class="flex justify-between">
                        <h3 class="font-bold text-xl">${r.name}</h3>
                        <button onclick="event.stopPropagation(); deleteRoom('${id}')" class="text-red-400 text-xs">ลบห้อง</button>
                    </div>
                    <p class="text-xs opacity-50 mt-1">รหัสเข้า: ${id}</p>
                </div>
            `).join('');
        }

        function renderStudentStatus() {
            const container = document.getElementById('booking-info');
            const myRoomId = Object.keys(classrooms).find(id => classrooms[id].seats.some(s => s.bookedBy === user.email));
            
            if(myRoomId) {
                const s = classrooms[myRoomId].seats.find(x => x.bookedBy === user.email);
                container.innerHTML = `
                    <div class="glass p-6 rounded-3xl border-l-4 border-green-400">
                        <p class="text-sm opacity-60">คุณจองที่นั่งแล้วในห้อง: ${classrooms[myRoomId].name}</p>
                        <p class="text-2xl font-bold">หมายเลขที่นั่ง: ${s.id}</p>
                        <button onclick="enterRoom('${myRoomId}')" class="mt-4 bg-white/20 px-4 py-2 rounded-lg text-xs">ดูผังที่นั่ง</button>
                    </div>`;
                document.getElementById('join-section').classList.add('hidden');
            } else {
                container.innerHTML = "";
                document.getElementById('join-section').classList.remove('hidden');
            }
        }

        function renderMap() {
            const room = classrooms[activeRoomId];
            document.getElementById('current-room-name').innerText = room.name;
            const grid = document.getElementById('seat-grid');
            grid.innerHTML = room.seats.map(s => `
                <div onclick="toggleSeat('${s.id}')" 
                     style="left:${s.x}px; top:${s.y}px; width:60px; height:60px;" 
                     class="absolute rounded-lg flex items-center justify-center cursor-pointer transition-all border-2 
                     ${s.bookedBy === user.email ? 'bg-green-500 border-white' : (s.bookedBy ? 'bg-indigo-900 border-indigo-700 opacity-50' : 'bg-white/10 border-white/20')}">
                    <span class="text-[10px] font-bold">${s.bookedBy ? 'BOOKED' : s.id}</span>
                </div>
            `).join('');
        }

        function enterRoom(id) {
            if(!classrooms[id]) return Swal.fire('ไม่พบห้อง', '', 'error');
            activeRoomId = id;
            document.getElementById('panel-admin').classList.add('hidden');
            document.getElementById('panel-student').classList.add('hidden');
            document.getElementById('panel-map').classList.remove('hidden');
            renderUI();
        }

        function backToMain() {
            activeRoomId = null;
            document.getElementById('panel-map').classList.add('hidden');
            if(user.role === 'ADMIN') document.getElementById('panel-admin').classList.remove('hidden');
            else document.getElementById('panel-student').classList.remove('hidden');
        }

        async function toggleSeat(sid) {
            const room = classrooms[activeRoomId];
            const seat = room.seats.find(x => x.id === sid);
            
            if(seat.bookedBy) {
                if(seat.bookedBy === user.email || user.role === 'ADMIN') {
                    const res = await Swal.fire({title: 'ยกเลิกจอง?', showCancelButton: true});
                    if(res.isConfirmed) {
                        seat.bookedBy = null;
                        db.collection("classrooms").doc(activeRoomId).update({seats: room.seats});
                    }
                }
                return;
            }
            if(user.role !== 'ADMIN' && room.seats.some(x => x.bookedBy === user.email)) return;
            seat.bookedBy = user.email;
            db.collection("classrooms").doc(activeRoomId).update({seats: room.seats});
        }

        function createRoom() {
            Swal.fire({
                title: 'สร้างห้อง',
                html: '<input id="n" class="swal2-input" placeholder="ชื่อ"><input id="c" type="number" class="swal2-input" placeholder="ที่นั่ง">',
                preConfirm: () => [document.getElementById('n').value, document.getElementById('c').value]
            }).then(r => {
                if(!r.value) return;
                const id = Math.random().toString(36).substring(7).toUpperCase();
                const seats = [];
                for(let i=0; i<r.value[1]; i++) seats.push({id: i+1, x: (i%8)*80+20, y: Math.floor(i/8)*100+20, bookedBy: null});
                db.collection("classrooms").doc(id).set({name: r.value[0], seats});
            });
        }

        function deleteRoom(id) { db.collection("classrooms").doc(id).delete(); }
        function logout() { localStorage.clear(); location.reload(); }
        function clearEverything() { localStorage.clear(); alert('ล้างข้อมูลสำเร็จ ลอง Login ใหม่ครับ'); location.reload(); }

        window.onload = init;
    </script>
</body>
</html>
