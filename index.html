<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTUN Space - Premium Seating</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.5);
        }

        body { 
            font-family: 'Kanit', sans-serif; 
            /* พื้นหลังสีสดใสแบบในรูปที่ส่งมา */
            background: linear-gradient(135deg, #a5f3fc 0%, #818cf8 40%, #c084fc 70%, #fb7185 100%);
            background-attachment: fixed;
            min-height: 100vh; 
            color: #1e293b; 
            overflow-x: hidden;
        }

        .glass { 
            background: var(--glass-bg); 
            backdrop-filter: blur(20px) saturate(160%); 
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 40px 0 rgba(31, 38, 135, 0.1);
        }

        .glass-pill { 
            border-radius: 999px; 
            background: rgba(255, 255, 255, 0.3); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: #1e293b;
        }

        /* ดีไซน์เก้าอี้และโต๊ะ */
        .desk { width: 70px; height: 85px; position: absolute; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; touch-action: none; }
        .desk:hover { transform: translateY(-5px) scale(1.05); z-index: 10; }
        
        .desk-part { fill: rgba(255, 255, 255, 0.7); stroke: rgba(255, 255, 255, 0.9); stroke-width: 1.5; transition: all 0.3s; }
        .chair-part { fill: rgba(255, 255, 255, 0.4); stroke: rgba(255, 255, 255, 0.6); stroke-width: 1.5; transition: all 0.3s; }

        .booked .desk-part { fill: #818cf8; stroke: #6366f1; }
        .booked .chair-part { fill: #c7d2fe; stroke: #818cf8; }
        .booked .desk-label { color: white; }

        .my-seat { filter: drop-shadow(0 0 15px rgba(34, 197, 94, 0.5)); }
        .my-seat .desk-part { fill: #22c55e; stroke: #16a34a; }
        .my-seat .chair-part { fill: #86efac; stroke: #22c55e; }
        .my-seat .desk-label { color: white; }

        .desk-label { position: absolute; top: 25px; width: 100%; text-align: center; font-size: 11px; font-weight: 800; color: #475569; pointer-events: none; }
        
        .map-area { border-radius: 4rem; background: rgba(255, 255, 255, 0.15); border: 2px solid rgba(255,255,255,0.3); }

        .status-badge { background: #22c55e; color: white; padding: 6px 16px; border-radius: 999px; font-size: 12px; font-weight: 700; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
    </style>
</head>
<body>

    <div id="loginPage" class="fixed inset-0 z-[100] flex items-center justify-center p-6">
        <div class="glass p-12 w-full max-w-md text-center rounded-[3rem]">
            <div class="w-28 h-28 mx-auto mb-8 relative">
                <div class="absolute inset-0 bg-white/50 rounded-full blur-xl"></div>
                <img src="photo/logo.png" alt="Logo" class="relative z-10 w-full h-full object-contain">
            </div>
            <h1 class="text-3xl font-bold mb-2 text-slate-800 tracking-tight">NTUN SPACE</h1>
            <p class="text-slate-600 mb-10 font-light">Premium Seating Experience</p>
            <div id="g_id_onload" data-client_id="738644222886-o9uq6eonuu9hp8srsad1465lh9id41kj.apps.googleusercontent.com" data-callback="handleGoogleLogin"></div>
            <div class="g_id_signin flex justify-center" data-type="standard" data-shape="pill"></div>
            <p class="mt-10 text-[10px] opacity-60 font-bold tracking-[0.3em] uppercase text-slate-500">@ntun.ac.th only</p>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <header class="p-8 flex flex-col md:flex-row justify-between items-center gap-6 max-w-7xl mx-auto">
            <div class="flex items-center gap-5">
                <div class="w-16 h-16 glass rounded-2xl flex items-center justify-center p-2">
                    <img src="photo/logo.png" class="w-full h-full object-contain">
                </div>
                <div>
                    <h2 class="text-2xl font-bold text-white drop-shadow-md uppercase tracking-tight">NTUN SPACE</h2>
                    <div class="glass-pill px-3 py-0.5 text-[10px] font-bold text-white w-fit uppercase">Vivid Classroom V2</div>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="glass-pill p-1.5 flex items-center gap-4 pr-6">
                    <img id="userImg" src="" class="w-10 h-10 rounded-full border-2 border-white/50">
                    <span id="userName" class="text-sm font-semibold"></span>
                </div>
                <button onclick="logout()" class="bg-red-500 hover:bg-red-600 text-white px-6 py-2.5 rounded-full font-bold transition-all flex items-center gap-2">
                    <i class='bx bx-power-off'></i> ออกจากระบบ
                </button>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-6 pb-20">
            <section id="studentAction" class="mb-16 text-left animate-in">
                <div class="max-w-2xl">
                    <p class="text-white/80 mb-2 font-medium">Welcome back,</p>
                    <h1 class="text-6xl font-bold mb-8 text-white drop-shadow-lg">สวัสดี, <span id="welcomeName">นักเรียน</span></h1>
                    <div class="glass p-10 rounded-[3rem] border-white/40">
                        <div class="flex items-center gap-3 mb-4 text-slate-700">
                            <i class='bx bx-door-open text-2xl'></i>
                            <span class="font-bold text-lg">ระบุรหัสชั้นเรียน</span>
                        </div>
                        <div class="flex flex-col md:flex-row gap-4">
                            <input id="joinCode" class="flex-1 glass bg-white/30 border-white/40 rounded-2xl px-6 py-5 text-xl font-bold tracking-[0.3em] uppercase text-slate-800 placeholder:text-slate-500 outline-none" placeholder="ROOM ID">
                            <button onclick="joinByCode()" class="bg-white text-indigo-600 px-10 py-5 rounded-2xl font-black text-lg hover:scale-105 active:scale-95 transition-all shadow-xl">JOIN ROOM</button>
                        </div>
                    </div>
                </div>
            </section>

            <section id="staffAction" class="hidden mb-12 animate-in">
                <div class="flex flex-col md:flex-row gap-6 items-center justify-between">
                    <h2 class="text-3xl font-bold text-white drop-shadow-md">Dashboard</h2>
                    <div class="flex gap-3 w-full md:w-auto">
                        <input type="text" id="roomSearch" oninput="renderDashboard()" class="glass-pill py-4 px-6 outline-none text-slate-800 placeholder:text-slate-500 w-full md:w-64" placeholder="ค้นหาห้อง...">
                        <button onclick="showCreateModal()" class="bg-white text-indigo-600 px-8 rounded-full font-bold shadow-lg flex items-center gap-2 shrink-0">
                            <i class='bx bx-plus'></i> สร้างห้อง
                        </button>
                    </div>
                </div>
            </section>

            <div id="contentArea"></div>
        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAlaTyhtXf-d6qDSD5AeWR33Hg3VCn55o8",
            authDomain: "ntunspace.firebaseapp.com",
            projectId: "ntunspace",
            storageBucket: "ntunspace.firebasestorage.app",
            messagingSenderId: "952526844615",
            appId: "1:952526844615:web:d1f78ba8e3b44c24ee84e2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const SUPER_ADMIN = "ntun21933@ntun.ac.th";
        let currentUser = null;
        let activeRoomId = null;
        let classrooms = {};

        function decodeJwt(token) {
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                return JSON.parse(decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')));
            } catch (e) { return null; }
        }

        async function handleGoogleLogin(response) {
            const payload = decodeJwt(response.credential);
            const email = payload.email.toLowerCase();
            if (!email.endsWith('@ntun.ac.th')) {
                return Swal.fire({ icon: 'error', title: 'ไม่อนุญาต', text: 'เฉพาะเมล @ntun.ac.th', background: 'white' });
            }
            let role = (email === SUPER_ADMIN) ? 'super_admin' : 'student';
            currentUser = { email, name: payload.name, role, picture: payload.picture };
            localStorage.setItem('ntun_session_v12', JSON.stringify(currentUser));
            initApp();
        }

        function initApp() {
            const saved = localStorage.getItem('ntun_session_v12');
            if (!saved) return;
            currentUser = JSON.parse(saved);
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('userName').innerText = currentUser.name;
            document.getElementById('userImg').src = currentUser.picture;
            if(document.getElementById('welcomeName')) document.getElementById('welcomeName').innerText = currentUser.name;

            const isStaff = ['super_admin', 'admin', 'teacher'].includes(currentUser.role);
            if(isStaff) {
                document.getElementById('studentAction').classList.add('hidden');
                document.getElementById('staffAction').classList.remove('hidden');
            }

            db.collection("classrooms").onSnapshot(snap => {
                classrooms = {};
                snap.forEach(doc => { classrooms[doc.id] = doc.data(); });
                renderUI();
            });
        }

        function logout() { localStorage.removeItem('ntun_session_v12'); location.reload(); }

        function renderUI() {
            if (activeRoomId) renderRoomView();
            else renderDashboard();
        }

        function renderDashboard() {
            const area = document.getElementById('contentArea');
            const isStaff = ['super_admin', 'admin', 'teacher'].includes(currentUser.role);
            const query = document.getElementById('roomSearch')?.value.toLowerCase() || '';
            
            let html = '';
            if (isStaff) {
                html = `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">`;
                for (const id in classrooms) {
                    const room = classrooms[id];
                    if (room.name.toLowerCase().includes(query) || id.toLowerCase().includes(query)) {
                        const booked = room.seats.filter(s => s.bookedBy).length;
                        html += `
                        <div class="glass p-8 rounded-[2.5rem] hover:bg-white/50 transition-all animate-in">
                            <div class="flex justify-between items-start mb-6">
                                <span class="bg-indigo-500/20 text-indigo-700 px-4 py-1 rounded-full text-xs font-bold border border-indigo-200">${id}</span>
                                <button onclick="deleteRoom('${id}')" class="text-slate-400 hover:text-red-500 transition"><i class='bx bx-trash text-xl'></i></button>
                            </div>
                            <h3 class="text-2xl font-bold mb-1 text-slate-800">${room.name}</h3>
                            <p class="text-sm text-slate-600 mb-8 font-medium">ความจุ ${booked} / ${room.seats.length} ที่นั่ง</p>
                            <div class="space-y-2">
                                <button onclick="enterRoom('${id}')" class="w-full bg-indigo-600 text-white py-3.5 rounded-2xl font-bold shadow-lg shadow-indigo-200">เปิดห้องเรียน</button>
                                <div class="grid grid-cols-2 gap-2">
                                    <button onclick="resetLayout('${id}')" class="bg-white/50 py-3 rounded-2xl text-[11px] font-bold text-slate-700 border border-white">จัดผังใหม่</button>
                                    <button onclick="clearAllBookings('${id}')" class="bg-white/50 py-3 rounded-2xl text-[11px] font-bold text-red-500 border border-white">ล้างจอง</button>
                                </div>
                            </div>
                        </div>`;
                    }
                }
                html += `</div>`;
            } else {
                const myRoomId = Object.keys(classrooms).find(id => classrooms[id].seats.some(s => s.bookedBy === currentUser.email));
                if (myRoomId) {
                    const room = classrooms[myRoomId];
                    const seat = room.seats.find(s => s.bookedBy === currentUser.email);
                    html = `
                    <div class="max-w-md mx-auto glass p-10 rounded-[3rem] text-center animate-in shadow-2xl border-white/60">
                        <div class="status-badge w-fit mx-auto mb-6">✓ ลงทะเบียนแล้ว</div>
                        <h3 class="text-4xl font-bold mb-2 text-slate-800">${room.name}</h3>
                        <p class="text-slate-600 mb-8 text-lg font-medium">ที่นั่งหมายเลข <span class="text-indigo-600 font-black">${seat.id}</span></p>
                        <button onclick="enterRoom('${myRoomId}')" class="w-full bg-white py-5 rounded-3xl font-black text-indigo-600 shadow-xl hover:scale-105 transition-all text-xl">ดูผังที่นั่ง</button>
                    </div>`;
                }
            }
            area.innerHTML = html || `<p class="text-center text-white/70 py-20 font-medium">ยังไม่มีข้อมูลห้องเรียนในขณะนี้</p>`;
        }

        function renderRoomView() {
            const room = classrooms[activeRoomId];
            const isStaff = ['super_admin', 'admin', 'teacher'].includes(currentUser.role);
            
            document.getElementById('contentArea').innerHTML = `
                <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-10 animate-in">
                    <button onclick="activeRoomId=null; renderUI()" class="glass-pill px-8 py-3 flex items-center gap-2 hover:bg-white/50 transition-all font-bold">
                        <i class='bx bx-left-arrow-alt text-2xl'></i> ย้อนกลับ
                    </button>
                    <div class="flex gap-3">
                        ${isStaff ? `<button onclick="exportExcel()" class="bg-emerald-500 text-white px-6 py-3 rounded-full text-xs font-bold shadow-lg"><i class='bx bxs-file-export'></i> EXPORT</button>` : ''}
                        <div class="glass-pill px-10 py-3 text-sm font-black text-indigo-700 bg-white/60">${room.name}</div>
                    </div>
                </div>
                <div class="map-area p-12 min-h-[700px] relative overflow-auto bg-white/20">
                    <div class="w-[950px] h-[750px] mx-auto relative" id="roomCanvas">
                        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[500px] h-4 bg-white/40 rounded-full blur-[1px]"></div>
                        <div class="absolute top-6 left-1/2 -translate-x-1/2 text-[11px] tracking-[0.5em] text-slate-500 font-black uppercase">Front (Teacher Side)</div>
                        ${room.seats.map(s => {
                            const isMe = s.bookedBy === currentUser.email;
                            const stateClass = isMe ? 'my-seat' : (s.bookedBy ? 'booked' : '');
                            let label = s.id;
                            if (isMe) label = "ME";
                            else if (s.bookedBy && isStaff) label = s.name.split(' ')[0];
                            else if (s.bookedBy) label = "FULL";
                            
                            return `
                            <div id="desk-${s.id}" class="desk ${stateClass}" style="left:${s.x}px; top:${s.y}px;"
                                 onmousedown="startDrag(event, ${s.id})" ontouchstart="startDrag(event, ${s.id})">
                                <svg viewBox="0 0 100 120" class="drop-shadow-lg">
                                    <path d="M25,80 L75,80 L70,110 L30,110 Z" class="chair-part" />
                                    <rect x="5" y="10" width="90" height="60" rx="8" class="desk-part" />
                                    <rect x="15" y="15" width="70" height="5" rx="2" fill="rgba(0,0,0,0.05)" />
                                </svg>
                                <div class="desk-label">${label}</div>
                            </div>`;
                        }).join('')}
                    </div>
                </div>`;
        }

        async function joinByCode() {
            const code = document.getElementById('joinCode').value.trim().toUpperCase();
            if (classrooms[code]) enterRoom(code);
            else Swal.fire({ icon: 'warning', title: 'ไม่พบห้อง', text: 'ตรวจสอบรหัสห้องอีกครั้ง' });
        }

        async function enterRoom(id) {
            const room = classrooms[id];
            const isStaff = ['super_admin', 'admin', 'teacher'].includes(currentUser.role);
            if (room.password && !isStaff) {
                const { value: pass } = await Swal.fire({
                    title: 'ระบุรหัสผ่านห้อง', input: 'password', showCancelButton: true
                });
                if (!pass || pass !== room.password) {
                    if(pass) Swal.fire('รหัสไม่ถูกต้อง', '', 'error');
                    return;
                }
            }
            activeRoomId = id;
            renderUI();
        }

        async function handleBooking(sid) {
            const room = classrooms[activeRoomId]; 
            const seat = room.seats.find(s => s.id === sid);
            const isStaff = ['super_admin', 'admin', 'teacher'].includes(currentUser.role);

            if (seat.bookedBy) {
                if (seat.bookedBy === currentUser.email || isStaff) {
                    const res = await Swal.fire({ 
                        title: 'ยกเลิกการจอง?', text: `ยกเลิกที่นั่ง ${sid}`, icon: 'question', 
                        showCancelButton: true, confirmButtonColor: '#ef4444'
                    });
                    if(res.isConfirmed) { 
                        seat.bookedBy = null; 
                        seat.name = null; 
                        db.collection("classrooms").doc(activeRoomId).update({ seats: room.seats }); 
                    }
                }
                return;
            }

            if (!isStaff) {
                for (const rId in classrooms) {
                    if (classrooms[rId].seats.some(s => s.bookedBy === currentUser.email)) {
                        return Swal.fire({ icon: 'error', title: 'จองซ้ำไม่ได้', text: 'คุณได้จองที่นั่งในห้องอื่นไว้แล้ว' });
                    }
                }
            }

            seat.bookedBy = currentUser.email; seat.name = currentUser.name;
            db.collection("classrooms").doc(activeRoomId).update({ seats: room.seats });
        }

        let dragId = null, isMoving = false, startX, startY, initX, initY;
        function startDrag(e, id) {
            const isStaff = ['super_admin', 'admin', 'teacher'].includes(currentUser.role);
            dragId = id; isMoving = false;
            const ev = e.touches ? e.touches[0] : e;
            startX = ev.clientX; startY = ev.clientY;
            const el = document.getElementById('desk-'+id);
            initX = parseInt(el.style.left); initY = parseInt(el.style.top);
            
            const moveHandler = (me) => {
                const mev = me.touches ? me.touches[0] : me;
                const dx = mev.clientX - startX; const dy = mev.clientY - startY;
                if((Math.abs(dx) > 5 || Math.abs(dy) > 5) && isStaff) {
                    isMoving = true; el.style.left = (initX + dx)+'px'; el.style.top = (initY + dy)+'px';
                }
            };
            const endHandler = () => {
                document.removeEventListener('mousemove', moveHandler); document.removeEventListener('mouseup', endHandler);
                document.removeEventListener('touchmove', moveHandler); document.removeEventListener('touchend', endHandler);
                if(isMoving) {
                    const room = classrooms[activeRoomId]; const seat = room.seats.find(s => s.id === dragId);
                    seat.x = parseInt(el.style.left); seat.y = parseInt(el.style.top);
                    db.collection("classrooms").doc(activeRoomId).update({ seats: room.seats });
                } else { handleBooking(dragId); }
                dragId = null;
            };
            document.addEventListener('mousemove', moveHandler); document.addEventListener('mouseup', endHandler);
            document.addEventListener('touchmove', moveHandler, { passive: false }); document.addEventListener('touchend', endHandler);
        }

        function showCreateModal() {
            Swal.fire({
                title: 'สร้างห้องเรียน',
                html: `<div class="text-left space-y-4 p-2">
                    <input id="swal-name" class="w-full bg-slate-100 p-4 rounded-2xl" placeholder="ชื่อห้องเรียน">
                    <input id="swal-count" type="number" class="w-full bg-slate-100 p-4 rounded-2xl" placeholder="จำนวนที่นั่ง">
                    <input id="swal-pass" class="w-full bg-slate-100 p-4 rounded-2xl" placeholder="รหัสผ่าน (ถ้ามี)">
                </div>`,
                showCancelButton: true, preConfirm: () => {
                    const name = document.getElementById('swal-name').value;
                    const count = document.getElementById('swal-count').value;
                    if (!name || !count) return Swal.showValidationMessage('กรอกข้อมูลไม่ครบ');
                    return [name, count, document.getElementById('swal-pass').value];
                }
            }).then(res => {
                if(res.isConfirmed) {
                    const [name, count, pass] = res.value;
                    const id = Math.random().toString(36).substring(2, 8).toUpperCase();
                    const seats = [];
                    for(let i=0; i<parseInt(count); i++) {
                        const col = i % 8; const row = Math.floor(i / 8);
                        let xOffset = (col >= 3 ? 60 : 0) + (col >= 6 ? 60 : 0);
                        seats.push({ id: i+1, x: (col * 85) + 80 + xOffset, y: (row * 115) + 120, bookedBy: null, name: null });
                    }
                    db.collection("classrooms").doc(id).set({ name, seats, password: pass || null });
                }
            });
        }

        async function resetLayout(roomId) {
            const room = classrooms[roomId];
            const updatedSeats = room.seats.map((seat, i) => {
                const col = i % 8; const row = Math.floor(i / 8);
                let xOffset = (col >= 3 ? 60 : 0) + (col >= 6 ? 60 : 0);
                return { ...seat, x: (col * 85) + 80 + xOffset, y: (row * 115) + 120 };
            });
            await db.collection("classrooms").doc(roomId).update({ seats: updatedSeats });
        }

        async function clearAllBookings(roomId) {
            const res = await Swal.fire({ title: 'ล้างจองทั้งหมด?', icon: 'warning', showCancelButton: true });
            if (res.isConfirmed) {
                const cleared = classrooms[roomId].seats.map(s => ({ ...s, bookedBy: null, name: null }));
                await db.collection("classrooms").doc(roomId).update({ seats: cleared });
            }
        }

        async function deleteRoom(id) {
            const res = await Swal.fire({ title: 'ลบห้องเรียนนี้?', icon: 'warning', showCancelButton: true });
            if(res.isConfirmed) await db.collection("classrooms").doc(id).delete();
        }

        function exportExcel() {
            const room = classrooms[activeRoomId];
            const data = room.seats.filter(s => s.bookedBy).map(s => ({
                "เลขที่นั่ง": s.id, "ชื่อ": s.name, "อีเมล": s.bookedBy, "ห้อง": room.name
            }));
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "รายชื่อ");
            XLSX.writeFile(wb, `Seats_${room.name}.xlsx`);
        }

        window.onload = initApp;
    </script>
</body>
</html>
