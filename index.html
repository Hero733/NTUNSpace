<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTUN Space - Professional Seating</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body { 
            font-family: 'Kanit', sans-serif; 
            background: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%);
            min-height: 100vh; color: white; overflow-x: hidden;
        }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glass-pill { border-radius: 999px; background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* Seat Design */
        .desk { width: 60px; height: 70px; position: absolute; transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; touch-action: none; }
        .desk:hover { transform: scale(1.1); z-index: 10; }
        .desk-top { fill: rgba(255, 255, 255, 0.1); stroke: rgba(255, 255, 255, 0.3); stroke-width: 2; rx: 8; }
        .booked .desk-top { fill: rgba(59, 130, 246, 0.5); stroke: #60a5fa; }
        .my-seat .desk-top { fill: rgba(34, 197, 94, 0.5); stroke: #4ade80; filter: drop-shadow(0 0 8px rgba(34,197,94,0.4)); }
        
        .desk-label { position: absolute; top: 22px; width: 100%; text-align: center; font-size: 10px; font-weight: 500; pointer-events: none; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; padding: 0 4px; }
        
        .map-area { 
            background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            border-radius: 2rem;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.5);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.4s ease forwards; }
    </style>
</head>
<body>

    <div id="loginPage" class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-[#0f172a]">
        <div class="glass p-10 w-full max-w-sm text-center rounded-[2.5rem] shadow-2xl border-white/20">
            <div class="w-20 h-20 bg-indigo-600 rounded-3xl mx-auto mb-6 flex items-center justify-center shadow-lg shadow-indigo-500/20">
                <i class='bx bxs-graduation text-4xl text-white'></i>
            </div>
            <h1 class="text-2xl font-bold mb-1">NTUN SPACE</h1>
            <p class="text-white/40 mb-8 text-sm font-light">ระบบจัดการที่นั่งอัจฉริยะ</p>
            
            <div id="g_id_onload" 
                 data-client_id="738644222886-o9uq6eonuu9hp8srsad1465lh9id41kj.apps.googleusercontent.com" 
                 data-callback="handleGoogleLogin"></div>
            <div class="g_id_signin flex justify-center" data-type="standard" data-shape="pill" data-theme="filled_blue"></div>
            
            <p class="mt-8 text-[10px] opacity-30 tracking-widest uppercase">เฉพาะ @ntun.ac.th เท่านั้น</p>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <header class="p-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-white/10 rounded-xl flex items-center justify-center border border-white/10">
                    <i class='bx bxs-layout text-xl text-indigo-400'></i>
                </div>
                <div>
                    <h2 class="font-bold leading-none uppercase">NTUN SPACE</h2>
                    <span class="text-[10px] opacity-40 tracking-tighter">Classroom Management v12</span>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <div class="glass-pill pl-1 pr-4 py-1 flex items-center gap-3">
                    <img id="userImg" src="" class="w-8 h-8 rounded-full border border-white/10">
                    <span id="userName" class="text-xs font-medium"></span>
                </div>
                <button onclick="logout()" class="w-10 h-10 rounded-full glass hover:bg-red-500/20 transition flex items-center justify-center text-red-400 border-red-500/20">
                    <i class='bx bx-log-out-circle text-xl'></i>
                </button>
            </div>
        </header>

        <main class="max-w-6xl mx-auto px-6 pb-20">
            <section id="studentAction" class="mb-10 text-center animate-in">
                <div class="max-w-md mx-auto">
                    <h3 class="text-lg font-medium mb-4 opacity-80">กรอกรหัสเพื่อเข้าห้องเรียน</h3>
                    <div class="flex gap-2">
                        <input id="joinCode" class="flex-1 glass border-white/10 rounded-2xl px-6 py-4 text-center text-xl font-bold tracking-widest uppercase focus:outline-none focus:border-indigo-500 transition" placeholder="ROOM ID">
                        <button onclick="joinByCode()" class="bg-indigo-600 hover:bg-indigo-500 px-8 rounded-2xl font-bold shadow-lg shadow-indigo-600/20 transition">JOIN</button>
                    </div>
                </div>
            </section>

            <section id="staffAction" class="hidden mb-10 animate-in">
                <div class="flex flex-col md:flex-row gap-4 items-center justify-between">
                    <div class="relative w-full md:w-96">
                        <i class='bx bx-search absolute left-5 top-1/2 -translate-y-1/2 opacity-30 text-xl'></i>
                        <input type="text" id="roomSearch" oninput="renderDashboard()" class="w-full glass-pill py-3 pl-14 pr-6 text-sm outline-none focus:border-white/30" placeholder="ค้นหาชื่อห้องเรียน หรือรหัส...">
                    </div>
                    <button onclick="showCreateModal()" class="w-full md:w-auto bg-white text-slate-900 px-8 py-3 rounded-full font-bold hover:bg-indigo-50 transition flex items-center justify-center gap-2">
                        <i class='bx bx-plus-circle text-xl'></i> สร้างห้องใหม่
                    </button>
                </div>
            </section>

            <div id="contentArea"></div>
        </main>
    </div>

    <script>
        // --- Firebase Init ---
        const firebaseConfig = {
            apiKey: "AIzaSyAlaTyhtXf-d6qDSD5AeWR33Hg3VCn55o8",
            authDomain: "ntunspace.firebaseapp.com",
            projectId: "ntunspace",
            storageBucket: "ntunspace.firebasestorage.app",
            messagingSenderId: "952526844615",
            appId: "1:952526844615:web:d1f78ba8e3b44c24ee84e2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const SUPER_ADMIN = "ntun21933@ntun.ac.th";
        let currentUser = null;
        let activeRoomId = null;
        let classrooms = {};

        // --- Authentication ---
        function decodeJwt(token) {
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                return JSON.parse(decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')));
            } catch (e) { return null; }
        }

        async function handleGoogleLogin(response) {
            const payload = decodeJwt(response.credential);
            const email = payload.email.toLowerCase();
            
            if (!email.endsWith('@ntun.ac.th')) {
                return Swal.fire({ icon: 'error', title: 'ไม่อนุญาต', text: 'กรุณาใช้เมลสถานศึกษา @ntun.ac.th', background: '#1e293b', color: '#fff' });
            }

            let role = (email === SUPER_ADMIN) ? 'super_admin' : 'student';
            currentUser = { email, name: payload.name, role, picture: payload.picture };
            localStorage.setItem('ntun_session_v12', JSON.stringify(currentUser));
            initApp();
        }

        function initApp() {
            const saved = localStorage.getItem('ntun_session_v12');
            if (!saved) return;
            currentUser = JSON.parse(saved);

            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('userName').innerText = currentUser.name;
            document.getElementById('userImg').src = currentUser.picture;

            const isStaff = ['super_admin', 'admin', 'teacher'].includes(currentUser.role);
            if(isStaff) {
                document.getElementById('studentAction').classList.add('hidden');
                document.getElementById('staffAction').classList.remove('hidden');
            }

            db.collection("classrooms").onSnapshot(snap => {
                classrooms = {};
                snap.forEach(doc => { classrooms[doc.id] = doc.data(); });
                renderUI();
            });
        }

        function logout() { localStorage.removeItem('ntun_session_v12'); location.reload(); }

        // --- UI Logic ---
        function renderUI() {
            if (activeRoomId) renderRoomView();
            else renderDashboard();
        }

        function renderDashboard() {
            const area = document.getElementById('contentArea');
            const isStaff = ['super_admin', 'admin', 'teacher'].includes(currentUser.role);
            const query = document.getElementById('roomSearch')?.value.toLowerCase() || '';
            
            let html = '';
            if (isStaff) {
                html = `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">`;
                for (const id in classrooms) {
                    const room = classrooms[id];
                    if (room.name.toLowerCase().includes(query) || id.toLowerCase().includes(query)) {
                        const booked = room.seats.filter(s => s.bookedBy).length;
                        html += `
                        <div class="glass p-6 rounded-[2rem] hover:border-indigo-500/50 transition group animate-in">
                            <div class="flex justify-between items-start mb-4">
                                <span class="bg-indigo-500/20 text-indigo-400 px-3 py-1 rounded-full text-[10px] font-mono tracking-widest">${id}</span>
                                <button onclick="deleteRoom('${id}')" class="text-white/20 hover:text-red-400 transition"><i class='bx bx-trash'></i></button>
                            </div>
                            <h3 class="text-xl font-bold mb-1">${room.name}</h3>
                            <p class="text-xs text-white/40 mb-6">จองแล้ว ${booked} / ${room.seats.length} ที่นั่ง</p>
                            <button onclick="enterRoom('${id}')" class="w-full bg-white/5 hover:bg-indigo-600 py-3 rounded-xl transition text-sm font-bold">เปิดห้องเรียน</button>
                        </div>`;
                    }
                }
                html += `</div>`;
            } else {
                const myRoomId = Object.keys(classrooms).find(id => classrooms[id].seats.some(s => s.bookedBy === currentUser.email));
                if (myRoomId) {
                    const room = classrooms[myRoomId];
                    const seat = room.seats.find(s => s.bookedBy === currentUser.email);
                    html = `
                    <div class="max-w-sm mx-auto glass p-8 rounded-[2.5rem] text-center animate-in">
                        <div class="w-16 h-16 bg-green-500/20 text-green-400 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl">
                            <i class='bx bx-check-circle'></i>
                        </div>
                        <h3 class="text-xl font-bold">คุณจองที่นั่งแล้ว</h3>
                        <p class="text-white/40 text-sm mb-6">${room.name} | ที่นั่งเลขที่ ${seat.id}</p>
                        <button onclick="enterRoom('${myRoomId}')" class="w-full bg-indigo-600 py-4 rounded-2xl font-bold shadow-lg">ดูตำแหน่งที่นั่ง</button>
                    </div>`;
                }
            }
            area.innerHTML = html || `<p class="text-center opacity-20 py-10">ไม่พบข้อมูลห้องเรียน</p>`;
        }

        function renderRoomView() {
            const room = classrooms[activeRoomId];
            const isStaff = ['super_admin', 'admin', 'teacher'].includes(currentUser.role);
            
            document.getElementById('contentArea').innerHTML = `
                <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-8 animate-in">
                    <button onclick="activeRoomId=null; renderUI()" class="glass-pill px-6 py-2.5 flex items-center gap-2 hover:bg-white/10 transition text-sm">
                        <i class='bx bx-chevron-left text-xl'></i> ย้อนกลับ
                    </button>
                    <div class="flex gap-2">
                        ${isStaff ? `<button onclick="exportExcel()" class="bg-emerald-600 hover:bg-emerald-500 px-6 py-2.5 rounded-full text-sm font-bold transition flex items-center gap-2">
                            <i class='bx bxs-file-export'></i> EXPORT EXCEL
                        </button>` : ''}
                        <div class="glass-pill px-8 py-2.5 text-sm font-bold border-indigo-500/30 text-indigo-300">
                            ${room.name}
                        </div>
                    </div>
                </div>
                
                <div class="map-area p-8 md:p-12 min-h-[600px] relative overflow-auto glass">
                    <div class="w-[900px] h-[700px] mx-auto relative" id="roomCanvas">
                        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-64 h-2 bg-indigo-500/30 rounded-full"></div>
                        <div class="absolute top-4 left-1/2 -translate-x-1/2 text-[10px] tracking-[0.5em] opacity-20 font-bold uppercase">Whiteboard / Screen</div>

                        ${room.seats.map(s => {
                            const isMe = s.bookedBy === currentUser.email;
                            const stateClass = isMe ? 'my-seat' : (s.bookedBy ? 'booked' : '');
                            let label = s.id;
                            if (isMe) label = "ME";
                            else if (s.bookedBy && isStaff) label = s.name.split(' ')[0];
                            else if (s.bookedBy) label = "OCCUPIED";

                            return `
                            <div id="desk-${s.id}" class="desk ${stateClass}" style="left:${s.x}px; top:${s.y}px;"
                                 onmousedown="startDrag(event, ${s.id})" ontouchstart="startDrag(event, ${s.id})">
                                <svg viewBox="0 0 100 110">
                                    <rect x="10" y="10" width="80" height="65" class="desk-top" />
                                    <path d="M35 85 Q50 95 65 85" fill="none" stroke="currentColor" stroke-width="2" class="opacity-10" />
                                </svg>
                                <div class="desk-label">${label}</div>
                            </div>`;
                        }).join('')}
                    </div>
                </div>`;
        }

        // --- Interaction Logic ---
        async function joinByCode() {
            const code = document.getElementById('joinCode').value.trim().toUpperCase();
            if (classrooms[code]) enterRoom(code);
            else Swal.fire({ icon: 'warning', title: 'ไม่พบห้อง', text: 'รหัสห้องเรียนไม่ถูกต้อง', background: '#1e293b', color: '#fff' });
        }

        async function enterRoom(id) {
            const room = classrooms[id];
            const isStaff = ['super_admin', 'admin', 'teacher'].includes(currentUser.role);
            
            if (room.password && !isStaff) {
                const { value: pass } = await Swal.fire({
                    title: 'กรุณาใส่รหัสผ่านห้อง',
                    input: 'password',
                    showCancelButton: true,
                    background: '#1e293b', color: '#fff'
                });
                if (!pass || pass !== room.password) {
                    if(pass) Swal.fire('รหัสผ่านไม่ถูกต้อง', '', 'error');
                    return;
                }
            }
            activeRoomId = id;
            renderUI();
        }

        function exportExcel() {
            const room = classrooms[activeRoomId];
            const data = room.seats
                .filter(s => s.bookedBy)
                .map(s => ({
                    "เลขที่นั่ง": s.id,
                    "ชื่อ-นามสกุล": s.name,
                    "อีเมล": s.bookedBy,
                    "ห้องเรียน": room.name,
                    "วันที่ออกรายงาน": new Date().toLocaleDateString('th-TH')
                }));

            if (data.length === 0) return Swal.fire('ไม่พบข้อมูล', 'ยังไม่มีผู้ใช้งานจองที่นั่ง', 'info');

            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "รายชื่อ");
            XLSX.writeFile(wb, `SeatPlan_${room.name}.xlsx`);
        }

        // --- Drag & Drop logic ---
        let dragId = null, isMoving = false, startX, startY, initX, initY;

        function startDrag(e, id) {
            const isStaff = ['super_admin', 'admin', 'teacher'].includes(currentUser.role);
            dragId = id; 
            isMoving = false;
            const ev = e.touches ? e.touches[0] : e;
            startX = ev.clientX; 
            startY = ev.clientY;
            const el = document.getElementById('desk-'+id);
            initX = parseInt(el.style.left); 
            initY = parseInt(el.style.top);

            const moveHandler = (me) => {
                const mev = me.touches ? me.touches[0] : me;
                const dx = mev.clientX - startX;
                const dy = mev.clientY - startY;
                if((Math.abs(dx) > 5 || Math.abs(dy) > 5) && isStaff) {
                    isMoving = true;
                    el.style.left = (initX + dx)+'px';
                    el.style.top = (initY + dy)+'px';
                }
            };

            const endHandler = () => {
                document.removeEventListener('mousemove', moveHandler);
                document.removeEventListener('mouseup', endHandler);
                document.removeEventListener('touchmove', moveHandler);
                document.removeEventListener('touchend', endHandler);
                
                if(isMoving) {
                    const room = classrooms[activeRoomId];
                    const seat = room.seats.find(s => s.id === dragId);
                    seat.x = parseInt(el.style.left);
                    seat.y = parseInt(el.style.top);
                    db.collection("classrooms").doc(activeRoomId).update({ seats: room.seats });
                } else {
                    handleBooking(dragId);
                }
                dragId = null;
            };

            document.addEventListener('mousemove', moveHandler);
            document.addEventListener('mouseup', endHandler);
            document.addEventListener('touchmove', moveHandler, { passive: false });
            document.addEventListener('touchend', endHandler);
        }

        async function handleBooking(sid) {
            const room = classrooms[activeRoomId];
            const seat = room.seats.find(s => s.id === sid);
            const isStaff = ['super_admin', 'admin', 'teacher'].includes(currentUser.role);

            if (seat.bookedBy) {
                if (seat.bookedBy === currentUser.email || isStaff) {
                    const res = await Swal.fire({ 
                        title: 'ยกเลิกการจอง?', 
                        text: `ที่นั่งหมายเลข ${sid} (${seat.name})`,
                        icon: 'question', 
                        showCancelButton: true,
                        confirmButtonColor: '#ef4444',
                        background: '#1e293b', color: '#fff'
                    });
                    if(res.isConfirmed) { 
                        seat.bookedBy = null; seat.name = null; 
                        db.collection("classrooms").doc(activeRoomId).update({ seats: room.seats });
                    }
                }
            } else {
                if (!isStaff && room.seats.some(s => s.bookedBy === currentUser.email)) {
                    return Swal.fire('จองแล้ว', 'คุณมีที่นั่งในห้องนี้แล้ว', 'warning');
                }
                seat.bookedBy = currentUser.email; 
                seat.name = currentUser.name;
                db.collection("classrooms").doc(activeRoomId).update({ seats: room.seats });
            }
        }

        // --- Management ---
        function showCreateModal() {
            Swal.fire({
                title: 'สร้างห้องเรียนใหม่',
                background: '#1e293b', color: '#fff',
                html: `
                    <div class="text-left space-y-4 p-2">
                        <label class="text-xs opacity-50 uppercase">ชื่อห้องเรียน</label>
                        <input id="swal-name" class="w-full bg-slate-800 border border-white/10 p-3 rounded-xl" placeholder="เช่น ม.6/1 (คาบเช้า)">
                        <label class="text-xs opacity-50 uppercase">จำนวนที่นั่ง</label>
                        <input id="swal-count" type="number" class="w-full bg-slate-800 border border-white/10 p-3 rounded-xl" placeholder="เช่น 40">
                        <label class="text-xs opacity-50 uppercase">รหัสผ่าน (ถ้ามี)</label>
                        <input id="swal-pass" class="w-full bg-slate-800 border border-white/10 p-3 rounded-xl" placeholder="เว้นว่างไว้หากไม่ต้องใช้">
                    </div>`,
                showCancelButton: true,
                confirmButtonText: 'สร้างห้อง',
                preConfirm: () => {
                    const name = document.getElementById('swal-name').value;
                    const count = document.getElementById('swal-count').value;
                    if (!name || !count) return Swal.showValidationMessage('กรุณากรอกข้อมูลให้ครบ');
                    return [name, count, document.getElementById('swal-pass').value];
                }
            }).then(res => {
                if(res.isConfirmed) {
                    const [name, count, pass] = res.value;
                    const id = Math.random().toString(36).substring(2, 8).toUpperCase();
                    const seats = [];
                    for(let i=0; i<parseInt(count); i++) {
                        seats.push({
                            id: i+1,
                            x: (i % 8) * 100 + 50,
                            y: Math.floor(i / 8) * 120 + 100,
                            bookedBy: null, name: null
                        });
                    }
                    db.collection("classrooms").doc(id).set({ name, seats, password: pass || null });
                }
            });
        }

        async function deleteRoom(id) {
            const res = await Swal.fire({ title: 'ลบห้องเรียน?', text: 'ข้อมูลทั้งหมดจะหายไป', icon: 'warning', showCancelButton: true, background: '#1e293b', color: '#fff' });
            if(res.isConfirmed) await db.collection("classrooms").doc(id).delete();
        }

        window.onload = initApp;
    </script>
</body>
</html>
