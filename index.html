<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NTUN Space - iOS 26.5 Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --ios-blur: blur(25px);
            --ios-border: rgba(255, 255, 255, 0.3);
            --ios-bg: rgba(255, 255, 255, 0.15);
        }

        body { 
            font-family: 'Kanit', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }

        /* --- Meteor Animation Background --- */
        .stars-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden; pointer-events: none;
        }
        .meteor {
            position: absolute; width: 2px; height: 100px;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,1));
            opacity: 0; animation: meteor-fall 3s infinite ease-in;
        }
        @keyframes meteor-fall {
            0% { transform: translateY(-100px) translateX(0) rotate(-45deg); opacity: 1; }
            100% { transform: translateY(100vh) translateX(-500px) rotate(-45deg); opacity: 0; }
        }

        /* --- Glassmorphism UI --- */
        .glass {
            background: var(--ios-bg);
            backdrop-filter: var(--ios-blur); -webkit-backdrop-filter: var(--ios-blur);
            border: 1px solid var(--ios-border);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
        }

        .glass-btn {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 18px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-btn:hover { background: rgba(255, 255, 255, 0.3); transform: translateY(-2px); }
        .glass-btn:active { transform: scale(0.95); }

        .hero-input {
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px; color: white; transition: all 0.3s;
        }
        .hero-input:focus { background: rgba(255, 255, 255, 0.2); outline: none; border-color: #fff; }
        .hero-input::placeholder { color: rgba(255,255,255,0.5); }

        /* --- Map Responsive Logic --- */
        .map-wrapper { 
            width: 100%; border-radius: 24px; background: rgba(0,0,0,0.1);
            overflow: auto; position: relative; scrollbar-width: none;
        }
        #roomMap { 
            position: relative; margin: 0 auto;
            /* ปรับขนาดตามจอ */
            width: 1000px; height: 800px; 
            transform-origin: top center;
        }

        @media (max-width: 768px) {
            #roomMap { transform: scale(0.7); width: 700px; height: 600px; }
            .desk-container { transform: scale(0.8); }
        }
        @media (max-width: 480px) {
            #roomMap { transform: scale(0.45); width: 450px; height: 400px; }
        }

        /* --- Desk Styling --- */
        .desk-container { width: 70px; height: 80px; position: absolute; cursor: pointer; }
        .desk-top { fill: rgba(255, 255, 255, 0.9); stroke: rgba(0,0,0,0.1); stroke-width: 1; }
        .desk-chair { fill: rgba(255, 255, 255, 0.4); }
        .booked .desk-top { fill: #ef4444; }
        .my-seat .desk-top { fill: #22c55e; }
        .desk-label { 
            position: absolute; top: 20%; width: 100%; text-align: center; 
            font-size: 10px; font-weight: 700; color: #1e293b;
        }

        /* SweetAlert Glass Theme */
        .swal2-popup.hero-card {
            background: rgba(255, 255, 255, 0.2) !important;
            backdrop-filter: blur(30px) !important;
            border: 1px solid rgba(255, 255, 255, 0.3) !important;
            border-radius: 30px !important;
            color: white !important;
        }
        .swal2-title, .swal2-html-container { color: white !important; }
    </style>
</head>
<body>

    <div class="stars-container" id="meteorContainer"></div>

    <div id="loginPage" class="fixed inset-0 z-[100] flex items-center justify-center p-6">
        <div class="glass p-10 w-full max-w-md text-center">
            <div class="w-20 h-20 bg-white/20 rounded-[2rem] mx-auto mb-6 flex items-center justify-center text-white text-4xl border border-white/30">
                <i class='bx bxs-graduation'></i>
            </div>
            <h1 class="text-3xl font-bold mb-2">ยินดีต้อนรับกลับมา</h1>
            <p class="text-white/60 mb-8 font-light">ระบบจองที่นั่ง NTUN Space</p>
            <div id="g_id_onload" data-client_id="738644222886-o9uq6eonuu9hp8srsad1465lh9id41kj.apps.googleusercontent.com" data-callback="handleGoogleLogin"></div>
            <div class="g_id_signin flex justify-center" data-type="standard" data-shape="pill" data-size="large" data-theme="filled_blue"></div>
        </div>
    </div>

    <div id="mainApp" class="hidden min-h-screen flex flex-col p-4 md:p-8 max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-6 glass px-6 py-4">
            <div class="flex items-center gap-4">
                <img id="userImg" src="" class="w-12 h-12 rounded-2xl border-2 border-white/50 object-cover shadow-lg" alt="Profile">
                <div>
                    <h2 id="userName" class="text-lg font-bold leading-tight">Name</h2>
                    <span id="userRole" class="text-[10px] px-2 py-0.5 rounded-full bg-white/20 uppercase tracking-tighter">Role</span>
                </div>
            </div>
            <div class="flex gap-2">
                <button id="manageUserBtn" onclick="showUserManagement()" class="hidden w-10 h-10 glass-btn flex items-center justify-center"><i class='bx bxs-user-badge text-xl'></i></button>
                <button onclick="logout()" class="w-10 h-10 glass-btn flex items-center justify-center text-red-300"><i class='bx bx-power-off text-xl'></i></button>
            </div>
        </header>

        <div id="contentArea" class="flex-1"></div>
    </div>

    <script>
        // --- 1. Firebase & Meteor Init ---
        const firebaseConfig = {
            apiKey: "AIzaSyAlaTyhtXf-d6qDSD5AeWR33Hg3VCn55o8",
            authDomain: "ntunspace.firebaseapp.com",
            projectId: "ntunspace",
            storageBucket: "ntunspace.firebasestorage.app",
            messagingSenderId: "952526844615",
            appId: "1:952526844615:web:d1f78ba8e3b44c24ee84e2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const SUPER_ADMIN = "ntun21933@ntun.ac.th";

        // สร้างดาวตกแบบสุ่ม
        function createMeteors() {
            const container = document.getElementById('meteorContainer');
            for(let i=0; i<15; i++) {
                let m = document.createElement('div');
                m.className = 'meteor';
                m.style.left = Math.random() * 100 + '%';
                m.style.animationDelay = Math.random() * 5 + 's';
                m.style.animationDuration = (Math.random() * 2 + 2) + 's';
                container.appendChild(m);
            }
        }
        createMeteors();

        // --- 2. Auth & Session ---
        let currentUser = null;
        let activeRoomId = null;
        let classrooms = {};

        function parseJwt(token) {
            try {
                var base64Url = token.split('.')[1];
                var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                return JSON.parse(decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')));
            } catch(e) { return null; }
        }

        async function handleGoogleLogin(response) {
            const payload = parseJwt(response.credential);
            const email = payload.email.toLowerCase();
            if (!email.endsWith('@ntun.ac.th')) {
                return Swal.fire({icon: 'error', title: 'อีเมลไม่ถูกต้อง', text: 'ต้องใช้ @ntun.ac.th เท่านั้น', customClass: { popup: 'hero-card' }});
            }

            let role = 'student';
            const userDoc = await db.collection("users").doc(email).get();
            if (email === SUPER_ADMIN) role = 'super_admin';
            else if (userDoc.exists) role = userDoc.data().role;

            currentUser = { email, name: payload.name, role, picture: payload.picture };
            localStorage.setItem('ntun_session_v6', JSON.stringify(currentUser));
            initApp();
        }

        const saved = localStorage.getItem('ntun_session_v6');
        if (saved) { currentUser = JSON.parse(saved); initApp(); }

        function initApp() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('userName').innerText = currentUser.name;
            document.getElementById('userImg').src = currentUser.picture || 'https://via.placeholder.com/100';
            const roleEl = document.getElementById('userRole');
            roleEl.innerText = currentUser.role;

            if (['super_admin', 'admin'].includes(currentUser.role)) {
                document.getElementById('manageUserBtn').classList.remove('hidden');
            }

            db.collection("classrooms").onSnapshot(snap => {
                classrooms = {};
                snap.forEach(doc => { classrooms[doc.id] = doc.data(); });
                renderUI();
            });
        }

        function logout() { localStorage.removeItem('ntun_session_v6'); location.reload(); }

        // --- 3. UI Renderers ---
        function renderUI() {
            if (activeRoomId && classrooms[activeRoomId]) renderRoomView();
            else renderDashboard();
        }

        function renderDashboard() {
            const area = document.getElementById('contentArea');
            const isAdmin = ['super_admin', 'admin', 'teacher'].includes(currentUser.role);
            let html = '';

            if (isAdmin) {
                html += `
                <div class="glass p-6 mb-8 flex flex-col md:flex-row gap-4 items-end">
                    <div class="flex-1 w-full">
                        <label class="text-[10px] uppercase font-bold ml-2 mb-1 block opacity-60">ชื่อห้องเรียน</label>
                        <input id="roomName" type="text" placeholder="ม.3/1" class="hero-input w-full p-3">
                    </div>
                    <div class="w-full md:w-32">
                        <label class="text-[10px] uppercase font-bold ml-2 mb-1 block opacity-60">ที่นั่ง</label>
                        <input id="roomCount" type="number" value="40" class="hero-input w-full p-3 text-center">
                    </div>
                    <button onclick="createRoom()" class="glass-btn px-8 py-3 w-full md:w-auto font-bold text-sm"><i class='bx bx-plus-circle'></i> สร้าง</button>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">`;
                for (const id in classrooms) {
                    html += `
                    <div onclick="openRoom('${id}')" class="glass p-5 cursor-pointer relative group transition-all hover:bg-white/20">
                        <button onclick="event.stopPropagation(); deleteRoom('${id}')" class="absolute top-2 right-2 text-white/30 hover:text-red-400"><i class='bx bx-trash'></i></button>
                        <div class="text-3xl mb-2 opacity-80"><i class='bx bxs-door-open'></i></div>
                        <h3 class="font-bold text-lg">${classrooms[id].name}</h3>
                        <p class="text-[10px] opacity-50 uppercase font-bold">ID: ${id}</p>
                    </div>`;
                }
                html += `</div>`;
            } else {
                html += `
                <div class="max-w-xs mx-auto glass p-8 text-center mt-10">
                    <h3 class="text-xl font-bold mb-4 text-white/90">เข้าห้องเรียน</h3>
                    <input id="roomCodeInput" type="text" placeholder="รหัสห้อง" class="hero-input w-full p-4 text-center text-xl font-bold uppercase mb-4">
                    <button onclick="joinRoom()" class="glass-btn w-full py-4 text-lg font-bold">เข้าร่วม</button>
                </div>`;
            }
            area.innerHTML = html;
        }

        function renderRoomView() {
            const room = classrooms[activeRoomId];
            const area = document.getElementById('contentArea');
            const isAdmin = ['super_admin', 'admin', 'teacher'].includes(currentUser.role);
            
            area.innerHTML = `
                <div class="flex justify-between items-center mb-6">
                    <button onclick="activeRoomId=null; renderUI()" class="glass-btn px-4 py-2 text-sm flex items-center gap-2"><i class='bx bx-chevron-left'></i> กลับ</button>
                    <div class="text-xs glass-btn px-4 py-2 font-bold opacity-80">ROOM: ${activeRoomId}</div>
                </div>
                <div class="map-wrapper glass p-4">
                    <div class="w-full flex justify-center mb-10 pointer-events-none">
                        <div class="w-1/2 h-8 glass flex items-center justify-center text-[10px] font-bold tracking-[10px] opacity-40">WHITEBOARD</div>
                    </div>
                    <div id="roomMap">
                        ${room.seats.map(s => {
                            let state = '', display = s.id;
                            if (s.bookedBy) {
                                if (s.bookedBy === currentUser.email) { state = 'my-seat'; display = "YOU"; }
                                else { state = 'booked'; display = isAdmin ? s.name.split(' ')[0] : 'จองแล้ว'; }
                            }
                            return `
                            <div id="desk-${s.id}" class="desk-container ${state}" style="left:${s.x}px; top:${s.y}px;" onmousedown="startDrag(event, ${s.id})" ontouchstart="startDrag(event, ${s.id})">
                                <svg viewBox="0 0 100 110">
                                    <rect x="25" y="80" width="50" height="25" rx="8" class="desk-chair" />
                                    <rect x="5" y="10" width="90" height="60" rx="12" class="desk-top" />
                                </svg>
                                <div class="desk-label">${display}</div>
                            </div>`;
                        }).join('')}
                    </div>
                </div>`;
        }

        // --- 4. Logic & Interactions ---
        function calculatePositions(count) {
            const seats = [];
            const colWidth = 100, rowHeight = 110;
            for (let i = 0; i < count; i++) {
                const row = Math.floor(i / 8), col = i % 8;
                let x = col * colWidth;
                if (col >= 3) x += 60; // ทางเดิน 1
                if (col >= 6) x += 60; // ทางเดิน 2
                seats.push({ id: i + 1, x: x + 40, y: row * rowHeight + 100, bookedBy: null, name: null });
            }
            return seats;
        }

        async function createRoom() {
            const name = document.getElementById('roomName').value;
            const count = parseInt(document.getElementById('roomCount').value);
            if (!name || !count) return;
            const id = Math.random().toString(36).substring(2, 8).toUpperCase();
            await db.collection("classrooms").doc(id).set({ name, seats: calculatePositions(count) });
        }

        function openRoom(id) { activeRoomId = id; renderUI(); }
        function joinRoom() {
            const code = document.getElementById('roomCodeInput').value.toUpperCase();
            if (classrooms[code]) { activeRoomId = code; renderUI(); }
            else Swal.fire({icon:'error', title:'ไม่พบห้อง', customClass:{popup:'hero-card'}});
        }

        function deleteRoom(id) {
            Swal.fire({title:'ลบห้องเรียน?', icon:'warning', showCancelButton:true, customClass:{popup:'hero-card'}}).then(r => {
                if(r.isConfirmed) db.collection("classrooms").doc(id).delete();
            });
        }

        // --- Drag & Interaction ---
        let dragId = null, isMoving = false, startX, startY, initX, initY;
        function startDrag(e, id) {
            const isAdmin = ['super_admin', 'admin', 'teacher'].includes(currentUser.role);
            dragId = id; isMoving = false;
            const ev = e.touches ? e.touches[0] : e;
            startX = ev.clientX; startY = ev.clientY;
            const el = document.getElementById('desk-'+id);
            initX = parseInt(el.style.left); initY = parseInt(el.style.top);
            if(isAdmin) el.style.zIndex = 1000;
        }

        document.addEventListener('mousemove', e => handleMove(e));
        document.addEventListener('touchmove', e => handleMove(e), {passive: false});
        function handleMove(e) {
            if(!dragId || !['super_admin','admin','teacher'].includes(currentUser.role)) return;
            const ev = e.touches ? e.touches[0] : e;
            const dx = ev.clientX - startX, dy = ev.clientY - startY;
            if(Math.abs(dx) > 5 || Math.abs(dy) > 5) isMoving = true;
            if(isMoving) {
                const el = document.getElementById('desk-'+dragId);
                el.style.left = (initX + dx)+'px'; el.style.top = (initY + dy)+'px';
            }
        }

        document.addEventListener('mouseup', endDrag);
        document.addEventListener('touchend', endDrag);
        function endDrag() {
            if(!dragId) return;
            const isAdmin = ['super_admin','admin','teacher'].includes(currentUser.role);
            if(isMoving && isAdmin) {
                const el = document.getElementById('desk-'+dragId);
                const room = classrooms[activeRoomId];
                const seat = room.seats.find(s => s.id === dragId);
                seat.x = parseInt(el.style.left); seat.y = parseInt(el.style.top);
                db.collection("classrooms").doc(activeRoomId).update({ seats: room.seats });
            } else if(!isMoving) handleBooking(dragId);
            dragId = null;
        }

        async function handleBooking(sid) {
            const room = classrooms[activeRoomId];
            const seat = room.seats.find(s => s.id === sid);
            const isAdmin = ['super_admin','admin','teacher'].includes(currentUser.role);
            if (seat.bookedBy) {
                if (seat.bookedBy === currentUser.email || isAdmin) {
                    Swal.fire({ title: 'ยกเลิกการจอง?', icon: 'question', showCancelButton: true, customClass: {popup: 'hero-card'} })
                    .then(r => { if(r.isConfirmed) { seat.bookedBy = null; seat.name = null; saveRoom(); }});
                }
            } else {
                if (!isAdmin && room.seats.some(s => s.bookedBy === currentUser.email)) return Swal.fire({icon: 'warning', title: 'คุณจองไปแล้ว'});
                seat.bookedBy = currentUser.email; seat.name = currentUser.name;
                saveRoom();
            }
        }
        function saveRoom() { db.collection("classrooms").doc(activeRoomId).update({ seats: classrooms[activeRoomId].seats }); }

        // --- 5. User Management (เวอร์ชันสมบูรณ์) ---
        async function showUserManagement() {
            const snap = await db.collection("users").get();
            let rows = '';
            snap.forEach(doc => {
                if (doc.id !== SUPER_ADMIN) {
                    rows += `
                    <div class="flex justify-between items-center bg-white/10 p-3 rounded-xl mb-2">
                        <div class="text-left"><p class="text-xs font-bold">${doc.id}</p><p class="text-[8px] opacity-50 uppercase">${doc.data().role}</p></div>
                        <button onclick="removeUser('${doc.id}')" class="text-red-400 px-2"><i class='bx bx-x-circle'></i></button>
                    </div>`;
                }
            });
            Swal.fire({
                title: 'จัดการผู้ดูแล',
                html: `
                    <input id="swalEmail" placeholder="email @ntun.ac.th" class="hero-input w-full p-3 mb-2 text-sm">
                    <select id="swalRole" class="hero-input w-full p-3 mb-4 text-sm bg-indigo-900">
                        <option value="teacher">Teacher</option>
                        <option value="admin">Admin</option>
                    </select>
                    <button id="addBtn" class="glass-btn w-full py-2 mb-4 text-sm font-bold">เพิ่มสมาชิก</button>
                    <div class="max-h-40 overflow-y-auto">${rows || '<p class="opacity-30">ไม่มีข้อมูล</p>'}</div>
                `,
                showConfirmButton: false, showCancelButton: true, customClass:{popup:'hero-card'},
                didOpen: () => {
                    document.getElementById('addBtn').onclick = async () => {
                        const email = document.getElementById('swalEmail').value.trim().toLowerCase();
                        if(!email.endsWith('@ntun.ac.th')) return;
                        await db.collection("users").doc(email).set({ role: document.getElementById('swalRole').value, name: "New Member" });
                        Swal.close(); showUserManagement();
                    };
                }
            });
        }
        async function removeUser(email) {
            await db.collection("users").doc(email).delete();
            Swal.close(); showUserManagement();
        }
    </script>
</body>
</html>
